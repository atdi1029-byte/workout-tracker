    <input id="exPickerSearch" placeholder="Search exercises..." oninput="filterExPicker()">
    <button onclick="closeExPicker()">&times;</button>
  </div>
  <div class="ex-picker-tabs" style="display:flex;gap:4px;padding:4px 12px">
    <button class="day-tab active" onclick="setPickerFilter('muscle',this)" id="pickerTabMuscle">${(MUSCLE_LABELS[currentMuscle]||currentMuscle).toUpperCase()}</button>
    <button class="day-tab" onclick="setPickerFilter('recent',this)" id="pickerTabRecent">RECENT</button>

  window._pickerFilter='muscle';

  filterExPicker();

function setPickerFilter(filter,btn){
  window._pickerFilter=filter;
  document.querySelectorAll('.ex-picker-tabs .day-tab').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  filterExPicker();
}

function filterExPicker(){
  const list=document.getElementById('exPickerList');
  if(!list)return;
  const search=(document.getElementById('exPickerSearch').value||'').toLowerCase();
  const filter=window._pickerFilter;
  const muscle=window._pickerMuscle;
  const currentName=window._pickerCurrent;

  // Build exercise list based on filter
  const allNames=getAllExerciseNames();
  const recentNames=getRecentExercises();
  let exercises=[];

  if(filter==='recent'){
    exercises=recentNames;
  }else if(filter==='muscle'){
    exercises=allNames.filter(n=>(getExerciseMuscle(n)||'other')===muscle);
  }else{
    exercises=allNames;
  }

  // Apply search
  if(search){
    exercises=exercises.filter(n=>n.toLowerCase().includes(search)||(getExerciseEnglish(n)||'').toLowerCase().includes(search));
  }

  // Remove current exercise from list
  exercises=exercises.filter(n=>n!==currentName);

  let html='';
  if(exercises.length===0){
    html='<div style="padding:20px;text-align:center;color:var(--text-dim)">No exercises found</div>';
  }else{
    exercises.forEach(name=>{
      const en=getExerciseEnglish(name);
      const m=getExerciseMuscle(name)||'other';
      const mLabel=MUSCLE_LABELS[m]||m;
      const recentIdx=recentNames.indexOf(name);
      html+=`<div class="ex-picker-item" onclick="pickExercise('${name.replace(/'/g,"\\'")}')">
        <div class="pi-name">${name}</div>
        <div class="pi-detail">${en!==name?en+' &middot; ':''}${mLabel}</div>
        ${recentIdx>=0?'<div class="pi-recent">Recently used</div>':''}
      </div>`;
    });
  }
  list.innerHTML=html;
}

function pickExercise(name){
  const idx=window._pickerIdx;

function migrateExRename(oldName,newName){
  if(!oldName||!newName||oldName===newName)return;
  // Migrate logs
  (data.logs||[]).forEach(log=>{
    (log.exercises||[]).forEach(ex=>{if(ex.name===oldName)ex.name=newName});
  });
  // Migrate PRs
  const oldId=exId(oldName),newId=exId(newName);
  if(data.prs&&data.prs[oldId]&&!data.prs[newId]){data.prs[newId]=data.prs[oldId];delete data.prs[oldId]}
  // Migrate localStorage stores
  [['zercher_holds',getHolds,saveHolds],['zercher_notes',getExNotes,saveExNotes],['zercher_starts',getStartWeights,saveStartWeights],['zercher_platepref',getPlatePref,savePlatePref],['zercher_noplate',getNoPlate,saveNoPlate],['zercher_singleend',getSingleEnd,saveSingleEnd]].forEach(([key,getter,setter])=>{
    const obj=getter();
    if(obj[oldName]!==undefined){obj[newName]=obj[oldName];delete obj[oldName];setter(obj)}
  });
}

function saveEditorDay(){
  // Read all current input values from DOM
  const container=document.getElementById('editorDayContent');
  if(!container)return;
  const items=container.querySelectorAll('.edit-ex-item');
  items.forEach((item,i)=>{
    if(!editorExercises[i])return;
    const inputs=item.querySelectorAll('input,select');
    // inputs order: name, en, sets, rest, tech, muscle
    if(inputs[0])editorExercises[i][0]=inputs[0].value;
    if(inputs[1])editorExercises[i][1]=inputs[1].value;  // en name (in edit-row2)
    if(inputs[2])editorExercises[i][4]=inputs[2].value;  // setsReps
    if(inputs[3])editorExercises[i][5]=+inputs[3].value; // rest
    if(inputs[4])editorExercises[i][3]=inputs[4].value;  // technique (select)
    if(inputs[5])editorExercises[i][2]=inputs[5].value;  // muscle (select)
  });

  // Migrate data for any renamed exercises
  editorExercises.forEach((e,i)=>{
    if(editorOrigNames[i]&&e[0]!==editorOrigNames[i]){
      migrateExRename(editorOrigNames[i],e[0]);
    }
  });
  editorOrigNames=editorExercises.map(e=>e[0]);

  // Save to customPrograms
  if(!data.customPrograms[editorPid])data.customPrograms[editorPid]={days:{}};
  if(!data.customPrograms[editorPid].days)data.customPrograms[editorPid].days={};
  data.customPrograms[editorPid].days[editorDay]={ex:editorExercises.map(e=>[...e])};
  saveData();
}

function saveEditorAll(){
  saveEditorDay();
  syncToCloud();
  toast(editorPid+' Day '+editorDay+' saved!');
  // Update badge
  const titleEl=document.querySelector('.modal-title');
  if(titleEl){
    titleEl.innerHTML=`Edit: ${editorPid} <span class="custom-badge">CUSTOM</span>`;
  }
  renderEditorExercises();
}

function showBaseVersion(){
  const baseProg=PROGRAMS[editorPid];
  const baseDayEx=baseProg.days[editorDay]?baseProg.days[editorDay].ex:[];

  let html=`<div class="modal-header">
    <div class="modal-title">Base: ${editorPid} Day ${editorDay} <span class="base-badge">ORIGINAL</span></div>
    <button class="modal-close" onclick="closeModal()">&times;</button>
  </div>
  <div style="font-size:0.7rem;color:var(--text-dim);margin-bottom:8px">${baseDayEx.length} exercises (original version)</div>`;

  baseDayEx.forEach((e,i)=>{
    html+=`<div class="edit-ex-item" style="cursor:default">
      <span class="edit-num">${i+1}</span>
      <span style="flex:1;font-size:0.85rem;color:var(--text-bright)">${e[0]}</span>
      <span style="font-size:0.75rem;color:var(--text-dim)">${e[4]}</span>
      <span style="font-size:0.65rem;color:var(--iron)">${TECH_LABELS[e[3]]||e[3]}</span>
    </div>`;
  });

  html+=`<button class="edit-save-btn" onclick="openEditor('${editorPid}')">Back to Editor</button>`;
  html+=`<button class="edit-reset-btn" onclick="resetDayToBase()">Reset This Day to Base</button>`;

  document.getElementById('modalContent').innerHTML=html;
}

function resetDayToBase(){
  if(!data.customPrograms[editorPid])return openEditor(editorPid);
  if(data.customPrograms[editorPid].days){
    delete data.customPrograms[editorPid].days[editorDay];
    // Clean up if no more custom days
    if(Object.keys(data.customPrograms[editorPid].days).length===0){
      delete data.customPrograms[editorPid];
    }
  }
  saveData();
  toast('Day '+editorDay+' reset to base');
  openEditor(editorPid);
}

function resetProgram(pid){
  if(!confirm('Reset ALL days of '+pid+' to base version?'))return;
  delete data.customPrograms[pid];
  saveData();
  toast(pid+' reset to base');
  openEditor(pid);
}

// ── MODAL HELPERS ──
function openModal(html){
  document.getElementById('modalContent').innerHTML=html;
  const ov=document.getElementById('modalOverlay');
  const wasOpen=ov.classList.contains('show');
  ov.classList.add('show');
  if(!wasOpen)history.pushState({modal:true},'');
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
  if(history.state&&history.state.modal)history.back();
}
window.addEventListener('popstate',function(){
  const overlay=document.getElementById('modalOverlay');
  if(overlay&&overlay.classList.contains('show'))overlay.classList.remove('show');
});

// ── SETTINGS ──
function openSettings(){
  let html=`<div class="modal-header">
    <div class="modal-title">Settings</div>
    <button class="modal-close" onclick="closeModal()">&times;</button>
  </div>
  <div class="card" style="margin-bottom:8px">
    <div class="card-title">Active Program</div>
    <div style="font-size:0.85rem;color:var(--text)">${data.activeProgram} - ${PHASES[PROGRAMS[data.activeProgram]?.phase]||''}</div>
    ${(()=>{const wi=getProgramWeekInfo(data.activeProgram);if(!wi)return '';return wi.expired?'<div style="font-size:0.8rem;color:var(--red-bright);margin-top:4px">Program complete — time to switch!</div>':'<div style="font-size:0.8rem;color:var(--iron);margin-top:4px">Week '+wi.currentWeek+' of '+wi.totalWeeks+' ('+wi.daysLeft+' days left)</div>'})()}
  </div>
  <div class="card" style="margin-bottom:8px">
    <div class="card-title">Edit Programs</div>
    <button class="ex-action-btn" onclick="openEditor(data.activeProgram)" style="margin-top:4px">Open Program Editor</button>
  </div>
  <div class="card" style="margin-bottom:8px">
    <div class="card-title">Import ATH Data</div>
    <button class="ex-action-btn" onclick="importATH()" style="margin-top:4px">Load ATH as PRs</button>
  </div>
  <div class="card" style="margin-bottom:8px">
    <div class="card-title">Data</div>
    <div style="font-size:0.8rem;color:var(--text-dim)">${data.logs.length} sessions &middot; ${Object.keys(data.prs).length} exercises with PRs</div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="ex-action-btn" onclick="fullSync()" style="flex:1">Full Sync</button>
      <button class="ex-action-btn" onclick="exportData()" style="flex:1">Export</button>
      <button class="ex-action-btn" onclick="showImport()" style="flex:1">Import</button>
    </div>
    <div id="import-area" style="display:none;margin-top:8px">
      <textarea id="import-json" placeholder="Paste exported JSON here..." style="width:100%;height:120px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-bright);font-size:0.8rem;padding:8px;resize:vertical;font-family:monospace"></textarea>
      <button class="ex-action-btn" onclick="importData()" style="margin-top:4px;color:var(--green)">Load Imported Data</button>
    </div>
    <button class="ex-action-btn" onclick="if(confirm('Clear ALL data?')){localStorage.removeItem(STORAGE_KEY);location.reload()}" style="margin-top:4px;color:var(--red)">Reset All Data</button>
  </div>`;
  openModal(html);
}

function exportData(){
  const json=JSON.stringify(data);
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(json).then(()=>toast('Data copied to clipboard')).catch(()=>{
      prompt('Copy this data:',json);
    });
  }else{
    prompt('Copy this data:',json);
  }
}
function showImport(){
  const area=document.getElementById('import-area');
  area.style.display=area.style.display==='none'?'block':'none';
}
function importData(){
  const raw=document.getElementById('import-json').value.trim();
  if(!raw){toast('Paste data first');return}
  try{
    const imported=JSON.parse(raw);
    if(!imported.logs||!Array.isArray(imported.logs)){toast('Invalid data format');return}
    if(!confirm('Replace all data with imported data? ('+imported.logs.length+' sessions)')){return}
    data=imported;
    saveData();
    toast('Imported '+data.logs.length+' sessions');
    closeModal();
    showView('workout',document.querySelector('.nav-btn'));
  }catch(e){toast('Invalid JSON')}
}

function importATH(){
  // Import ATH_DATA as PRs (assume rep count of 1 since these are max weights)
  for(const name in ATH_DATA){
    // Exact match only — no partial/substring matching
    const id=exId(name);
    if(!data.prs[id])data.prs[id]={};
    // Store as "ATH" rep range (unknown reps)
    if(!data.prs[id]['ath']||ATH_DATA[name]>data.prs[id]['ath'].weight){
      data.prs[id]['ath']={weight:ATH_DATA[name],date:'',program:'ATH'};
    }
  }
  saveData();
  toast('Imported '+Object.keys(ATH_DATA).length+' ATH records');
  closeModal();
}

// ── INIT ──
loadData();
migrateData();
initCustomABCD09();
initCustomABCD10();
// Bootstrap PRs from all logs (seed logs don't call finishWorkout so PRs are missing)
(data.logs||[]).forEach(log=>{
  (log.exercises||[]).forEach(ex=>{
    ex.sets.filter(s=>s.type==='working'&&s.weight>0).forEach(s=>{
      const id=exId(ex.name);
      if(!data.prs[id])data.prs[id]={};
      const current=data.prs[id][s.reps];
      if(!current||s.weight>current.weight){
        data.prs[id][s.reps]={weight:s.weight,date:log.date,program:log.program||''};
      }
    });
  });
});
// ABS days exist in some programs — they show as tabs but aren't in ABCD rotation
// Load custom exercises into hidden program
if(data.customExercises&&data.customExercises.length){
  PROGRAMS._custom={name:'_custom',phase:'acc',type:'ABC',days:{A:{label:'Custom',labelEn:'Custom Exercises',ex:data.customExercises}}};
}
// Auto-seed ATH data into PRs on every load
for(const name in ATH_DATA){
  const id=exId(name);
  if(!data.prs[id])data.prs[id]={};
  if(!data.prs[id]['ath']||ATH_DATA[name]>data.prs[id]['ath'].weight){
    data.prs[id]['ath']={weight:ATH_DATA[name],date:'',program:'ATH'};
  }
}
saveData();
currentDay=getNextDay();
// Resume in-progress workout (including ABS) if one exists
try{const _s=JSON.parse(localStorage.getItem('workout_in_progress'));if(_s&&_s.program===data.activeProgram&&_s.day)currentDay=_s.day;}catch(e){}
showView('workout',document.querySelector('.nav-btn'));
// Startup pull — set syncReady after cloud pull completes
loadFromCloud(function(){syncReady=true;});
// Re-sync when app returns to foreground
document.addEventListener('visibilitychange',function(){if(!document.hidden&&syncReady)loadFromCloud()});
if('serviceWorker'in navigator){navigator.serviceWorker.register('./service-worker.js')}

</script>
