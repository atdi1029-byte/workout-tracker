// ── RUNNING TAB ──
function getAdaptiveTarget(runType,blockDefault){
  // Find last completed run of this type
  const logs=data.runLogs||[];
  const increment=runType==='long'?3:2;
  // Block caps (max target per block)
  const blockCaps={
    BLOCK1:{easy:30,speed:25,long:35},
    BLOCK2:{easy:35,speed:32,long:45},
    BLOCK3:{easy:35,speed:35,long:70},
    BLOCK4:{easy:35,speed:40,long:90}
  };
  const cap=(blockCaps[currentRunBlock]||{})[runType]||blockDefault;
  // Find most recent log of this run type
  for(let i=logs.length-1;i>=0;i--){
    if(logs[i].type===runType&&logs[i].actualMin>0){
      const adaptive=Math.round(logs[i].actualMin+increment);
      return Math.min(adaptive,cap);
    }
  }
  return blockDefault;// No history — use plan default
}

function renderRunView(container){
  const block=RUNNING_PLANS[currentRunBlock];
  if(!block){container.innerHTML='<div style="text-align:center;color:var(--text-dim);padding:40px">No running plan found.</div>';return}
  const weekIdx=Math.max(0,Math.min(7,currentRunWeek-1));
  const week=block.weeks[weekIdx];
  const thisWeekMon=weekStart();
  const weekLogs=(data.runLogs||[]).filter(l=>l.week===thisWeekMon&&l.block===currentRunBlock);
  // All-time stats for fun section
  const allLogs=data.runLogs||[];
  const totalMin=allLogs.reduce((s,l)=>s+(l.actualMin||0),0);
  const totalKm=allLogs.reduce((s,l)=>s+(l.actualKm||0),0);
  // Calories: use logged values when available, estimate for the rest
  const realCal=allLogs.reduce((s,l)=>s+(l.calories||0),0);
  const logsWithCal=allLogs.filter(l=>l.calories>0);
  const logsWithoutCal=allLogs.filter(l=>!l.calories);
  const estFromTime=Math.round(logsWithoutCal.reduce((s,l)=>s+(l.actualMin||0),0)*10);
  const totalCal=realCal+estFromTime;
  const calLabel=logsWithCal.length>0&&logsWithoutCal.length>0?'Calories (mixed)':logsWithCal.length>0?'Calories':'Est. calories';
  const estLbs=totalCal>0?(totalCal/3500).toFixed(1):'0';
  // Distance milestones
  const miMilestones=[5,10,25,50,100,200,500,1000];
  const nextMilestone=miMilestones.find(m=>m>totalKm)||null;

  let html='';
  // Header
  html+=`<div class="run-header">
    <div class="run-block-label">${block.label}</div>
    <div class="run-week-label">Week ${currentRunWeek} of 8</div>
    <div class="run-week-nav">
      <button class="run-week-btn" onclick="changeRunWeek(-1)"${currentRunWeek<=1?' disabled':''}>&larr;</button>
      <span class="run-week-current">Week ${currentRunWeek}</span>
      <button class="run-week-btn" onclick="changeRunWeek(1)"${currentRunWeek>=8?' disabled':''}>&rarr;</button>
    </div>
  </div>`;

  // 3 run cards
  week.runs.forEach((run,ri)=>{
    const logged=weekLogs.find(l=>l.runIndex===ri);
    const isComplete=!!logged;
    const adaptiveTarget=getAdaptiveTarget(run.type,run.targetMin);
    const typeIcon=run.type==='easy'?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><circle cx="12" cy="5" r="3"/><path d="M12 8v8M9 21l3-5 3 5M7 13h10"/></svg>':run.type==='speed'?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>':'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>';
    html+=`<div class="run-card${isComplete?' completed':''}" id="run-card-${ri}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div>
          <span style="font-size:1rem;margin-right:6px">${typeIcon}</span>
          <span class="card-title" style="display:inline">${run.label}</span>
        </div>
        <span class="run-type-badge ${run.type}">${run.type}</span>
      </div>
      <div class="run-target">Target: ${adaptiveTarget} min</div>
      <div class="run-notes">${run.notes}</div>`;
    if(isComplete){
      const paceStr=logged.pace?fmtPace(logged.pace):'--';
      html+=`<div class="run-stat-row"><span class="run-stat-label">Time</span><span class="run-stat-value">${logged.actualMin} min</span></div>`;
      if(logged.actualKm){
        html+=`<div class="run-stat-row"><span class="run-stat-label">Distance</span><span class="run-stat-value">${logged.actualKm} mi</span></div>`;
        html+=`<div class="run-stat-row"><span class="run-stat-label">Pace</span><span class="run-stat-value">${paceStr}</span></div>`;
      }
      if(logged.calories){
        html+=`<div class="run-stat-row"><span class="run-stat-label">Calories</span><span class="run-stat-value">${logged.calories} cal</span></div>`;
      }
      html+=`<div class="run-status" style="text-align:center;margin-top:6px;font-size:0.82rem">&#10003; Logged ${logged.date}</div>`;
    } else {
      html+=`<div class="run-inputs">
        <div class="run-input-group">
          <label>Time</label>
          <input type="number" inputmode="decimal" id="run-time-${ri}" placeholder="${adaptiveTarget}" onkeydown="if(event.key==='Enter'){event.preventDefault();logRun(${ri})}">
          <span class="run-input-unit">min</span>
        </div>
        <div class="run-input-group">
          <label>Distance (opt.)</label>
          <input type="number" inputmode="decimal" id="run-dist-${ri}" placeholder="miles" step="0.1" onkeydown="if(event.key==='Enter'){event.preventDefault();logRun(${ri})}">
          <span class="run-input-unit">mi</span>
        </div>
      </div>
      <div class="run-inputs" style="margin-top:0">
        <div class="run-input-group">
          <label>Calories (opt.)</label>
          <input type="number" inputmode="numeric" id="run-cal-${ri}" placeholder="from app" onkeydown="if(event.key==='Enter'){event.preventDefault();logRun(${ri})}">
          <span class="run-input-unit">cal</span>
        </div>
        <div></div>
      </div>
      <div class="run-pace" id="run-pace-${ri}"></div>
      ${run.type==='speed'&&SPEED_TIMERS[currentRunBlock+'_'+currentRunWeek]?'<button class="run-timer-start-btn" onclick="startRunTimer('+ri+')">&#x23F1; Start Timer</button>':''}
      <button class="run-log-btn" onclick="logRun(${ri})">Log Run</button>`;
    }
    html+=`</div>`;
  });

  // Extra/bonus runs
  const extraLogs=weekLogs.filter(l=>l.isExtra);
  extraLogs.forEach(el=>{
    html+=`<div class="run-card completed">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div><span style="font-size:1rem;margin-right:6px">&#x2B50;</span><span class="card-title" style="display:inline">Bonus Run</span></div>
        <span class="run-type-badge easy">bonus</span>
      </div>
      <div class="run-stat-row"><span class="run-stat-label">Time</span><span class="run-stat-value">${el.actualMin} min</span></div>
      ${el.actualKm?`<div class="run-stat-row"><span class="run-stat-label">Distance</span><span class="run-stat-value">${el.actualKm} mi</span></div>`:''}
      ${el.pace?`<div class="run-stat-row"><span class="run-stat-label">Pace</span><span class="run-stat-value">${fmtPace(el.pace)}</span></div>`:''}
      ${el.calories?`<div class="run-stat-row"><span class="run-stat-label">Calories</span><span class="run-stat-value">${el.calories} cal</span></div>`:''}
      <div class="run-status" style="text-align:center;margin-top:6px;font-size:0.82rem">&#10003; Logged ${el.date}</div>
    </div>`;
  });
  html+=`<div class="run-card run-extra-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div><span style="font-size:1rem;margin-right:6px">&#x2B50;</span><span class="card-title" style="display:inline">Bonus Easy Run</span></div>
      <span class="run-type-badge easy">bonus</span>
    </div>
    <div class="run-notes">Extra volume. Keep it easy and conversational.</div>
    <div class="run-inputs">
      <div class="run-input-group">
        <label>Time</label>
        <input type="number" inputmode="decimal" id="run-time-extra" placeholder="min" onkeydown="if(event.key==='Enter'){event.preventDefault();logExtraRun()}">
        <span class="run-input-unit">min</span>
      </div>
      <div class="run-input-group">
        <label>Distance (opt.)</label>
        <input type="number" inputmode="decimal" id="run-dist-extra" placeholder="miles" step="0.1" onkeydown="if(event.key==='Enter'){event.preventDefault();logExtraRun()}">
        <span class="run-input-unit">mi</span>
      </div>
    </div>
    <div class="run-inputs" style="margin-top:0">
      <div class="run-input-group">
        <label>Calories (opt.)</label>
        <input type="number" inputmode="numeric" id="run-cal-extra" placeholder="from app" onkeydown="if(event.key==='Enter'){event.preventDefault();logExtraRun()}">
        <span class="run-input-unit">cal</span>
      </div>
      <div></div>
    </div>
    <div class="run-pace" id="run-pace-extra"></div>
    <button class="run-log-btn" onclick="logExtraRun()">Log Bonus Run</button>
  </div>`;

  // Weekly summary
  const weekTotal=weekLogs.reduce((s,l)=>s+(l.actualMin||0),0);
  const weekDist=weekLogs.reduce((s,l)=>s+(l.actualKm||0),0);
  const weekTarget=week.runs.reduce((s,r)=>s+r.targetMin,0);
  html+=`<div class="run-summary">
    <div class="run-summary-title">This Week</div>
    <div class="run-stat-row"><span class="run-stat-label">Runs completed</span><span class="run-stat-value">${weekLogs.filter(l=>!l.isExtra).length} / 3${extraLogs.length?' + '+extraLogs.length+' bonus':''}</span></div>
    <div class="run-stat-row"><span class="run-stat-label">Total time</span><span class="run-stat-value">${Math.round(weekTotal)} / ${weekTarget} min</span></div>
    ${weekDist>0?`<div class="run-stat-row"><span class="run-stat-label">Total distance</span><span class="run-stat-value">${weekDist.toFixed(1)} mi</span></div>`:''}
  </div>`;

  // Fun stats
  if(allLogs.length>0){
    html+=`<div class="run-summary" style="margin-top:10px">
      <div class="run-summary-title">All-Time Stats</div>
      <div class="run-stat-row"><span class="run-stat-label">Total runs</span><span class="run-stat-value">${allLogs.length}</span></div>
      <div class="run-stat-row"><span class="run-stat-label">Total time</span><span class="run-stat-value">${Math.round(totalMin)} min</span></div>
      ${totalKm>0?`<div class="run-stat-row"><span class="run-stat-label">Total distance</span><span class="run-stat-value">${totalKm.toFixed(1)} mi</span></div>`:''}
      <div class="run-stat-row"><span class="run-stat-label">${calLabel}</span><span class="run-stat-value">${totalCal.toLocaleString()}</span></div>
      <div class="run-stat-row"><span class="run-stat-label">Est. lbs burned</span><span class="run-stat-value">${estLbs} lbs</span></div>
    </div>`;
    if(nextMilestone&&totalKm>0){
      const remaining=(nextMilestone-totalKm).toFixed(1);
      html+=`<div class="run-milestone">${remaining} mi to ${nextMilestone} mi milestone!</div>`;
    }
  }

  // Block controls
  const blockOrder=['BLOCK1','BLOCK2','BLOCK3','BLOCK4'];
  const nextBlockIdx=(blockOrder.indexOf(currentRunBlock)+1)%blockOrder.length;
  const nextBlockLabel=RUNNING_PLANS[blockOrder[nextBlockIdx]].label;
  html+=`<button class="run-block-btn" onclick="switchRunBlock()">Next: ${nextBlockLabel}</button>`;
  html+=`<button class="run-block-btn" onclick="resetRunBlock()" style="margin-top:6px;color:var(--red);border-color:rgba(144,80,80,0.3)">Reset Week Counter</button>`;

  container.innerHTML=html;

  // Attach live pace calculation
  week.runs.forEach((run,ri)=>{
    if(!weekLogs.find(l=>l.runIndex===ri)){
      const tEl=document.getElementById('run-time-'+ri);
      const dEl=document.getElementById('run-dist-'+ri);
      if(tEl&&dEl){
        const calc=()=>{
          const t=parseFloat(tEl.value),d=parseFloat(dEl.value);
          const pEl=document.getElementById('run-pace-'+ri);
          if(t>0&&d>0){pEl.textContent=fmtPace(t/d)+' pace'}
          else{pEl.textContent=''}
        };
        tEl.addEventListener('input',calc);
        dEl.addEventListener('input',calc);
      }
    }
  });
  // Extra run pace calc
  const etEl=document.getElementById('run-time-extra');
  const edEl=document.getElementById('run-dist-extra');
  if(etEl&&edEl){
    const calc=()=>{
      const t=parseFloat(etEl.value),d=parseFloat(edEl.value);
      const pEl=document.getElementById('run-pace-extra');
      if(t>0&&d>0){pEl.textContent=fmtPace(t/d)+' pace'}
      else{pEl.textContent=''}
    };
    etEl.addEventListener('input',calc);
    edEl.addEventListener('input',calc);
  }
}

function fmtPace(p){
  const m=Math.floor(p);const s=Math.round((p-m)*60);
  return m+':'+(s<10?'0':'')+s+'/mi';
}

function logRun(runIndex){
  // Prevent double-logging same run
  const alreadyLogged=(data.runLogs||[]).find(l=>l.runIndex===runIndex&&l.week===weekStart()&&l.block===currentRunBlock&&!l.isExtra);
  if(alreadyLogged){toast('Already logged!');renderWorkout();return}
  const block=RUNNING_PLANS[currentRunBlock];
  const week=block.weeks[currentRunWeek-1];
  const run=week.runs[runIndex];
  const timeVal=parseFloat(document.getElementById('run-time-'+runIndex).value);
  if(!timeVal||timeVal<=0){toast('Enter your time!');return}
  const distVal=parseFloat(document.getElementById('run-dist-'+runIndex).value)||null;
  const calVal=parseInt(document.getElementById('run-cal-'+runIndex).value)||null;
  const pace=(distVal&&distVal>0)?(timeVal/distVal):null;
  const adaptiveTarget=getAdaptiveTarget(run.type,run.targetMin);
  const entry={
    id:'run_'+Date.now(),
    date:dateStr(),
    week:weekStart(),
    block:currentRunBlock,
    weekNum:currentRunWeek,
    runIndex:runIndex,
    type:run.type,
    label:run.label,
    targetMin:adaptiveTarget,
    actualMin:Math.round(timeVal*10)/10,
    actualKm:distVal?Math.round(distVal*100)/100:null,
    pace:pace?Math.round(pace*100)/100:null,
    calories:calVal
  };
  if(!data.runLogs)data.runLogs=[];
  data.runLogs.push(entry);
  saveData();
  syncRunToCloud(entry);
  toast(run.label+' logged! '+timeVal+' min'+(distVal?' / '+distVal+' mi':''));
  renderWorkout();
}

function changeRunWeek(delta){
  currentRunWeek=Math.max(1,Math.min(8,currentRunWeek+delta));
  localStorage.setItem('run_week_manual',currentRunWeek);
  renderWorkout();
}

function switchRunBlock(){
  const blocks=['BLOCK1','BLOCK2','BLOCK3','BLOCK4'];
  const idx=blocks.indexOf(currentRunBlock);
  const nextIdx=(idx+1)%blocks.length;
  const nextBlock=blocks[nextIdx];
  const nextLabel=RUNNING_PLANS[nextBlock].label;
  if(!confirm('Switch to '+nextLabel+'?'))return;
  currentRunBlock=nextBlock;
  currentRunWeek=1;
  localStorage.setItem('run_block',currentRunBlock);
  localStorage.setItem('run_week_manual',1);
  renderWorkout();
}

function resetRunBlock(){
  if(!confirm('Reset week counter to Week 1? Your logs are kept.'))return;
  currentRunWeek=1;
  localStorage.setItem('run_week_manual',1);
  renderWorkout();
  toast('Week counter reset');
}

// ── INTERVAL TIMER ──
let runTimerState=null;

function expandIntervals(timer){
  const p=[];
  p.push({label:'Warm Up',duration:timer.warmup,type:'warmup'});
  for(const s of timer.phases){
    if(s.hard!==undefined&&s.reps){
      for(let i=1;i<=s.reps;i++){
        p.push({label:'Sprint '+i+'/'+s.reps,duration:s.hard,type:'hard'});
        p.push({label:'Recovery '+i+'/'+s.reps,duration:s.easy,type:'easy'});
      }
    }else if(s.tempo!==undefined){p.push({label:'Tempo',duration:s.tempo,type:'tempo'})}
    else if(s.test!==undefined){p.push({label:'GO!',duration:s.test,type:'test'})}
    else if(s.fartlek!==undefined){p.push({label:'Fartlek',duration:s.fartlek,type:'tempo'})}
    else if(s.easy!==undefined){p.push({label:'Easy Jog',duration:s.easy,type:'easy'})}
  }
  p.push({label:'Cool Down',duration:timer.cooldown,type:'cooldown'});
  return p;
}

function startRunTimer(ri){
  const key=currentRunBlock+'_'+currentRunWeek;
  const timer=SPEED_TIMERS[key];
  if(!timer)return;
  const phases=expandIntervals(timer);
  runTimerState={phases,phaseIdx:0,timeLeft:phases[0].duration,totalElapsed:0,running:true,runIndex:ri,interval:null,wakeLock:null};
  if(navigator.wakeLock){navigator.wakeLock.request('screen').then(l=>{if(runTimerState)runTimerState.wakeLock=l}).catch(()=>{})}
  renderTimerOverlay();
  runTimerState.interval=setInterval(tickRunTimer,1000);
}

function tickRunTimer(){
  if(!runTimerState||!runTimerState.running)return;
  runTimerState.timeLeft--;
  runTimerState.totalElapsed++;
  if(runTimerState.timeLeft<=0){
    runTimerState.phaseIdx++;
    if(runTimerState.phaseIdx>=runTimerState.phases.length){finishRunTimer();return}
    runTimerState.timeLeft=runTimerState.phases[runTimerState.phaseIdx].duration;
    if(navigator.vibrate){
      const nt=runTimerState.phases[runTimerState.phaseIdx].type;
      if(nt==='hard'||nt==='test')navigator.vibrate([200,100,200,100,200]);
      else navigator.vibrate([200,100,200]);
    }
  }
  renderTimerOverlay();
}

function renderTimerOverlay(){
  let ov=document.getElementById('run-timer-overlay');
  if(!ov){ov=document.createElement('div');ov.id='run-timer-overlay';ov.className='run-timer-overlay';document.body.appendChild(ov)}
  const st=runTimerState,ph=st.phases[st.phaseIdx];
  const colors={warmup:'var(--green)',easy:'var(--green)',hard:'var(--red-bright)',test:'var(--red-bright)',tempo:'var(--gold)',cooldown:'var(--iron)'};
  const c=colors[ph.type]||'var(--text)';
  const mm=Math.floor(st.timeLeft/60),ss=st.timeLeft%60;
  const cd=mm+':'+(ss<10?'0':'')+ss;
  const em=Math.floor(st.totalElapsed/60),es=st.totalElapsed%60;
  const el=em+':'+(es<10?'0':'')+es;
  const next=st.phaseIdx<st.phases.length-1?st.phases[st.phaseIdx+1]:null;
  const ns=next?'Next: '+next.label:'Last phase!';
  let dots='';
  st.phases.forEach((p,i)=>{
    const dc=i<st.phaseIdx?'var(--green)':i===st.phaseIdx?c:'var(--text-dim)';
    const sz=i===st.phaseIdx?'10px':'6px';
    dots+=`<span style="display:inline-block;width:${sz};height:${sz};border-radius:50%;background:${dc};margin:0 2px;transition:all 0.3s"></span>`;
  });
  ov.innerHTML=`<div style="text-align:center">
    <div class="run-timer-phase" style="color:${c}">${ph.label}</div>
    <div class="run-timer-countdown" style="color:${c}">${cd}</div>
    <div class="run-timer-dots">${dots}</div>
    <div class="run-timer-next">${ns}</div>
    <div class="run-timer-elapsed">Total: ${el}</div>
    <div class="run-timer-controls">
      <button class="run-timer-btn" onclick="${st.running?'pauseRunTimer()':'resumeRunTimer()'}" style="border:1px solid var(--iron);background:rgba(128,144,168,0.1);color:var(--iron)">${st.running?'PAUSE':'RESUME'}</button>
      <button class="run-timer-btn" onclick="stopRunTimer()" style="border:1px solid var(--red);background:rgba(200,80,80,0.1);color:var(--red)">STOP</button>
    </div>
  </div>`;
}

function pauseRunTimer(){if(runTimerState){runTimerState.running=false;renderTimerOverlay()}}
function resumeRunTimer(){if(runTimerState){runTimerState.running=true;renderTimerOverlay()}}

function finishRunTimer(){
  if(!runTimerState)return;
  clearInterval(runTimerState.interval);
  if(runTimerState.wakeLock)runTimerState.wakeLock.release().catch(()=>{});
  if(navigator.vibrate)navigator.vibrate([200,100,200,100,200,100,200]);
  const totalMin=Math.round(runTimerState.totalElapsed/6)/10;
  const ri=runTimerState.runIndex;
  const ov=document.getElementById('run-timer-overlay');
  if(ov)ov.remove();
  runTimerState=null;
  const tInput=document.getElementById('run-time-'+ri);
  if(tInput)tInput.value=totalMin;
  toast('Timer done! '+totalMin+' min');
}

function stopRunTimer(){
  if(!runTimerState)return;
  if(!confirm('Stop the timer?'))return;
  clearInterval(runTimerState.interval);
  if(runTimerState.wakeLock)runTimerState.wakeLock.release().catch(()=>{});
  const totalMin=Math.round(runTimerState.totalElapsed/6)/10;
  const ri=runTimerState.runIndex;
  const ov=document.getElementById('run-timer-overlay');
  if(ov)ov.remove();
  runTimerState=null;
  const tInput=document.getElementById('run-time-'+ri);
  if(tInput)tInput.value=totalMin;
}

function logExtraRun(){
  const timeVal=parseFloat(document.getElementById('run-time-extra').value);
  if(!timeVal||timeVal<=0){toast('Enter your time!');return}
  const distVal=parseFloat(document.getElementById('run-dist-extra').value)||null;
  const calVal=parseInt(document.getElementById('run-cal-extra').value)||null;
  const pace=(distVal&&distVal>0)?(timeVal/distVal):null;
  const wkLogs=(data.runLogs||[]).filter(l=>l.week===weekStart()&&l.block===currentRunBlock);
  const extraCount=wkLogs.filter(l=>l.isExtra).length;
  const entry={
    id:'run_'+Date.now(),date:dateStr(),week:weekStart(),block:currentRunBlock,weekNum:currentRunWeek,
    runIndex:3+extraCount,type:'easy',label:'Bonus Run',targetMin:null,
    actualMin:Math.round(timeVal*10)/10,actualKm:distVal?Math.round(distVal*100)/100:null,
    pace:pace?Math.round(pace*100)/100:null,calories:calVal,isExtra:true
  };
  if(!data.runLogs)data.runLogs=[];
  data.runLogs.push(entry);
  saveData();
  syncRunToCloud(entry);
  toast('Bonus run logged! '+timeVal+' min'+(distVal?' / '+distVal+' mi':''));
  renderWorkout();
}

function initWorkout(){
  // Try to recover in-progress workout
  try{
    const saved=JSON.parse(localStorage.getItem('workout_in_progress'));
    if(saved&&saved.program===data.activeProgram&&saved.day===currentDay){
      currentWorkout=saved.workout;workoutStartTime=saved.startTime;
      if(window._workoutTimerInt)clearInterval(window._workoutTimerInt);
      window._workoutTimerInt=setInterval(updateWorkoutTimer,1000);
      return;
    }
  }catch(e){}

  const prog=getProgram(data.activeProgram);if(!prog)return;
  const dayData=prog.days[currentDay];if(!dayData)return;

  currentWorkout={
    program:data.activeProgram,
    day:currentDay,
    date:dateStr(),
    exercises:dayData.ex.map((e,idx)=>{
      const sets=parseSets(e[4]);
      const lastLog=getLastLog(e[0]);
      return{
        name:e[0],nameEn:e[1],muscle:e[2],technique:e[3],
        targetSets:e[4],restSec:e[5],_baseIdx:idx,_origName:e[0],
        sets:sets.map((s,i)=>{
          // Match by type: find the i-th warmup or j-th working set in last log
          let prefillWeight='';
          const typeIdx=sets.slice(0,i).filter(ps=>ps.type===s.type).length;
          if(lastLog){
            const sameType=lastLog.sets.filter(ls=>ls.type===s.type);
            if(sameType[typeIdx])prefillWeight=sameType[typeIdx].weight;
          }
          // If start weight is set for this exercise, use it for WU and S1
          const startW=getStartWeight(e[0]);
          if(s.type==='warmup'&&startW.wu)prefillWeight=startW.wu;
          if(s.type==='working'&&typeIdx===0&&startW.s1)prefillWeight=startW.s1;
          const isAbsEx=currentDay==='ABS'&&e[2]==='abs';
          let prefillReps=s.reps;
          if(isAbsEx){
            prefillReps='';
            // Check persisted abs reps first (saved on every set check)
            const absReps=getAbsLastReps();
            if(absReps[e[0]]&&absReps[e[0]][typeIdx]){
              prefillReps=absReps[e[0]][typeIdx];
            } else if(lastLog){
              const sameType=lastLog.sets.filter(ls=>ls.type===s.type);
              if(sameType[typeIdx]&&sameType[typeIdx].reps)prefillReps=sameType[typeIdx].reps;
            }
          }
          return{
          weight:prefillWeight,
          reps:isAbsEx?prefillReps:s.reps,
          type:s.type,
          done:false
        };})
      };
    })
  };
  // Restore saved alt exercises
  currentWorkout.exercises.forEach(ex=>{
    const saved=getSavedAlt(currentWorkout.program,currentWorkout.day,ex._origName);
    if(saved){
      ex.name=saved.name;ex.nameEn=saved.nameEn;ex.muscle=saved.muscle;ex._isAlt=true;
      // Re-prefill weights from the alt exercise's last log
      const altLog=getLastLog(saved.name);
      if(altLog){
        const sets=ex.sets;
        sets.forEach((s,i)=>{
          const typeIdx=sets.slice(0,i).filter(ps=>ps.type===s.type).length;
          const sameType=altLog.sets.filter(ls=>ls.type===s.type);
          if(sameType[typeIdx])s.weight=sameType[typeIdx].weight;
        });
      }
    }
  });
  workoutStartTime=Date.now();
}

function getLastLog(exName){
  for(let i=data.logs.length-1;i>=0;i--){
    const log=data.logs[i];
    const ex=log.exercises.find(e=>e.name===exName);
    if(ex)return ex;
  }
  return null;
}

function getLastNLogs(exName,n){
  const results=[];
  for(let i=data.logs.length-1;i>=0&&results.length<n;i--){
    const ex=data.logs[i].exercises.find(e=>e.name===exName);
    if(ex)results.push(ex);
  }
  return results;
}

function getSuggestion(lastLog, targetReps, exName){
  if(!lastLog)return null;
  const working=lastLog.sets.filter(s=>s.type!=='warmup');
  if(working.length===0)return null;
  const target=targetReps||10;
  const maxWeight=Math.max(...working.map(s=>s.weight));
  const allHitTarget=working.every(s=>s.reps>=target);
  const someHitTarget=working.some(s=>s.reps>=target);
  const avgReps=working.reduce((a,s)=>a+s.reps,0)/working.length;
  const step=maxWeight>=100?5:maxWeight>=50?2.5:1;
  const repsStr=working.map(s=>s.reps).join('/');

  const history=exName?getLastNLogs(exName,8):[];

  // Count consecutive sessions hitting all target reps
  let streak=0;
  for(const h of history){
    const w=h.sets.filter(s=>s.type!=='warmup');
    if(w.every(s=>s.reps>=target))streak++;else break;
  }
  // Count consecutive sessions struggling (<70% avg reps)
  let failStreak=0;
  for(const h of history){
    const w=h.sets.filter(s=>s.type!=='warmup');
    const avg=w.reduce((a,s)=>a+s.reps,0)/w.length;
    if(avg<target*0.7)failStreak++;else break;
  }

  // Weight advice
  let weightTip='',type='stay';
  if(streak>=4&&allHitTarget){
    weightTip='Increase to '+fmt(maxWeight+step)+' lbs — hit target '+streak+'x in a row';
    type='up';
  } else if(allHitTarget){
    weightTip='Hit all '+target+' reps — keep building ('+streak+'/4 sessions)';
    type='up';
  } else if(avgReps>=target*0.7&&someHitTarget){
    weightTip='Stay at '+fmt(maxWeight)+' lbs — got '+repsStr+' (target: '+target+')';
    type='stay';
  } else if(failStreak>=4){
    weightTip='Pull back to '+fmt(maxWeight-step)+' lbs — struggling '+failStreak+' sessions';
    type='down';
  } else if(avgReps<target*0.7){
    weightTip='Tough session — got '+repsStr+' ('+failStreak+'/4 before pullback)';
    type='down';
  } else {
    weightTip='Stay at '+fmt(maxWeight)+' lbs — got '+repsStr;
    type='stay';
  }

  // Trend (3+ sessions)
  let trendHtml='';
  if(history.length>=3){
    const weights=history.map(h=>{
      const w=h.sets.filter(s=>s.type!=='warmup'&&s.weight>0);
      return w.length?Math.max(...w.map(s=>s.weight)):0;
    }).reverse();
    const first=weights[0],last=weights[weights.length-1];
    const pct=first>0?((last-first)/first*100):0;
    const allFlat=weights.every(w=>first>0&&Math.abs(w-first)/first<0.05);
    if(allFlat){
      trendHtml='<div class="sug-trend">&#8212; Plateau '+history.length+' sessions — try varying rep range or technique</div>';
    } else if(pct>5){
      trendHtml='<div class="sug-trend sug-trend-up">&#9650; Up '+pct.toFixed(0)+'% over '+history.length+' sessions</div>';
    } else if(pct<-5){
      trendHtml='<div class="sug-trend sug-trend-down">&#9660; Down '+Math.abs(pct).toFixed(0)+'% — consider a deload week</div>';
    }
  }

  const icon=type==='up'?'&#9650;':type==='down'?'&#9660;':'&#9654;';
  return{type,text:'<div class="sug-main">'+icon+' '+weightTip+'</div>'+trendHtml};
}

function flipSign(inp){const v=inp.value;inp.value=v?(v.startsWith('-')?v.slice(1):'-'+v):'-';inp.dispatchEvent(new Event('change'));}
function updateSet(ei,si,field,val){
  if(!currentWorkout)return;
  const v=field==='weight'?parseFloat(val.replace(/,/g,''))||'':parseInt(val)||0;
  currentWorkout.exercises[ei].sets[si][field]=v;
  if(field==='weight')updatePlateCorner(ei);
  localStorage.setItem('workout_in_progress',JSON.stringify({workout:currentWorkout,startTime:workoutStartTime,program:data.activeProgram,day:currentDay}));
}
function updatePlateCorner(ei){
  const ex=currentWorkout.exercises[ei];
  const card=document.getElementById('ex-'+ei);
  if(!card)return;
  let old=card.querySelector('.plate-corner');
  if(!old)old=card.querySelector('.plate-corner-show');
  const isAbs=currentDay==='ABS'&&ex.muscle==='abs';
  if(isAbs||!showPlateForEx(ex.name)){if(old)old.remove();return;}
  const wuSets=ex.sets.filter(s=>s.type==='warmup');
  const allWuDone=wuSets.length>0&&wuSets.every(s=>s.done);
  let pw=0,pl='';
  if(!allWuDone&&wuSets.length>0){pw=parseFloat((''+wuSets[0].weight).replace(/,/g,''))||0;pl='WU';}
  else{
    const workingSets=ex.sets.filter(s=>s.type==='working');
    const nextIdx=workingSets.findIndex(s=>!s.done);
    if(nextIdx>=0){pw=parseFloat((''+workingSets[nextIdx].weight).replace(/,/g,''))||0;pl='S'+(nextIdx+1);}
  }
  if(pw>0&&pl){
    const pr=calcPlates(pw,getExPlates(ex.name),isSingleEnd(ex.name));
    const ps=pr.breakdown.map(b=>b.count>1?b.count+'×'+b.plate:b.plate).join(' + ')+(pr.remainder>0?' + '+pr.remainder+'?':'');

function toggleSet(ei,si){

  const set=currentWorkout.exercises[ei].sets[si];
  set.done=!set.done;

  // Read current input values
  const card=document.getElementById('ex-'+ei);
  const inputs=card.querySelectorAll('.set-row')[si].querySelectorAll('.set-input');

  if(isAbsEx){
    set.weight=0;
    set.reps=parseInt(inputs[0].value)||0;
  } else {
    set.weight=parseFloat(inputs[0].value.replace(/,/g,''))||0;
    set.reps=parseInt(inputs[1].value)||0;
  }


  // PRs are only recorded on finish workout — not mid-workout


  // Auto-save progress on every set toggle
  const ex=currentWorkout.exercises[ei];
  const rows=card.querySelectorAll('.set-row');
  ex.sets.forEach((s,i)=>{
    if(rows[i]){
      const inp=rows[i].querySelectorAll('.set-input');

        s.weight=parseFloat(inp[0].value.replace(/,/g,''))||0;

}

function renameExercise(ei){
  if(!currentWorkout)return;
  const oldName=currentWorkout.exercises[ei].name;
  const newName=prompt('Rename exercise:',oldName);
  if(!newName||newName.trim()===oldName)return;
  const trimmed=newName.trim();
  const oldId=exId(oldName);
  const newId=exId(trimmed);
  // Rename in current workout
  currentWorkout.exercises[ei].name=trimmed;
  // Rename in all logs
  (data.logs||[]).forEach(log=>{
    (log.exercises||[]).forEach(ex=>{if(ex.name===oldName)ex.name=trimmed;});
  });
  // Rename PRs
  if(data.prs[oldId]){data.prs[newId]=data.prs[oldId];delete data.prs[oldId];}
  // Rename holds
  const h=getHolds();if(h[oldName]){h[trimmed]=h[oldName];delete h[oldName];saveHolds(h);}
  // Rename notes
  const n=getExNotes();if(n[oldName]){n[trimmed]=n[oldName];delete n[oldName];saveExNotes(n);}
  // Rename start weights
  const s=getStartWeights();if(s[oldName]){s[trimmed]=s[oldName];delete s[oldName];saveStartWeights(s);}
  saveData();
  syncToCloud();
  renderExerciseCards();
  toast('Renamed to '+trimmed);
}

function getBestWeight(exName){
  const id=exId(exName);
  const pr=data.prs[id];
  if(!pr)return findATH(exName);
  let best=0;
  for(const r in pr){if(pr[r].weight>best)best=pr[r].weight}
  return best||findATH(exName);
}

function findATH(name){
  // Exact match only — no partial/substring matching
  if(ATH_DATA[name])return ATH_DATA[name];
  return 0;
}

// ── PR DETECTION ──
function checkPR(ei,exName,weight,reps){
  const id=exId(exName);
  if(!data.prs[id])data.prs[id]={};
  const current=data.prs[id][reps];
  if(!current||weight>current.weight){
    data.prs[id][reps]={weight,date:dateStr(),program:data.activeProgram};
    saveData();
    // Show PR flash
    const flash=document.getElementById('pr-flash-'+ei);
    if(flash){flash.classList.add('show');setTimeout(()=>flash.classList.remove('show'),3000)}
    toast('NEW PR! '+exName+': '+weight+'lbs x '+reps);
  }
}

function calcE1RM(weight,reps){
  if(reps<=0||reps>30)return 0;
  if(reps===1)return weight;
  return Math.round(weight*36/(37-reps)*10)/10;
}

// ── REST TIMER ──
function startRest(seconds){
  restTimeLeft=seconds;
  clearInterval(restTimerInterval);
  const el=document.getElementById('restTimer');
  el.classList.add('active');
  updateRestDisplay();
  restTimerInterval=setInterval(()=>{
    restTimeLeft--;
    if(restTimeLeft<=0){
      clearInterval(restTimerInterval);
      restTimeLeft=0;
      document.getElementById('restTime').textContent='GO!';
      document.getElementById('restTime').className='rest-time done';
      try{navigator.vibrate&&navigator.vibrate([200,100,200])}catch(e){}
      setTimeout(()=>skipRest(),2000);
    }else{
      updateRestDisplay();
    }
  },1000);
}

function updateRestDisplay(){
  const m=Math.floor(restTimeLeft/60);
  const s=restTimeLeft%60;
  const el=document.getElementById('restTime');
  el.textContent=m+':'+(s<10?'0':'')+s;
  el.className='rest-time'+(restTimeLeft<=10?' warning':'');
}

function addRestTime(sec){restTimeLeft+=sec;updateRestDisplay()}
function skipRest(){
  clearInterval(restTimerInterval);
  document.getElementById('restTimer').classList.remove('active');
}

// ── FINISH WORKOUT ──
function finishWorkout(){
  if(!currentWorkout)return;
  if(!currentWorkout.exercises.some(ex=>ex.sets.some(s=>s.done))){
    toast('No sets completed yet!');return;
  }
  // Save all input values
  currentWorkout.exercises.forEach((ex,ei)=>{
    const card=document.getElementById('ex-'+ei);
    if(!card)return;
    const rows=card.querySelectorAll('.set-row');
    const isAbsEx=currentDay==='ABS'&&ex.muscle==='abs';
    ex.sets.forEach((set,si)=>{
      if(rows[si]){
        const inputs=rows[si].querySelectorAll('.set-input');
        if(isAbsEx){
          set.weight=0;
          set.reps=parseInt(inputs[0].value)||0;
        } else {
          set.weight=parseFloat(inputs[0].value.replace(/,/g,''))||0;
          set.reps=parseInt(inputs[1].value)||0;
        }
      }
    });
  });

  const logEntry={
    id:'log_'+Date.now(),
    date:currentWorkout.date,
    program:currentWorkout.program,
    day:currentWorkout.day,
    exercises:currentWorkout.exercises.map(ex=>({
      name:ex.name,
      sets:ex.sets.filter(s=>s.done).map(s=>({weight:s.weight,reps:s.reps,type:s.type}))
    })).filter(ex=>ex.sets.length>0),
    duration:workoutStartTime?Math.round((Date.now()-workoutStartTime)/60000):0
  };

  data.logs.push(logEntry);

  // Auto-detect PRs for all completed sets
  logEntry.exercises.forEach(ex=>{
    ex.sets.filter(s=>s.type==='working'&&s.weight>0).forEach(s=>{
      const id=exId(ex.name);
      if(!data.prs[id])data.prs[id]={};
      const current=data.prs[id][s.reps];
      if(!current||s.weight>current.weight){
        data.prs[id][s.reps]={weight:s.weight,date:logEntry.date,program:logEntry.program};
      }
    });
  });

  saveData();
  syncWorkoutToCloud(logEntry);
  syncConfigToCloud();
  syncExtraToCloud();
  localStorage.removeItem('workout_in_progress');
  currentWorkout=null;
  workoutStartTime=null;
  skipRest();
  toast('Workout saved! '+logEntry.exercises.length+' exercises logged');
  currentDay=getNextDay();
  showView('workout',document.querySelectorAll('.nav-btn')[0]);
}

function getLoggedExerciseNames(){
  const names=new Set();
  (data.logs||[]).forEach(log=>(log.exercises||[]).forEach(ex=>names.add(ex.name)));
  return[...names].sort();
}

var openMuscleGroups={};
var ssRange=4;
var ssPlateauDismissed=false;

function calcStrengthScore(){
  // Walk logs chronologically, build running best e1RM per exercise, compute score at each date
  const sorted=[...data.logs].sort((a,b)=>a.date.localeCompare(b.date));
  const runningBest={}; // exId -> {[reps]: weight}
  const series=[]; // [{date, score, muscles:{chest:180, back:210, ...}}]
  const seenDates=new Set();

  sorted.forEach(log=>{
    (log.exercises||[]).forEach(ex=>{
      const id=exId(ex.name);
      if(!runningBest[id])runningBest[id]={};
      (ex.sets||[]).filter(s=>s.type==='working'&&s.weight>0).forEach(s=>{
        if(!runningBest[id][s.reps]||s.weight>runningBest[id][s.reps])
          runningBest[id][s.reps]=s.weight;
      });
    });

    // Compute score at this date: best e1RM per muscle group
    const muscleMax={};
    const loggedNames=new Set();
    sorted.filter(l=>l.date<=log.date).forEach(l=>(l.exercises||[]).forEach(e=>loggedNames.add(e.name)));
    loggedNames.forEach(name=>{
      const id=exId(name);
      const best=runningBest[id];
      if(!best)return;
      let e1rm=0;
      for(const r in best){const v=calcE1RM(best[r],+r);if(v>e1rm)e1rm=v;}
      if(e1rm<=0)return;
      const muscle=getExerciseMuscle(name)||'other';
      if(!muscleMax[muscle]||e1rm>muscleMax[muscle])muscleMax[muscle]=e1rm;
    });
    const score=Object.values(muscleMax).reduce((s,v)=>s+v,0);
    // Only add one data point per date
    if(!seenDates.has(log.date)){
      seenDates.add(log.date);
      series.push({date:log.date,score:Math.round(score),muscles:{...muscleMax}});
    } else {
      // Update existing date entry with latest score
      const entry=series.find(s=>s.date===log.date);
      if(entry){entry.score=Math.round(score);entry.muscles={...muscleMax};}
    }
  });

  // Current score from data.prs (may be higher than logs if manual PRs added)
  const currentMuscles={};
  const loggedNames=new Set();
  (data.logs||[]).forEach(log=>(log.exercises||[]).forEach(ex=>loggedNames.add(ex.name)));
  loggedNames.forEach(name=>{
    const id=exId(name);
    const prs=data.prs[id]||{};
    let e1rm=0;
    for(const r in prs){const v=calcE1RM(prs[r].weight,+r);if(v>e1rm)e1rm=v;}
    if(e1rm<=0)return;
    const muscle=getExerciseMuscle(name)||'other';
    if(!currentMuscles[muscle]||e1rm>currentMuscles[muscle])currentMuscles[muscle]=e1rm;
  });
  const currentScore=Math.round(Object.values(currentMuscles).reduce((s,v)=>s+v,0));

  return{current:currentScore,muscles:currentMuscles,series};
}

function renderStrengthScore(){
  const el=document.getElementById('strengthScore');
  const result=calcStrengthScore();
  if(result.current===0){el.innerHTML='';return;}

  // Filter series by range
  let series=result.series;
  if(ssRange>0){
    const cutoff=new Date(Date.now()-ssRange*7*86400000);
    series=series.filter(s=>new Date(s.date)>=cutoff);
  }

  // Trend calc
  let trendHtml='';
  if(series.length>=2){
    const first=series[0].score;
    const last=result.current;
    const pct=((last-first)/first*100).toFixed(1);
    const dir=last>first?'up':last<first?'down':'flat';
    const arrow=dir==='up'?'&#9650; +':dir==='down'?'&#9660; ':'';
    const label=ssRange===4?'1 month':ssRange===13?'3 months':ssRange===26?'6 months':ssRange===52?'1 year':ssRange===0?'all time':'all time';
    trendHtml=`<div class="ss-trend ${dir}">${arrow}${pct}% over ${label}</div>`;
  }

  // Muscle breakdown
  const muscleOrder=MUSCLE_GROUPS.filter(m=>result.muscles[m]);
  const extraMuscles=Object.keys(result.muscles).filter(m=>!MUSCLE_GROUPS.includes(m)).sort();
  const allMuscles=[...muscleOrder,...extraMuscles];
  const breakdownHtml=allMuscles.map(m=>{
    const label=(MUSCLE_LABELS[m]||m);
    return`<span class="ss-muscle">${label}: <span>${Math.round(result.muscles[m])}</span></span>`;
  }).join('');

  // Range tabs
  const ranges=[{w:4,l:'1M'},{w:13,l:'3M'},{w:26,l:'6M'},{w:52,l:'1Y'},{w:0,l:'AT'}];
  const tabsHtml=ranges.map(r=>`<button class="ss-range-tab${ssRange===r.w?' active':''}" onclick="ssRange=${r.w};renderStrengthScore()">${r.l}</button>`).join('');

  // Plateau detection: score unchanged for 3+ weeks with 4+ workouts
  let plateauHtml='';
  if(!ssPlateauDismissed&&result.series.length>=4){
    const sixWeeksAgo=new Date(Date.now()-42*86400000);
    const recentSeries=result.series.filter(s=>new Date(s.date)>=sixWeeksAgo);
    if(recentSeries.length>=3){
      const scores=recentSeries.map(s=>s.score);
      const maxRecent=Math.max(...scores);
      const minRecent=Math.min(...scores);
      const pctChange=(maxRecent-minRecent)/maxRecent*100;
      if(pctChange<1){
        // Find weakest muscle group (lowest e1RM contribution)
        const sorted=Object.entries(result.muscles).sort((a,b)=>a[1]-b[1]);
        const weakest=sorted[0]?(MUSCLE_LABELS[sorted[0][0]]||sorted[0][0]):'';
        const tips=['Consider switching to a new program or phase','Try adding volume — an extra set per exercise','Take a deload week, then push heavier','Focus on your weakest area'+(weakest?': '+weakest:'')];
        const tip=tips[Math.floor(Date.now()/86400000)%tips.length];
        plateauHtml=`<div class="ss-plateau">
          <button class="ss-plat-dismiss" onclick="ssPlateauDismissed=true;renderStrengthScore()">&times;</button>
          <div class="ss-plat-title">&#9888; Plateau Detected</div>
          Score hasn't changed in 6+ weeks.<br>
          <span class="ss-plat-tip">${tip}</span>
        </div>`;
      }
    }
  }

  el.innerHTML=`<div class="ss-hero">
    <div class="ss-label">Strength Score</div>
    <div class="ss-number">${result.current.toLocaleString()}</div>
    ${trendHtml}
    <div class="ss-chart"><canvas id="ssChart" width="600" height="120"></canvas><div class="ss-tooltip" id="ssTooltip"><div class="ss-tt-score"></div><div class="ss-tt-date"></div></div></div>
    <div class="ss-range-tabs">${tabsHtml}</div>
    <div class="ss-breakdown">${breakdownHtml}</div>
    ${plateauHtml}
  </div>`;

  // Draw sparkline
  drawSSChart(series,result.current);
}

var ssChartData=null;
var ssSeries=null,ssCurrentScore=0;

function drawSSChart(series,currentScore,highlightIdx){
  ssSeries=series;ssCurrentScore=currentScore;
  const canvas=document.getElementById('ssChart');
  if(!canvas||series.length<2)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width=canvas.parentElement.offsetWidth;
  const H=canvas.height=120;
  ctx.clearRect(0,0,W,H);

  const pts=[...series];
  const lastEntry=pts[pts.length-1];
  if(lastEntry.score!==currentScore)pts.push({date:dateStr(),score:currentScore});

  const pad={t:14,r:10,b:18,l:40};
  const cW=W-pad.l-pad.r;
  const cH=H-pad.t-pad.b;
  const scores=pts.map(p=>p.score);
  const minS=Math.min(...scores)*0.95;
  const maxS=Math.max(...scores)*1.02;
  const range=maxS-minS||1;

  // Grid
  ctx.strokeStyle='rgba(128,144,168,0.1)';ctx.lineWidth=1;
  for(let i=0;i<=3;i++){
    const y=pad.t+cH*(i/3);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.fillStyle='#585e70';ctx.font='9px Oswald,sans-serif';ctx.textAlign='right';
    ctx.fillText(Math.round(maxS-range*(i/3)),pad.l-4,y+3);
  }

  // Gradient fill
  const grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  grad.addColorStop(0,'rgba(184,168,120,0.2)');
  grad.addColorStop(1,'rgba(184,168,120,0)');

  const pathPts=pts.map((p,i)=>({
    x:pad.l+cW*(i/(pts.length-1)),
    y:pad.t+cH*(1-(p.score-minS)/range),
    score:p.score,date:p.date
  }));

  ssChartData={canvas,pathPts,pad,W,H};

  // Fill
  ctx.beginPath();ctx.moveTo(pathPts[0].x,H-pad.b);
  pathPts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pathPts[pathPts.length-1].x,H-pad.b);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();

  // Line
  ctx.lineWidth=2;ctx.beginPath();
  pathPts.forEach((p,i)=>{if(i===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y)});
  ctx.strokeStyle='#b8a878';ctx.stroke();

  // Dots
  pathPts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fillStyle='#b8a878';ctx.fill()});

  // End glow
  const last=pathPts[pathPts.length-1];
  ctx.beginPath();ctx.arc(last.x,last.y,6,0,Math.PI*2);
  ctx.strokeStyle='rgba(184,168,120,0.4)';ctx.lineWidth=1;ctx.stroke();

  // Date labels
  ctx.fillStyle='#585e70';ctx.font='8px sans-serif';ctx.textAlign='center';
  const step=Math.max(1,Math.floor(pts.length/4));
  pts.forEach((p,i)=>{
    if(i%step===0||i===pts.length-1){
      const x=pad.l+cW*(i/(pts.length-1));
      ctx.fillText(p.date.slice(5),x,H-3);
    }
  });

  // Scrubber crosshair
  if(highlightIdx!=null&&pathPts[highlightIdx]){
    const hp=pathPts[highlightIdx];
    ctx.strokeStyle='rgba(184,168,120,0.5)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(hp.x,pad.t);ctx.lineTo(hp.x,H-pad.b);ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();ctx.arc(hp.x,hp.y,6,0,Math.PI*2);ctx.fillStyle='rgba(184,168,120,0.3)';ctx.fill();
    ctx.beginPath();ctx.arc(hp.x,hp.y,4,0,Math.PI*2);ctx.fillStyle='#b8a878';ctx.fill();
  }

  // Attach events (only on initial draw)
  if(highlightIdx==null){
    canvas.onmousedown=canvas.ontouchstart=ssStartScrub;
  }
}

function ssGetClosestIdx(e){
  if(!ssChartData)return-1;
  const rect=ssChartData.canvas.getBoundingClientRect();
  const scaleX=ssChartData.canvas.width/rect.width;
  const clientX=e.touches?e.touches[0].clientX:e.clientX;
  const x=(clientX-rect.left)*scaleX;
  let bestIdx=0,minDist=Infinity;
  ssChartData.pathPts.forEach((p,i)=>{const d=Math.abs(p.x-x);if(d<minDist){minDist=d;bestIdx=i}});
  return bestIdx;
}

function ssStartScrub(e){
  e.preventDefault();
  ssScrubMove(e);
  if(e.type==='mousedown'){
    document.onmousemove=ssScrubMove;
    document.onmouseup=ssEndScrub;
  } else {
    ssChartData.canvas.ontouchmove=ssScrubMove;
    ssChartData.canvas.ontouchend=ssEndScrub;
    ssChartData.canvas.ontouchcancel=ssEndScrub;
  }
}

function ssScrubMove(e){
  if(!ssChartData)return;
  const idx=ssGetClosestIdx(e);
  const p=ssChartData.pathPts[idx];
  if(!p)return;

  // Redraw with highlight
  drawSSChart(ssSeries,ssCurrentScore,idx);

  // Position tooltip
  const tooltip=document.getElementById('ssTooltip');
  const rect=ssChartData.canvas.getBoundingClientRect();
  const scaleX=ssChartData.canvas.width/rect.width;
  let left=p.x/scaleX;
  if(left<50)left=50;
  if(left>rect.width-50)left=rect.width-50;
  tooltip.style.left=left+'px';
  tooltip.style.top=Math.max(0,p.y/scaleX-32)+'px';
  tooltip.querySelector('.ss-tt-score').textContent=p.score.toLocaleString();
  tooltip.querySelector('.ss-tt-date').textContent=p.date;
  tooltip.classList.add('show');
}

function ssEndScrub(){
  document.onmousemove=null;
  document.onmouseup=null;
  if(ssChartData&&ssChartData.canvas){
    ssChartData.canvas.ontouchmove=null;
    ssChartData.canvas.ontouchend=null;
    ssChartData.canvas.ontouchcancel=null;
  }
  const tooltip=document.getElementById('ssTooltip');
  if(tooltip)tooltip.classList.remove('show');
  drawSSChart(ssSeries,ssCurrentScore);
}

function renderRunProgress(){
  const logs=data.runLogs||[];
  if(logs.length===0)return '';
  const totalRuns=logs.length;
  const totalMin=logs.reduce((s,l)=>s+(l.actualMin||0),0);
  const totalKm=logs.reduce((s,l)=>s+(l.actualKm||0),0);
  const realCal=logs.reduce((s,l)=>s+(l.calories||0),0);
  const logsNoCal=logs.filter(l=>!l.calories);
  const estFromTime2=Math.round(logsNoCal.reduce((s,l)=>s+(l.actualMin||0),0)*10);
  const totalCal2=realCal+estFromTime2;
  const calLabel2=logs.some(l=>l.calories>0)&&logsNoCal.length>0?'Calories (mixed)':logs.some(l=>l.calories>0)?'Calories':'Est. calories';
  const estLbs=(totalCal2/3500).toFixed(1);
  const paced=logs.filter(l=>l.pace&&l.pace>0);
  const bestPace=paced.length>0?Math.min(...paced.map(l=>l.pace)):0;
  const bestPaceStr=bestPace>0?fmtPace(bestPace):'--';
  const avgPace=totalKm>0?totalMin/totalKm:0;
  const avgPaceStr=avgPace>0?fmtPace(avgPace):'--';
  const longestMin=Math.max(...logs.map(l=>l.actualMin||0));
  // Weekly breakdown
  const weeks={};
  logs.forEach(l=>{if(!weeks[l.week])weeks[l.week]=[];weeks[l.week].push(l)});
  const weekKeys=Object.keys(weeks).sort().reverse();
  let html=`<div class="card" style="margin-bottom:14px">
    <div class="card-title" style="margin-bottom:10px">Running Progress</div>
    <div class="run-stat-row"><span class="run-stat-label">Total runs</span><span class="run-stat-value">${totalRuns}</span></div>
    <div class="run-stat-row"><span class="run-stat-label">Total time</span><span class="run-stat-value">${Math.round(totalMin)} min</span></div>
    ${totalKm>0?`<div class="run-stat-row"><span class="run-stat-label">Total distance</span><span class="run-stat-value">${totalKm.toFixed(1)} mi</span></div>`:''}
    <div class="run-stat-row"><span class="run-stat-label">Avg pace</span><span class="run-stat-value">${avgPaceStr}</span></div>
    <div class="run-stat-row"><span class="run-stat-label">Best pace</span><span class="run-stat-value">${bestPaceStr}</span></div>
    <div class="run-stat-row"><span class="run-stat-label">Longest run</span><span class="run-stat-value">${longestMin} min</span></div>
    <div class="run-stat-row"><span class="run-stat-label">${calLabel2}</span><span class="run-stat-value">${totalCal2.toLocaleString()}</span></div>
    <div class="run-stat-row"><span class="run-stat-label">Est. lbs burned</span><span class="run-stat-value">${estLbs} lbs</span></div>
  </div>`;
  if(weekKeys.length>0){
    html+=`<div class="card" style="margin-bottom:14px">
      <div class="card-title" style="margin-bottom:10px">Weekly Running Log</div>`;
    weekKeys.slice(0,6).forEach(wk=>{
      const wkLogs=weeks[wk];
      const wkMin=wkLogs.reduce((s,l)=>s+(l.actualMin||0),0);
      const wkKm=wkLogs.reduce((s,l)=>s+(l.actualKm||0),0);
      html+=`<div style="padding:8px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between">
          <span class="run-stat-label">Week of ${wk}</span>
          <span class="run-stat-value">${wkLogs.length} runs / ${Math.round(wkMin)} min${wkKm>0?' / '+wkKm.toFixed(1)+' mi':''}</span>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }
  // Speed Run History with toggle
  const speedAll=logs.filter(l=>l.type==='speed'&&l.pace&&l.pace>0).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const speedTests=speedAll.filter(l=>l.label&&l.label.includes('Speed Test'));
  if(speedAll.length>0){
    const renderRows=(arr)=>{
      let rows='',pp=null;
      arr.forEach(t=>{
        const bl=t.block?t.block.replace('BLOCK','B'):'';
        const ps=fmtPace(t.pace);
        let imp='';
        if(pp){
          if(t.pace<pp)imp=` <span style="color:var(--green)">&uarr; ${Math.round((1-t.pace/pp)*100)}%</span>`;
          else if(t.pace>pp)imp=` <span style="color:var(--red)">&darr; ${Math.round((t.pace/pp-1)*100)}%</span>`;
        }
        rows+=`<div style="padding:8px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px">
            <span class="run-stat-label">${bl} W${t.weekNum} ${t.label||''}</span>
            <span class="run-stat-value">${t.actualMin}m &bull; ${t.actualKm}mi &bull; ${ps}${imp}</span>
          </div>
        </div>`;
        pp=t.pace;
      });
      return rows;
    };
    html+=`<div class="card" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="card-title" style="margin:0">&#x23F1; Speed Run History</div>
        <button onclick="document.getElementById('speed-all').style.display=document.getElementById('speed-all').style.display==='none'?'':'none';document.getElementById('speed-tests').style.display=document.getElementById('speed-tests').style.display==='none'?'':'none';this.textContent=this.textContent==='Tests Only'?'All Runs':'Tests Only'" style="background:none;border:1px solid var(--border);color:var(--gold);border-radius:var(--radius-sm);padding:4px 10px;font-family:'Oswald',sans-serif;font-size:0.7rem;cursor:pointer;text-transform:uppercase;letter-spacing:1px">${speedTests.length>0?'Tests Only':'All Runs'}</button>
      </div>
      <div id="speed-all">${renderRows(speedAll)}</div>
      <div id="speed-tests" style="display:none">${speedTests.length>0?renderRows(speedTests):'<div style="padding:12px;text-align:center;color:var(--text-dim);font-size:0.82rem">No speed tests logged yet. Complete a Week 8 speed test!</div>'}</div>
    </div>`;
  }
  return html;
}

function renderProgress(){
  renderStrengthScore();
  const query=(document.getElementById('progressSearch').value||'').toLowerCase();
  const allNames=getAllExerciseNames();

  // Only include exercises that appear in actual workout logs
  const loggedNames=new Set();
  (data.logs||[]).forEach(log=>(log.exercises||[]).forEach(ex=>loggedNames.add(ex.name)));

  // Build exercise data
  const exerciseData=[];
  allNames.forEach((name,idx)=>{
    const id=exId(name);
    const hasATH=!!findATH(name);
    if(!loggedNames.has(name)&&!(data.prs[id]&&Object.keys(data.prs[id]).length>0)&&!hasATH)return;
    if(query&&!name.toLowerCase().includes(query)&&!(getExerciseEnglish(name)||'').toLowerCase().includes(query))return;
    const prs=data.prs[id]||{};
    const athVal=findATH(name);
    const repCounts=Object.keys(prs).filter(k=>!isNaN(+k)).map(Number).sort((a,b)=>a-b);
    if(repCounts.length===0&&!athVal)return;
    let best1rm=0;
    repCounts.forEach(r=>{const e=calcE1RM(prs[r].weight,r);if(e>best1rm)best1rm=e});
    const equip=getExerciseEquip(name);
    const muscle=getExerciseMuscle(name);
    exerciseData.push({name,idx,prs,athVal,repCounts,best1rm,equip,muscle});
  });

  // Group by muscle
  const muscleGroups={};
  exerciseData.forEach(ex=>{
    const m=ex.muscle||'other';
    if(!muscleGroups[m])muscleGroups[m]=[];
    muscleGroups[m].push(ex);
  });

  // Auto-open groups when searching
  if(query){Object.keys(muscleGroups).forEach(m=>{openMuscleGroups[m]=true})}

  // Order: MUSCLE_GROUPS first, then extras
  const muscleOrder=[...MUSCLE_GROUPS.filter(m=>muscleGroups[m]),...Object.keys(muscleGroups).filter(m=>!MUSCLE_GROUPS.includes(m)).sort()];

  let html='';
  muscleOrder.forEach(m=>{
    const exercises=muscleGroups[m];
    if(!exercises||!exercises.length)return;
    const label=(MUSCLE_LABELS[m]||m).toUpperCase();
    const isOpen=!!openMuscleGroups[m];

    html+=`<div class="pc-muscle-row${isOpen?' open':''}" onclick="toggleMuscleGroup('${m}')">
      <span class="pc-muscle-name">${label}</span>
      <span><span class="pc-muscle-count">${exercises.length}</span> <span class="pc-muscle-arrow">&#9654;</span></span>
    </div>`;

    if(isOpen){
      html+=`<div class="pc-muscle-content open">`;
      // Sub-group by equipment
      const equipGroups={};
      exercises.forEach(ex=>{if(!equipGroups[ex.equip])equipGroups[ex.equip]=[];equipGroups[ex.equip].push(ex)});
      const equipOrder=Object.keys(equipGroups).sort();
      equipOrder.forEach(equip=>{
        if(equipOrder.length>1)html+=`<div class="pc-equip-label">${equip}</div>`;
        html+=`<div class="pc-grid">`;
        equipGroups[equip].forEach(ex=>{
          const{name,idx,prs,athVal,repCounts,best1rm}=ex;
          const isExpanded=expandedExercise===name;
          const enName=getExerciseEnglish(name);
          const esc=name.replace(/'/g,"\\'");

          if(isExpanded){
            html+=`<div class="progress-card expanded" id="pc-${idx}" onclick="toggleProgressCard('${esc}',${idx})">
              <div class="pc-header">
                <div><span class="pc-name">${name}</span>${enName&&enName!==name?`<span class="pc-name-en">${enName}</span>`:''}</div>
                <div style="text-align:right">
                  <div class="pc-ath">${athVal||fmt(Math.max(...repCounts.map(r=>prs[r].weight)))} lbs</div>
                  ${best1rm?`<div class="pc-1rm">est. 1RM: ${fmt(best1rm)} lbs</div>`:''}
                </div>
              </div>
              <div class="pc-detail" onclick="event.stopPropagation()">
                <table class="pr-table">`;
            repCounts.forEach(r=>{
              const pr=prs[r];
              const isRecent=pr.date&&new Date(pr.date)>new Date(Date.now()-14*86400000);
              const isBest=repCounts.length>1&&calcE1RM(pr.weight,r)===best1rm;
              html+=`<tr><td class="rep-col">${r} reps</td><td class="weight-col${isBest?' crown':''}">${isBest?'<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-right:2px;color:var(--accent)"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>':''}${fmt(pr.weight)} lbs</td><td class="date-col${isRecent?' recent':''}">${pr.date||''}</td></tr>`;
            });
            html+=`</table>
                <div style="margin-top:12px">
                  <div class="range-tabs">
                    <button class="range-tab${(cardRanges[name]||4)===4?' active':''}" onclick="setCardRange('${esc}',4,this)">4W</button>
                    <button class="range-tab${(cardRanges[name]||4)===8?' active':''}" onclick="setCardRange('${esc}',8,this)">8W</button>
                    <button class="range-tab${(cardRanges[name]||4)===12?' active':''}" onclick="setCardRange('${esc}',12,this)">12W</button>
                    <button class="range-tab${(cardRanges[name]||4)===0?' active':''}" onclick="setCardRange('${esc}',0,this)">All</button>
                  </div>
                  <div class="chart-container" style="margin-top:0"><canvas id="chart-${idx}" width="600" height="150"></canvas></div>
                </div>
                <div class="card-sub" style="margin:8px 0 6px">Session History</div>
                <div id="history-${idx}"></div>
              </div>
            </div>`;
          } else {
            const tileWeight=athVal||Math.max(...repCounts.map(r=>prs[r].weight));
            html+=`<div class="progress-card" id="pc-${idx}" onclick="toggleProgressCard('${esc}',${idx})">
              <span class="pc-name">${name}</span>
              ${enName&&enName!==name?`<span class="pc-name-en">${enName}</span>`:''}
              <div class="pc-tile-ath">${fmt(tileWeight)} lbs</div>
            </div>`;
          }
        });
        html+=`</div>`;
      });
      html+=`</div>`;
    }
  });

  // Running progress section
  const runHtml=renderRunProgress();
  document.getElementById('progressCards').innerHTML=runHtml+(html||'<div style="color:var(--text-dim);text-align:center;padding:40px">No exercises logged yet. Start a workout!</div>');

  if(expandedExercise){
    const cardIdx=allNames.indexOf(expandedExercise);
    if(cardIdx>=0)drawCardChart(expandedExercise,cardIdx);
  }
}

function toggleMuscleGroup(m){
  const scrollY=window.scrollY;

function drawCardChart(exName,idx){
  const canvas=document.getElementById('chart-'+idx);
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width=canvas.parentElement.offsetWidth-24;
  const H=canvas.height=150;
  ctx.clearRect(0,0,W,H);

  // Get all logs for this exercise
  let entries=[];
  data.logs.forEach(log=>{
    const ex=log.exercises.find(e=>e.name===exName);
    if(ex){
      const workingSets=ex.sets.filter(s=>s.type==='working'&&s.weight>0);
      if(workingSets.length>0){
        const maxW=Math.max(...workingSets.map(s=>s.weight));
        entries.push({date:log.date,maxWeight:maxW,sets:workingSets,program:log.program});
      }
    }
  });

  // Filter by range
  const range=cardRanges[exName]||4;
  if(range>0){
    const cutoff=new Date(Date.now()-range*7*86400000);
    entries=entries.filter(e=>new Date(e.date)>=cutoff);
  }

  if(entries.length<2){
    ctx.fillStyle='#6b7280';ctx.font='13px Oswald,sans-serif';ctx.textAlign='center';
    ctx.fillText(entries.length===0?'No data in this range':'Need 2+ sessions for chart',W/2,H/2);
    renderCardHistory(exName,idx);
    return;
  }

  // Draw chart
  const pad={t:20,r:10,b:30,l:50};
  const cW=W-pad.l-pad.r;
  const cH=H-pad.t-pad.b;
  const minWt=Math.min(...entries.map(e=>e.maxWeight))*0.9;
  const maxWt=Math.max(...entries.map(e=>e.maxWeight))*1.05;
  const wRange=maxWt-minWt||1;

  // Grid
  ctx.strokeStyle='#2d3238';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=pad.t+cH*(i/4);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.fillStyle='#6b7280';ctx.font='10px sans-serif';ctx.textAlign='right';
    ctx.fillText(fmt(maxWt-wRange*(i/4)),pad.l-5,y+3);
  }

  // Line
  ctx.strokeStyle='#4a90d9';ctx.lineWidth=2;ctx.beginPath();
  entries.forEach((e,i)=>{
    const x=pad.l+cW*(i/(entries.length-1));
    const y=pad.t+cH*(1-(e.maxWeight-minWt)/wRange);
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Points
  entries.forEach((e,i)=>{
    const x=pad.l+cW*(i/(entries.length-1));
    const y=pad.t+cH*(1-(e.maxWeight-minWt)/wRange);
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle=i>0&&e.maxWeight>entries[i-1].maxWeight?'#4aaa6a':i>0&&e.maxWeight<entries[i-1].maxWeight?'#d45a5a':'#4a90d9';
    ctx.fill();
  });

  // Date labels
  ctx.fillStyle='#6b7280';ctx.font='9px sans-serif';ctx.textAlign='center';
  const step=Math.max(1,Math.floor(entries.length/5));
  entries.forEach((e,i)=>{
    if(i%step===0||i===entries.length-1){
      const x=pad.l+cW*(i/(entries.length-1));
      ctx.fillText(e.date.slice(5),x,H-5);
    }
  });

  // Trend
  const first=entries[0].maxWeight;
  const last=entries[entries.length-1].maxWeight;
  const trend=last>first?'up':last<first?'down':'flat';
  ctx.fillStyle=trend==='up'?'#4aaa6a':trend==='down'?'#d45a5a':'#e8c84a';
  ctx.font='bold 11px sans-serif';ctx.textAlign='right';
  const pct=((last-first)/first*100).toFixed(1);
  ctx.fillText((trend==='up'?'+':'')+pct+'%',W-pad.r,pad.t-5);

  renderCardHistory(exName,idx);
}

function renderCardHistory(exName,idx){
  let entries=[];
  data.logs.forEach(log=>{
    const ex=log.exercises.find(e=>e.name===exName);
    if(ex)entries.push({date:log.date,sets:ex.sets,program:log.program});
  });
  entries.reverse();

  const container=document.getElementById('history-'+idx);
  if(!container)return;
  const html=entries.slice(0,10).map((e,i)=>{
    const ws=e.sets.filter(s=>s.type==='working');
    const weights=ws.map(s=>s.weight).join('/');
    const reps=ws.map(s=>s.reps).join('/');
    let trend='';
    if(i<entries.length-1){
      const prevWs=entries[i+1].sets.filter(s=>s.type==='working');
      if(prevWs.length){
        const prevMax=Math.max(...prevWs.map(s=>s.weight));
        const curMax=ws.length?Math.max(...ws.map(s=>s.weight)):0;
        trend=curMax>prevMax?'<span class="session-trend up">UP</span>':curMax<prevMax?'<span class="session-trend down">DOWN</span>':'<span class="session-trend flat">FLAT</span>';
      }
    }
    return`<div class="session-item"><span class="session-date">${e.date}</span> ${trend}<div class="session-weights">${weights} lbs &middot; ${reps} reps</div></div>`;
  }).join('');
  container.innerHTML=html||'<div style="color:var(--text-dim);text-align:center;padding:12px;font-size:0.8rem">No sessions yet</div>';
}

  tabs.innerHTML='<button class="muscle-tab'+(currentLibMuscle==='all'?' active':'')+'" onclick="setLibMuscle(\'all\')">All</button>'+

  const search=(document.getElementById('libSearch').value||'').toLowerCase();
  const allNames=getAllExerciseNames();
  const hidden=new Set(data.hiddenExercises||[]);

  let html='';
  allNames.forEach(name=>{
    if(hidden.has(name))return;
    const muscle=getExerciseMuscle(name);
    if(currentLibMuscle!=='all'&&muscle!==currentLibMuscle)return;
    if(currentLibMode==='favs'&&!favExercises.has(name))return;

function saveEditExercise(){
  const origName=document.getElementById('editExOrig').value;
  const newName=document.getElementById('editExName').value.trim();
  const newEn=document.getElementById('editExEn').value.trim();
  const newMuscle=document.getElementById('editExMuscle').value;
  const athVal=parseFloat(document.getElementById('editExATH').value)||0;
  if(!newName){toast('Name cannot be empty');return}

  // Update ATH in PRs
  const id=exId(newName);
  if(athVal>0){
    if(!data.prs)data.prs={};
    if(!data.prs[id])data.prs[id]={};
    data.prs[id]['ath']={weight:athVal,date:'',program:'ATH'};
  }

  // If name changed, migrate all data
  if(newName!==origName)migrateExRename(origName,newName);

  // Update in customExercises
  const ce=(data.customExercises||[]).find(e=>e[0]===(newName!==origName?newName:origName));
  if(ce){
    ce[0]=newName;ce[1]=newEn;ce[2]=newMuscle;
  } else {
    // Promote to custom exercise so edits persist
    if(!data.customExercises)data.customExercises=[];
    data.customExercises.push([newName,newEn,newMuscle,'S','4x10',60]);
  }

  // Update _custom PROGRAMS cache
  if(PROGRAMS._custom){
    const ex=PROGRAMS._custom.days.A.ex.find(e=>e[0]===(newName!==origName?newName:origName)||e[0]===origName);
    if(ex){ex[0]=newName;ex[1]=newEn;ex[2]=newMuscle}
    else PROGRAMS._custom.days.A.ex.push([newName,newEn,newMuscle,'S','4x10',60]);
  } else {
    PROGRAMS._custom={name:'_custom',phase:'acc',type:'ABC',days:{A:{label:'Custom',labelEn:'Custom Exercises',ex:[[newName,newEn,newMuscle,'S','4x10',60]]}}};
  }

  saveData();
  closeModal();
  toast('Updated: '+newName);
  renderLibrary();
}

let currentLibMode='exercises';
function setLibMode(mode){
  currentLibMode=mode;
  document.getElementById('libTabExercises').classList.toggle('active',mode==='exercises');
  document.getElementById('libTabFavs').classList.toggle('active',mode==='favs');
  document.getElementById('libTabSubs').classList.toggle('active',mode==='subs');
  document.getElementById('libExercisesPanel').style.display=mode==='exercises'||mode==='favs'?'block':'none';
  document.getElementById('libSubsPanel').style.display=mode==='subs'?'block':'none';
  if(mode==='subs')renderSubs();
  if(mode==='favs'||mode==='exercises')renderLibrary();
}
function toggleFav(name){
  if(favExercises.has(name))favExercises.delete(name);
  else favExercises.add(name);
  localStorage.setItem('fav_exercises',JSON.stringify([...favExercises]));
  renderLibrary();
}

function renderSubs(){
  const search=(document.getElementById('subSearch').value||'').toLowerCase();
  const userLinks=data.subLinks||{};
  const deleted=new Set(data.deletedSubs||[]);
  let html='';
  SUBS_DATA.forEach((group,gi)=>{
    let groupExes=[];
    group.subs.forEach(sub=>{
      const filtered=sub.ex.filter(e=>!deleted.has(e)&&(!search||e.toLowerCase().includes(search)));
      if(filtered.length)groupExes.push({cat:sub.cat,ex:filtered});
    });
    if(!groupExes.length)return;
    const count=groupExes.reduce((s,c)=>s+c.ex.length,0);
    html+=`<div class="sub-group" onclick="this.classList.toggle('expanded')">
      <div class="sub-group-head">
        <span class="sub-muscle">${group.muscle}</span>
        <span><span class="sub-count">${count}</span> <span class="sub-arrow">&#9654;</span></span>
      </div>
      <div class="sub-group-body" onclick="event.stopPropagation()">
        ${groupExes.map(sub=>`
          ${sub.cat!=='All'?`<div class="sub-subcat">${sub.cat}</div>`:''}
          ${sub.ex.map(e=>{
            const key=e.replace(/[^a-zA-Z0-9]/g,'_').toLowerCase();
            const link=SUB_LINKS[e]||userLinks[key]||'';
            return `<div class="sub-item">
              <span>${e}</span>
              <span style="display:flex;gap:4px;align-items:center">
                ${link?`<a class="sub-link-btn" href="${link}" target="_blank" rel="noopener">Video</a>`:``}
                <span class="sub-del" onclick="deleteSub('${e.replace(/'/g,"\\'")}')">X</span>
              </span>
            </div>`;
          }).join('')}
        `).join('')}
      </div>
    </div>`;
  });
  if(deleted.size){
    html+=`<div class="sub-restore-btn" onclick="restoreAllSubs()">${deleted.size} hidden — tap to restore all</div>`;
  }
  document.getElementById('subsList').innerHTML=html||'<div style="color:var(--text-dim);text-align:center;padding:40px">No matches</div>';
}
function deleteSub(name){
  if(!data.deletedSubs)data.deletedSubs=[];
  if(!data.deletedSubs.includes(name))data.deletedSubs.push(name);
  saveData();syncToCloud();renderSubs();
  toast('Removed: '+name);
}
function restoreAllSubs(){
  if(!confirm('Restore all hidden substitutions?'))return;
  data.deletedSubs=[];
  saveData();syncToCloud();renderSubs();
  toast('All substitutions restored');
}

function addSubLink(key,name){
  const url=prompt('Paste link for '+name+':');
  if(!url||!url.trim())return;
  if(!data.subLinks)data.subLinks={};
  data.subLinks[key]=url.trim();
  saveData();
  renderSubs();
  toast('Link saved');
}

function saveSub(){
  try{
    const nameEl=document.getElementById('subNameInput');
    if(!nameEl){toast('Error: form not found');return;}
    const name=nameEl.value.trim();
    if(!name){toast('Enter a name');return;}
    const muscle=(document.getElementById('subMuscleInput').value||'').trim()||'Other';
    const cat=(document.getElementById('subCatInput').value||'').trim()||'All';
    const link=(document.getElementById('subLinkInput').value||'').trim();
    // Remove from deleted if re-adding
    if(data.deletedSubs){data.deletedSubs=data.deletedSubs.filter(d=>d!==name);}
    if(!data.customSubs)data.customSubs=[];
    if(!data.customSubs.find(s=>s.name===name))data.customSubs.push({muscle,cat,name});
    let group=SUBS_DATA.find(g=>g.muscle.toLowerCase()===muscle.toLowerCase());
    if(!group){group={muscle,subs:[]};SUBS_DATA.push(group);}
    let subcat=group.subs.find(s=>s.cat.toLowerCase()===cat.toLowerCase());
    if(!subcat){subcat={cat,ex:[]};group.subs.push(subcat);}
    if(!subcat.ex.includes(name))subcat.ex.push(name);
    if(link){
      if(!data.subLinks)data.subLinks={};
      data.subLinks[name.replace(/[^a-zA-Z0-9]/g,'_').toLowerCase()]=link;
    }
    saveData();
    syncToCloud();
    closeModal();
    renderSubs();
    setTimeout(()=>{
      document.querySelectorAll('.sub-group').forEach(g=>{
        const m=g.querySelector('.sub-muscle');
        if(m&&m.textContent.toLowerCase()===muscle.toLowerCase())g.classList.add('expanded');
      });
    },100);
    toast('Added: '+name+' → '+muscle+' > '+cat);
  }catch(err){toast('Save error: '+err.message);}
}

// ── SWAP MODAL ──
function openSwapModal(ei){
  if(!currentWorkout)return;
  const ex=currentWorkout.exercises[ei];
  const muscle=ex.muscle;

  // Get all exercises for same muscle from all programs + abs routines
  const options=new Set();
  for(const pid in PROGRAMS){
    for(const dk in PROGRAMS[pid].days){
      PROGRAMS[pid].days[dk].ex.forEach(e=>{
        if(e[2]===muscle&&e[0]!==ex.name)options.add(e[0]+'|'+e[1]);
      });
    }
  }
  for(const ak in ABS_ROUTINES){
    ABS_ROUTINES[ak].ex.forEach(e=>{
      if(e[2]===muscle&&e[0]!==ex.name)options.add(e[0]+'|'+e[1]);
    });
  }
  // Also include substitution exercises from Library (excluding deleted)
  const deleted=new Set(data.deletedSubs||[]);
  const muscleMap={chest:'Chest',back:'Back',shoulders:'Shoulders',biceps:'Biceps',triceps:'Triceps',forearms:'Forearms',quads:'Quads',hamstrings:'Hamstrings',glutes:'Glutes',calves:'Calves',abs:'Abs'};
  const subsMuscleName=muscleMap[muscle]||muscle;
  SUBS_DATA.forEach(g=>{
    if(g.muscle===subsMuscleName||g.muscle==='Legs (Full)'&&(muscle==='quads'||muscle==='hamstrings'||muscle==='glutes')){
      g.subs.forEach(s=>s.ex.forEach(name=>{
        if(name!==ex.name&&name!==ex.nameEn&&!deleted.has(name))options.add(name+'|'+name);
      }));
    }
  });

  let html=`<div class="modal-header">
    <div class="modal-title">Swap: ${ex.name}</div>
    <button class="modal-close" onclick="closeModal()">&times;</button>
  </div>
  <div style="margin-bottom:8px;font-size:0.75rem;color:var(--text-dim)">Showing ${muscle} exercises</div>`;

  [...options].sort().forEach(opt=>{
    const[name,nameEn]=opt.split('|');
    const ath=findATH(name);
    html+=`<div class="swap-item" onclick="doSwap(${ei},'${name.replace(/'/g,"\\'")}','${nameEn.replace(/'/g,"\\'")}','${muscle}')">
      <div class="swap-name">${name} <span style="color:var(--text-dim);font-size:0.75rem">${nameEn}</span></div>
      ${ath?`<div class="swap-ath">ATH: ${ath} lbs</div>`:''}
    </div>`;
  });

  openModal(html);
}

function doSwap(ei,name,nameEn,muscle){
  if(!currentWorkout)return;
  const ex=currentWorkout.exercises[ei];
  ex.name=name;ex.nameEn=nameEn;ex.muscle=muscle;
  // Try to pre-populate from last log
  const lastLog=getLastLog(name);
  if(lastLog){
    ex.sets.forEach((s,i)=>{
      if(lastLog.sets[i])s.weight=lastLog.sets[i].weight;
    });
  }
  closeModal();
  renderExerciseCards();
  toast('Swapped to '+name);
}

// ── ALT EXERCISE (session-only swap) ──
function openAltModal(ei){
  if(!currentWorkout)return;
  const ex=currentWorkout.exercises[ei];
  const muscle=ex.muscle;

  // Check for base exercise suggestion
  let baseSuggestion=null;
  if(typeof ex._baseIdx==='number'){
    const baseProg=PROGRAMS[data.activeProgram];
    if(baseProg&&baseProg.days[currentDay]){
      const baseEx=baseProg.days[currentDay].ex[ex._baseIdx];
      if(baseEx&&baseEx[0]!==ex.name){
        // Check base exercise isn't already in today's workout
        const alreadyInWorkout=currentWorkout.exercises.some(e=>e.name===baseEx[0]);
        if(!alreadyInWorkout){
          baseSuggestion={name:baseEx[0],nameEn:baseEx[1],muscle:baseEx[2]};
        }
      }
    }
  }

  // Build same-muscle options (reuse openSwapModal logic)
  const options=new Set();
  const currentNames=new Set(currentWorkout.exercises.map(e=>e.name));
  for(const pid in PROGRAMS){
    for(const dk in PROGRAMS[pid].days){
      PROGRAMS[pid].days[dk].ex.forEach(e=>{
        if(e[2]===muscle&&e[0]!==ex.name&&!currentNames.has(e[0]))options.add(e[0]+'|'+e[1]);
      });
    }
  }
  for(const ak in ABS_ROUTINES){
    ABS_ROUTINES[ak].ex.forEach(e=>{
      if(e[2]===muscle&&e[0]!==ex.name&&!currentNames.has(e[0]))options.add(e[0]+'|'+e[1]);
    });
  }
  const deleted=new Set(data.deletedSubs||[]);
  const muscleMap={chest:'Chest',back:'Back',shoulders:'Shoulders',biceps:'Biceps',triceps:'Triceps',forearms:'Forearms',quads:'Quads',hamstrings:'Hamstrings',glutes:'Glutes',calves:'Calves',abs:'Abs'};
  const subsMuscleName=muscleMap[muscle]||muscle;
  SUBS_DATA.forEach(g=>{
    if(g.muscle===subsMuscleName||g.muscle==='Legs (Full)'&&(muscle==='quads'||muscle==='hamstrings'||muscle==='glutes')){
      g.subs.forEach(s=>s.ex.forEach(name=>{
        if(name!==ex.name&&name!==ex.nameEn&&!deleted.has(name)&&!currentNames.has(name))options.add(name+'|'+name);
      }));
    }
  });

  // Check for saved alt from previous sessions
  const origName=ex._origName||ex.name;
  const savedAlt=getSavedAlt(currentWorkout.program,currentDay,origName);

  let html=`<div class="modal-header">
    <div class="modal-title">Alt: ${ex.name}</div>
    <button class="modal-close" onclick="closeModal()">&times;</button>
  </div>
  <div style="margin-bottom:8px;font-size:0.7rem;color:var(--text-dim)">Session-only &mdash; resets next workout</div>`;

  // Custom input
  html+=`<div class="alt-custom-row">
    <input type="text" id="altCustomName" placeholder="Type exercise name..." onkeydown="if(event.key==='Enter')doAltCustom(${ei})">
    <button onclick="doAltCustom(${ei})">Use</button>
  </div>`;

  // Saved alt from last time (top priority)
  if(savedAlt&&savedAlt.name!==ex.name&&!currentNames.has(savedAlt.name)){
    const ath=findATH(savedAlt.name);
    html+=`<div class="alt-suggested" onclick="doAlt(${ei},'${savedAlt.name.replace(/'/g,"\\'")}','${savedAlt.nameEn.replace(/'/g,"\\'")}','${savedAlt.muscle}')">
      <div class="alt-suggested-label">&#8635; Last Alt Used</div>
      <div class="swap-name">${savedAlt.name} <span style="color:var(--text-dim);font-size:0.75rem">${savedAlt.nameEn}</span></div>
      ${ath?`<div class="swap-ath">ATH: ${ath} lbs</div>`:''}
    </div>`;
  }

  // Base exercise suggestion
  if(baseSuggestion&&(!savedAlt||savedAlt.name!==baseSuggestion.name)){
    const ath=findATH(baseSuggestion.name);
    html+=`<div class="alt-suggested" onclick="doAlt(${ei},'${baseSuggestion.name.replace(/'/g,"\\'")}','${baseSuggestion.nameEn.replace(/'/g,"\\'")}','${baseSuggestion.muscle}')">
      <div class="alt-suggested-label">&#9733; Base Exercise</div>
      <div class="swap-name">${baseSuggestion.name} <span style="color:var(--text-dim);font-size:0.75rem">${baseSuggestion.nameEn}</span></div>
      ${ath?`<div class="swap-ath">ATH: ${ath} lbs</div>`:''}
    </div>`;
  }

  // Same-muscle options
  if(options.size>0){
    html+=`<div style="font-size:0.7rem;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">${muscle} exercises</div>`;
    [...options].sort().forEach(opt=>{
      const[name,nameEn]=opt.split('|');
      const ath=findATH(name);
      html+=`<div class="swap-item" onclick="doAlt(${ei},'${name.replace(/'/g,"\\'")}','${nameEn.replace(/'/g,"\\'")}','${muscle}')">
        <div class="swap-name">${name} <span style="color:var(--text-dim);font-size:0.75rem">${nameEn}</span></div>
        ${ath?`<div class="swap-ath">ATH: ${ath} lbs</div>`:''}
      </div>`;
    });
  }

  openModal(html);
}

function doAlt(ei,name,nameEn,muscle){
  if(!currentWorkout)return;
  const ex=currentWorkout.exercises[ei];
  const origName=ex._origName||ex.name;
  ex.name=name;ex.nameEn=nameEn;ex.muscle=muscle;
  ex._isAlt=true;
  // Save to alt memory for next time
  saveAlt(currentWorkout.program,currentWorkout.day,origName,name,nameEn,muscle);
  // Pre-fill from last log
  const lastLog=getLastLog(name);
  if(lastLog){
    ex.sets.forEach((s,i)=>{
      if(lastLog.sets[i])s.weight=lastLog.sets[i].weight;
    });
  } else {
    ex.sets.forEach(s=>{s.weight='';});
  }
  closeModal();
  renderExerciseCards();
  toast('Alt: '+name);
}

function doAltCustom(ei){
  const input=document.getElementById('altCustomName');
  if(!input)return;
  const name=input.value.trim();
  if(!name){toast('Enter an exercise name');return;}
  doAlt(ei,name,name,currentWorkout.exercises[ei].muscle);
}

function clearPicked(){

  if(container)container.querySelectorAll('.edit-ex-item').forEach(el=>{el.classList.remove('picked','drop-target')});

// ── EXERCISE PICKER (editor replace) ──
function getFullExerciseData(name){
  // Search all programs for full exercise array
  for(const pid in PROGRAMS){
    for(const dk in PROGRAMS[pid].days){
      const ex=PROGRAMS[pid].days[dk].ex.find(e=>e[0]===name);
      if(ex)return[...ex];
    }
  }
  for(const ak in ABS_ROUTINES){
    const ex=ABS_ROUTINES[ak].ex.find(e=>e[0]===name);
    if(ex)return[...ex];
  }
  for(const pid in data.customPrograms||{}){
    const cp=data.customPrograms[pid];
    for(const dk in cp.days||{}){
      const ex=(cp.days[dk].ex||[]).find(e=>e[0]===name);
      if(ex)return[...ex];
    }
  }
  // Fallback: construct from helpers
  return[name,getExerciseEnglish(name),getExerciseMuscle(name)||'other','S','4x10',60];
}

function getRecentExercises(){
  // Get exercises from recent logs, most recent first, deduplicated
  const seen=new Set();
  const recent=[];
  const logs=[...(data.logs||[])].sort((a,b)=>b.date.localeCompare(a.date));
  for(const log of logs){
    for(const ex of(log.exercises||[])){
      if(!seen.has(ex.name)){seen.add(ex.name);recent.push(ex.name)}
    }
    if(recent.length>=30)break;
  }
  return recent;
}

function openExPicker(idx){

  const currentName=editorExercises[idx][0];
  const modal=document.getElementById('modalContent');

  picker=document.createElement('div');
  picker.id='exPickerOverlay';
  picker.className='ex-picker';
