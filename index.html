<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0c10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Zercher">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Zercher</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg-deep:#0a0c10;--bg-card:#141820;--bg-card-hover:#1c2028;--bg-input:#0e1018;
--border:#2a3040;--border-light:#384058;
--text:#9aa0b0;--text-dim:#585e70;--text-bright:#c8ccd8;
--iron:#8090a8;--iron-glow:#98a8c0;--iron-deep:#607088;
--green:#6a8870;--green-bright:#7a9880;
--red:#905050;--red-bright:#a86060;
--gold:#a0946a;--gold-glow:#b8a878;
--yellow:#a0946a;
--radius:6px;--radius-sm:4px;
}
html{height:100%}
body{min-height:100%;color:var(--text);font-family:'Oswald',-apple-system,BlinkMacSystemFont,sans-serif;font-size:15px;-webkit-tap-highlight-color:transparent;overflow-x:hidden;padding-bottom:70px;
background:#000 url('bg-sandow.jpg') no-repeat center top fixed;background-size:cover}

/* HEADER */
.app-header{position:sticky;top:0;z-index:100;background:rgba(10,12,16,0.7);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(128,144,168,0.15)}
.app-header h1{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;color:var(--text-bright);letter-spacing:3px;text-transform:uppercase;text-shadow:0 1px 2px rgba(0,0,0,0.5)}
.app-header h1 span{color:var(--iron);text-shadow:0 0 8px rgba(128,144,168,0.3)}
.header-actions{display:flex;gap:10px;align-items:center}
.header-btn{background:none;border:none;color:var(--text-dim);font-size:1.2rem;cursor:pointer;padding:6px}
.header-btn:hover{color:var(--text-bright)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block}
.sync-dot.offline{background:var(--red)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,12,16,0.7);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:1px solid rgba(128,144,168,0.15);display:flex;justify-content:space-around;padding:6px 0 env(safe-area-inset-bottom,8px)}
.nav-btn{background:none;border:none;color:var(--text-dim);font-size:0.65rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;transition:color 0.2s;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px}
.nav-btn .nav-icon{font-size:1.3rem;display:flex;align-items:center;justify-content:center}
.nav-btn.active{color:var(--iron)}
.nav-btn.active .nav-icon{filter:drop-shadow(0 0 6px rgba(128,144,168,0.4))}

/* VIEWS */
.view{display:none;padding:12px 16px;max-width:600px;margin:0 auto}
.view.active{display:block}

/* CARDS */
.card{background:rgba(14,16,20,0.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(128,144,168,0.12);border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.card:hover{border-color:var(--border-light)}
.card-title{font-size:0.95rem;font-weight:600;color:var(--text-bright);margin-bottom:6px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.5px}
.card-sub{font-size:0.75rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px;font-family:'Oswald',sans-serif}

/* DAY TABS */
.day-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto}
.day-tab{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 18px;font-size:0.85rem;font-weight:700;color:var(--text-dim);cursor:pointer;white-space:nowrap;transition:all 0.2s;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px}
.day-tab.active{background:linear-gradient(135deg,var(--iron-deep),var(--iron));border-color:var(--iron);color:#fff;box-shadow:0 0 10px rgba(128,144,168,0.2)}

/* EXERCISE CARD (WORKOUT) */
.ex-card{background:rgba(14,16,20,0.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(128,144,168,0.12);border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.ex-card.all-done{border-color:rgba(74,170,106,0.3);max-height:48px;overflow:hidden;opacity:0.5;cursor:pointer;transition:max-height 0.3s,opacity 0.3s;padding:10px 14px}
.ex-card.all-done .ex-done-label{display:inline}
.ex-card.all-done.expanded{max-height:800px;opacity:1;padding:14px}
.ex-done-label{display:none;color:var(--green);font-size:0.75rem;margin-left:8px}
.hold-tag{font-size:0.65rem;padding:2px 8px;border-radius:10px;background:rgba(232,160,50,0.1);color:rgba(232,160,50,0.5);border:1px solid rgba(232,160,50,0.2);cursor:pointer;font-weight:700;letter-spacing:0.5px}
.hold-tag.active{background:rgba(232,160,50,0.2);color:#e8a032;border-color:rgba(232,160,50,0.4)}
.alt-badge{display:inline-block;font-size:0.55rem;padding:2px 6px;border-radius:8px;background:rgba(232,160,50,0.2);color:#e8a032;border:1px solid rgba(232,160,50,0.35);margin-left:6px;font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:0.5px;vertical-align:middle}
.alt-suggested{background:rgba(232,160,50,0.12);border:1px solid rgba(232,160,50,0.25);border-radius:var(--radius);padding:10px 12px;margin-bottom:10px;cursor:pointer}
.alt-suggested:active{background:rgba(232,160,50,0.22)}
.alt-suggested-label{font-size:0.65rem;color:#e8a032;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:700}
.alt-custom-row{display:flex;gap:8px;margin-bottom:12px}
.alt-custom-row input{flex:1;background:var(--bg-input);border:1px solid var(--border);color:var(--text-bright);padding:8px 10px;border-radius:var(--radius-sm);font-family:'Oswald',sans-serif;font-size:0.85rem}
.alt-custom-row button{background:rgba(232,160,50,0.2);border:1px solid rgba(232,160,50,0.35);color:#e8a032;padding:8px 14px;border-radius:var(--radius-sm);font-family:'Oswald',sans-serif;font-weight:700;cursor:pointer;font-size:0.8rem}
.ex-action-btn.start-set{color:var(--green);border-color:rgba(106,136,112,0.4)}
.ex-note-corner{font-size:0.72rem;color:var(--iron);cursor:pointer;text-align:right;font-family:'Oswald',sans-serif;font-weight:400;letter-spacing:0.3px;white-space:nowrap;padding:2px 0;opacity:0.8}
.ex-note-corner .note-text{color:#a0b8d0;font-style:italic;font-family:'Playfair Display',serif;font-weight:400}
.ex-note-corner .note-pencil{font-size:0.65rem;opacity:0.5;margin-left:4px}
.ex-suggest{font-size:0.82rem;padding:8px 12px;margin-top:6px;border-radius:var(--radius-sm);background:rgba(255,255,255,0.05);line-height:1.5;text-align:center}
.ex-suggest.up{color:var(--green);border-left:3px solid var(--green)}
.ex-suggest.stay{color:var(--yellow);border-left:3px solid var(--yellow)}
.ex-suggest.down{color:var(--red);border-left:3px solid var(--red)}
.sug-main{font-weight:600}
.sug-trend{font-size:0.72rem;opacity:0.7;margin-top:3px}
.sug-trend-up{color:var(--green)}
.sug-trend-down{color:var(--red)}
.ex-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.ex-name{font-size:0.9rem;font-weight:700;color:var(--text-bright);font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.5px}
.ex-name-en{font-size:0.7rem;color:var(--text-dim)}
.ex-meta{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.ex-tag{font-size:0.65rem;padding:2px 8px;border-radius:10px;background:rgba(74,144,217,0.1);color:var(--iron);border:1px solid rgba(74,144,217,0.2)}
.ex-tag.tech{background:rgba(232,184,74,0.1);color:var(--gold);border-color:rgba(232,184,74,0.2);cursor:pointer}
.ex-tag.pattern{background:rgba(74,170,106,0.1);color:var(--green);border-color:rgba(74,170,106,0.2)}
.tech-popup{position:fixed;bottom:70px;left:16px;right:16px;max-width:568px;margin:0 auto;background:rgba(14,16,20,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(160,148,106,0.3);border-radius:var(--radius);padding:16px;z-index:200;box-shadow:0 -4px 24px rgba(0,0,0,0.6);animation:slideUp 0.2s ease}
.tech-popup-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.tech-popup-desc{font-size:0.85rem;color:var(--text);line-height:1.5}
.tech-popup-close{position:absolute;top:10px;right:14px;background:none;border:none;color:var(--text-dim);font-size:1.2rem;cursor:pointer}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* PLATE CALCULATOR */
.plate-popup{position:fixed;bottom:70px;left:16px;right:16px;max-width:568px;margin:0 auto;background:rgba(14,16,20,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(160,148,106,0.3);border-radius:var(--radius);padding:16px;z-index:200;box-shadow:0 -4px 24px rgba(0,0,0,0.6);animation:slideUp 0.2s ease}
.plate-popup-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.plate-popup-close{position:absolute;top:10px;right:14px;background:none;border:none;color:var(--text-dim);font-size:1.2rem;cursor:pointer}
.plate-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;font-size:0.8rem;color:var(--text);flex-wrap:wrap}
.plate-bar-row span{color:var(--text-dim);margin-right:2px}
.plate-bar-btn{background:var(--bg-input);border:1px solid var(--border);color:var(--text-dim);padding:4px 10px;border-radius:var(--radius-sm);font-family:'Oswald',sans-serif;font-size:0.75rem;cursor:pointer}
.plate-bar-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(160,148,106,0.15)}
.plate-bar-btn.impossible{opacity:0.25;cursor:default;text-decoration:line-through;pointer-events:none}
.plate-breakdown{margin:8px 0;padding:10px;background:var(--bg-input);border-radius:var(--radius-sm);border:1px solid var(--border)}
.plate-per-side{font-size:1.05rem;color:var(--text-bright);font-weight:600;margin-bottom:4px}
.plate-detail{font-size:0.75rem;color:var(--text-dim);margin-top:4px}
.plate-visual{display:flex;align-items:center;gap:3px;margin-top:8px;justify-content:center}
.plate-disc{display:flex;align-items:center;justify-content:center;border-radius:3px;font-size:0.6rem;font-weight:700;color:#111;min-width:18px;text-align:center}
.plate-disc.p45{background:#3a7bd5;height:36px;padding:0 4px}
.plate-disc.p35{background:#e8c84a;height:32px;padding:0 4px}
.plate-disc.p25{background:#4caf50;height:28px;padding:0 3px}
.plate-disc.p10{background:#f5f5f5;height:24px;padding:0 3px}
.plate-disc.p5{background:#f5f5f5;height:20px;padding:0 2px}
.plate-disc.p2{background:#f5f5f5;height:16px;padding:0 2px;font-size:0.5rem}
.plate-bar-vis{width:40px;height:8px;background:var(--iron-deep);border-radius:2px}
.plate-corner{font-size:0.8rem;color:var(--yellow);margin-top:4px;cursor:pointer;font-weight:600}
.plate-corner:active{color:var(--gold)}
.plate-corner-show{font-size:0.6rem;color:var(--text-dim);margin-top:4px;cursor:pointer;opacity:0.4}
.plate-corner-show:active{opacity:0.8}

/* SET ROWS */
.set-row{display:grid;grid-template-columns:auto 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:6px;padding:4px 0}
.set-label{font-size:0.75rem;color:var(--iron);min-width:36px}
.set-label.warmup{color:var(--yellow)}
.set-label.drop{color:#ef5350;font-size:0.65rem}
.set-input{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text-bright);font-size:0.9rem;width:100%;text-align:center}
.set-input:focus{outline:none;border-color:var(--iron)}
.set-input::placeholder{color:var(--text-dim)}
.set-done-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:none;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.9rem;transition:all 0.2s}
.set-done-btn.done{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 0 6px rgba(106,136,112,0.3)}
.set-input-group{position:relative}
.set-unit{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:0.65rem;color:var(--text-dim)}

/* PR FLASH */
.pr-flash{display:none;background:linear-gradient(135deg,rgba(232,184,74,0.15),rgba(232,184,74,0.05));border:1px solid rgba(232,184,74,0.4);border-radius:var(--radius-sm);padding:6px 10px;margin-top:6px;font-size:0.75rem;color:var(--gold);font-weight:600;animation:prPulse 0.6s ease}
.pr-flash.show{display:block}
@keyframes prPulse{0%{transform:scale(0.95);opacity:0}50%{transform:scale(1.02)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

/* LAST TIME ROW */
.ex-last{font-size:0.7rem;color:var(--iron);margin-top:6px;padding-top:6px;border-top:1px solid var(--border);text-align:center}
.ex-last .pr-badge{color:var(--gold);font-weight:600}

/* EX ACTIONS */
.ex-actions{display:flex;gap:8px;margin-top:8px;justify-content:center}
.ex-action-btn{background:none;border:1px solid rgba(232,160,50,0.35);border-radius:var(--radius-sm);padding:4px 10px;font-size:0.7rem;color:#e8a032;cursor:pointer}
.ex-action-btn:hover{border-color:var(--iron);color:var(--iron)}

/* ADD SET */

/* REST TIMER */
.rest-timer{position:fixed;bottom:70px;left:0;right:0;background:var(--bg-deep);border-top:2px solid var(--border);padding:12px 16px;display:none;z-index:90;text-align:center}
.rest-timer.active{display:block}
.rest-time{font-size:2.2rem;font-weight:700;color:var(--text-bright);font-variant-numeric:tabular-nums;font-family:'Oswald',sans-serif;letter-spacing:2px}
.rest-time.warning{color:var(--gold)}
.rest-time.done{color:var(--green)}
.rest-btns{display:flex;gap:8px;justify-content:center;margin-top:8px}
.rest-btn{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 16px;color:var(--text);font-size:0.8rem;cursor:pointer}
.rest-btn.skip{background:var(--iron);border-color:var(--iron);color:#fff}

/* FINISH BTN */
.finish-btn{display:block;width:100%;background:linear-gradient(135deg,#5a8040,var(--green));color:#fff;border:none;border-radius:var(--radius-sm);padding:14px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:16px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:2px}
.finish-btn:hover{background:var(--green-bright)}
.start-overlay{text-align:center;padding:50px 20px}
.start-overlay .day-label{font-size:1.6rem;font-weight:900;color:var(--text-bright);margin-bottom:8px;font-family:'Playfair Display',serif;text-transform:uppercase;letter-spacing:3px}
.start-overlay .ex-count{font-size:0.9rem;color:var(--text-dim);margin-bottom:28px;font-family:'Oswald',sans-serif}
.start-workout-btn{background:linear-gradient(135deg,var(--iron-deep),var(--iron));color:#fff;border:none;border-radius:var(--radius-sm);padding:16px 44px;font-size:1.1rem;font-weight:700;cursor:pointer;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:3px;box-shadow:0 4px 16px rgba(128,144,168,0.2)}
.workout-timer{text-align:center;color:var(--green-bright);font-size:0.85rem;padding:6px 0;margin-bottom:4px;font-family:'Oswald',sans-serif;letter-spacing:1px}

/* RUNNING TAB */
.run-header{text-align:center;margin-bottom:14px;background:rgba(10,12,16,0.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(128,144,168,0.15);border-radius:var(--radius);padding:14px}
.run-block-label{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold);letter-spacing:1px}
.run-week-label{font-size:0.75rem;color:var(--text);text-transform:uppercase;letter-spacing:2px;margin-top:2px}
.run-week-nav{display:flex;gap:8px;align-items:center;justify-content:center;margin:10px 0}
.run-week-btn{background:none;border:1px solid rgba(106,136,112,0.4);color:var(--green);border-radius:var(--radius-sm);padding:6px 12px;cursor:pointer;font-family:'Oswald',sans-serif;font-size:0.8rem;font-weight:700}
.run-week-btn:disabled{opacity:0.3;cursor:default}
.run-week-current{font-size:0.9rem;color:var(--text-bright);font-weight:700;min-width:80px;text-align:center}
.run-card{background:rgba(10,12,16,0.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(128,144,168,0.15);border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.4)}
.run-card.completed{border-color:rgba(106,136,112,0.3);opacity:0.6}
.run-card.completed .run-status{color:var(--green)}
.run-type-badge{display:inline-block;font-size:0.65rem;padding:2px 10px;border-radius:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;font-family:'Oswald',sans-serif}
.run-type-badge.easy{background:rgba(106,136,112,0.15);color:var(--green);border:1px solid rgba(106,136,112,0.3)}
.run-type-badge.speed{background:rgba(160,148,106,0.15);color:var(--gold);border:1px solid rgba(160,148,106,0.3)}
.run-type-badge.long{background:rgba(128,144,168,0.15);color:var(--iron);border:1px solid rgba(128,144,168,0.3)}
.run-target{font-size:0.82rem;color:var(--text);margin:8px 0}
.run-notes{font-size:0.78rem;color:var(--text);font-style:italic;margin-bottom:10px;line-height:1.4}
.run-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.run-input-group{position:relative}
.run-input-group label{display:block;font-size:0.65rem;color:var(--text);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-family:'Oswald',sans-serif}
.run-input-group input{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text-bright);font-size:0.9rem;width:100%;text-align:center}
.run-input-group input:focus{outline:none;border-color:var(--iron)}
.run-input-unit{position:absolute;right:8px;bottom:10px;font-size:0.65rem;color:var(--text)}
.run-pace{font-size:0.82rem;color:var(--iron);text-align:center;margin:6px 0;font-family:'Oswald',sans-serif}
.run-log-btn{width:100%;padding:10px;border:1px solid rgba(106,136,112,0.4);background:rgba(106,136,112,0.1);color:var(--green);border-radius:var(--radius-sm);font-family:'Oswald',sans-serif;font-weight:700;font-size:0.85rem;text-transform:uppercase;letter-spacing:1px;cursor:pointer}
.run-log-btn:active{background:rgba(106,136,112,0.2)}
.run-summary{margin-top:14px;padding:12px;background:rgba(10,12,16,0.85);border:1px solid rgba(128,144,168,0.15);border-radius:var(--radius)}
.run-summary-title{font-size:0.75rem;color:var(--text-bright);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;font-family:'Oswald',sans-serif}
.run-stat-row{display:flex;justify-content:space-between;margin-bottom:6px}
.run-stat-label{font-size:0.82rem;color:var(--text-bright)}
.run-stat-value{font-size:0.82rem;color:var(--text-bright);font-weight:600}
.run-block-btn{width:100%;padding:10px;margin-top:10px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);border-radius:var(--radius-sm);font-family:'Oswald',sans-serif;cursor:pointer;font-size:0.85rem;text-transform:uppercase;letter-spacing:1px}
.run-milestone{text-align:center;padding:10px;margin-top:10px;background:rgba(160,148,106,0.1);border:1px solid rgba(160,148,106,0.25);border-radius:var(--radius);color:var(--gold);font-family:'Oswald',sans-serif;font-size:0.85rem}
/* Interval Timer */
.run-timer-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,12,16,0.97);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.run-timer-phase{font-size:1.3rem;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px;font-weight:700}
.run-timer-countdown{font-size:5rem;font-family:'Oswald',sans-serif;font-weight:700;line-height:1}
.run-timer-next{font-size:0.85rem;color:var(--text-dim);margin-top:20px}
.run-timer-elapsed{font-size:0.9rem;color:var(--text);margin-top:8px}
.run-timer-controls{display:flex;gap:16px;margin-top:30px}
.run-timer-btn{padding:12px 28px;border-radius:var(--radius-sm);font-family:'Oswald',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
.run-timer-start-btn{width:100%;padding:8px;margin-bottom:6px;border:1px solid rgba(160,148,106,0.4);background:rgba(160,148,106,0.1);color:var(--gold);border-radius:var(--radius-sm);font-family:'Oswald',sans-serif;font-weight:700;font-size:0.82rem;text-transform:uppercase;letter-spacing:1px;cursor:pointer}
.run-timer-start-btn:active{background:rgba(160,148,106,0.2)}
.run-timer-dots{margin:16px 0;line-height:18px}
/* Extra Run */
.run-extra-card{border-style:dashed;opacity:0.7}
.run-extra-card:focus-within{opacity:1}

/* PROGRESS VIEW */
.chart-container{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin:12px 0}
.chart-container canvas{width:100%;height:150px}
.range-tabs{display:flex;gap:4px;margin:8px 0}
.range-tab{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 12px;font-size:0.75rem;color:var(--text-dim);cursor:pointer}
.range-tab.active{background:linear-gradient(135deg,var(--iron-deep),var(--iron));border-color:var(--iron);color:#fff}
select.view-select{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;color:var(--text-bright);font-size:0.9rem;margin-bottom:8px;-webkit-appearance:none}

/* SESSION HISTORY */
.session-item{padding:10px;border-bottom:1px solid var(--border);font-size:0.8rem}
.session-date{color:var(--iron);font-weight:600}
.session-weights{color:var(--text-bright);margin-top:2px}
.session-trend{display:inline-block;padding:1px 6px;border-radius:8px;font-size:0.65rem;font-weight:600}
.session-trend.up{background:rgba(74,170,106,0.15);color:var(--green)}
.session-trend.down{background:rgba(212,90,90,0.15);color:var(--red)}
.session-trend.flat{background:rgba(232,200,74,0.15);color:var(--yellow)}

/* PR TABLE (inside progress cards) */
.pr-table{width:100%;margin-top:8px;font-size:0.8rem}
.pr-table td{padding:4px 8px}
.pr-table .rep-col{color:var(--green-bright);width:60px}
.pr-table .weight-col{color:var(--text-bright);font-weight:600}
.pr-table .date-col{color:var(--green);font-size:0.7rem;text-align:right}
.pr-table .crown{color:var(--gold)}
.pr-table .recent{color:var(--green)}

/* PROGRESS MUSCLE GROUPS */
.pc-muscle-row{background:rgba(14,16,20,0.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(128,144,168,0.12);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:border-color 0.2s}
.pc-muscle-row:active{border-color:var(--iron)}
.pc-muscle-row .pc-muscle-name{font-size:0.95rem;font-weight:700;color:var(--text-bright);font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px}
.pc-muscle-row .pc-muscle-count{color:var(--text-dim);font-size:0.8rem;font-family:'Oswald',sans-serif}
.pc-muscle-row .pc-muscle-arrow{color:var(--text-dim);font-size:0.7rem;margin-left:6px;transition:transform 0.2s;display:inline-block}
.pc-muscle-row.open .pc-muscle-arrow{transform:rotate(90deg)}
.pc-muscle-content{display:none;padding:0 0 8px}
.pc-muscle-content.open{display:block}
.pc-equip-label{color:var(--iron);font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;margin:10px 0 4px 4px;font-family:'Oswald',sans-serif}

/* PROGRESS GRID */
.pc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* PROGRESS TILES (collapsed) */
.progress-card{background:rgba(14,16,20,0.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(128,144,168,0.12);border-radius:var(--radius);padding:10px 12px;box-shadow:0 2px 8px rgba(0,0,0,0.3);cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;text-align:center;min-height:60px;justify-content:center}
.progress-card:active{border-color:var(--iron);transform:scale(0.97)}
.progress-card .pc-name{font-size:0.75rem;font-weight:700;color:var(--text-bright);font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.5px;line-height:1.3}
.progress-card .pc-name-en{display:block;font-size:0.58rem;color:var(--iron);margin-top:2px}
.progress-card .pc-tile-ath{font-size:0.85rem;font-weight:700;color:var(--gold-glow);margin-top:4px;text-shadow:0 0 8px rgba(184,168,120,0.4);font-family:'Playfair Display',serif}

/* EXPANDED CARD (full width overlay) */
.progress-card.expanded{grid-column:1/-1;border-color:var(--iron);cursor:default;text-align:left;align-items:stretch;min-height:auto;padding:14px}
.progress-card.expanded .pc-name{font-size:0.95rem}
.progress-card.expanded .pc-name-en{display:inline;margin-left:6px}
.progress-card.expanded .pc-1rm{margin-top:0;font-size:0.72rem;color:var(--gold);font-weight:600}
.progress-card.expanded .pc-ath{font-size:1.3rem;color:var(--gold-glow);font-weight:700;font-family:'Playfair Display',serif;text-shadow:0 0 12px rgba(184,168,120,0.3)}
.progress-card.expanded .pc-header{display:flex;justify-content:space-between;align-items:flex-start}
.pc-detail{display:none;padding-top:12px;border-top:1px solid var(--border);margin-top:10px}
.progress-card.expanded .pc-detail{display:block}
.pc-detail .range-tabs{margin-bottom:8px}

/* MUSCLE TABS */
.muscle-tabs{display:flex;gap:4px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.muscle-tab{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 14px;font-size:0.75rem;color:var(--text-dim);cursor:pointer;white-space:nowrap;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.5px}
.muscle-tab.active{background:linear-gradient(135deg,var(--iron-deep),var(--iron));border-color:var(--iron);color:#fff}

/* SEARCH */
.search-bar{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text-bright);font-size:0.9rem;margin-bottom:12px}
.search-bar:focus{outline:none;border-color:var(--iron)}

/* LIB CARD */
.lib-card{background:rgba(14,16,20,0.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(128,144,168,0.12);border-radius:var(--radius);padding:12px;margin-bottom:8px;box-shadow:0 2px 6px rgba(0,0,0,0.3)}
.lib-card .lib-name{font-size:0.9rem;font-weight:700;color:var(--text-bright);font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.5px}
.lib-card .lib-name-en{font-size:0.75rem;color:var(--iron)}
.lib-card .lib-equip{font-size:0.65rem;color:var(--iron);margin-top:2px}
.lib-card .lib-ath{font-size:0.8rem;color:var(--gold);font-weight:600;float:right}
.lib-subs{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.lib-subs-title{font-size:0.7rem;color:var(--iron);margin-bottom:4px}
.lib-sub-item{font-size:0.75rem;color:var(--text);padding:3px 0;display:flex;justify-content:space-between;align-items:center}
.lib-sub-item a{color:var(--iron);text-decoration:none;font-size:0.7rem}
.lib-programs{font-size:0.65rem;color:var(--green);margin-top:6px}
.lib-mode-tabs{display:flex;gap:6px;margin-bottom:12px}
.lib-mode-tab{flex:1;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px;font-size:0.8rem;color:var(--text-dim);cursor:pointer;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px;text-align:center}
.lib-mode-tab.active{background:linear-gradient(135deg,var(--iron-deep),var(--iron));border-color:var(--iron);color:#fff}
.sub-group{background:rgba(14,16,20,0.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(128,144,168,0.12);border-radius:var(--radius);margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,0.3);overflow:hidden}
.sub-group-head{padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.sub-group-head .sub-muscle{font-size:0.95rem;font-weight:700;color:var(--text-bright);font-family:'Playfair Display',serif;text-transform:uppercase;letter-spacing:1px}
.sub-group-head .sub-count{font-size:0.7rem;color:var(--text-dim)}
.sub-group-head .sub-arrow{color:var(--text-dim);transition:transform 0.2s}
.sub-group.expanded .sub-arrow{transform:rotate(90deg)}
.sub-group-body{display:none;padding:0 14px 12px}
.sub-group.expanded .sub-group-body{display:block}
.sub-subcat{font-size:0.7rem;font-weight:700;color:var(--iron);text-transform:uppercase;letter-spacing:1px;margin:10px 0 6px;padding-top:8px;border-top:1px solid var(--border)}
.sub-subcat:first-child{border-top:none;margin-top:4px}
.sub-item{font-size:0.8rem;color:var(--text);padding:4px 0;display:flex;justify-content:space-between;align-items:center;gap:6px}
.sub-item .sub-link-btn{font-size:0.65rem;color:var(--green);text-decoration:none;border:1px solid rgba(106,136,112,0.3);border-radius:var(--radius-sm);padding:2px 8px}
.sub-item .sub-del{font-size:0.65rem;color:var(--red);cursor:pointer;border:1px solid rgba(144,80,80,0.3);border-radius:var(--radius-sm);padding:2px 6px;white-space:nowrap;opacity:0.7}
.sub-item .sub-del:hover{opacity:1}
.sub-restore-btn{font-size:0.7rem;color:var(--gold);cursor:pointer;text-align:center;padding:8px;opacity:0.7}
.sub-restore-btn:hover{opacity:1}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;display:none;justify-content:center;align-items:flex-end}
.modal-overlay.show{display:flex}
.modal{background:var(--bg-deep);border-top:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;padding:16px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.modal-title{font-size:1.1rem;font-weight:700;color:var(--text-bright);font-family:'Playfair Display',serif;text-transform:uppercase;letter-spacing:1px}
.modal-close{background:none;border:none;color:var(--text-dim);font-size:1.5rem;cursor:pointer}

/* EDITOR */
.edit-ex-item{display:flex;flex-direction:column;gap:10px;padding:14px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;transition:border-color 0.2s,box-shadow 0.2s}
.edit-ex-item.picked{border-color:var(--iron);box-shadow:0 0 12px rgba(128,144,168,0.3);background:rgba(128,144,168,0.08)}
.edit-ex-item.drop-target{border-color:var(--gold);box-shadow:0 -3px 0 var(--gold)}
.edit-ex-top{display:flex;align-items:center;gap:8px}
.edit-ex-top .drag-handle{color:var(--text-dim);font-size:1.3rem;cursor:pointer;padding:6px 4px;user-select:none;-webkit-user-select:none;line-height:1;min-width:28px;text-align:center}
.edit-ex-item.picked .drag-handle{color:var(--iron)}
.edit-ex-top .edit-num{color:var(--text-dim);font-size:0.85rem;font-weight:700;min-width:18px}
.edit-ex-top .edit-name-input{flex:1;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text-bright);font-size:1rem;font-weight:600;font-family:'Oswald',sans-serif}
.edit-ex-top .edit-name-input:focus{outline:none;border-color:var(--iron)}
.edit-ex-actions{display:flex;gap:4px;align-items:center}
.edit-ex-actions button{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-dim);font-size:0.85rem;cursor:pointer;padding:6px 8px;transition:border-color 0.15s,color 0.15s}
.edit-ex-actions button:active{border-color:var(--iron);color:var(--iron)}
.edit-ex-actions .edit-del{color:var(--red);border-color:rgba(144,80,80,0.3)}
.edit-ex-actions .edit-swap{color:var(--gold);border-color:rgba(160,148,106,0.3)}
.ex-picker{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(10,12,16,0.98);z-index:10;display:flex;flex-direction:column;border-radius:var(--radius)}
.ex-picker-header{display:flex;align-items:center;gap:8px;padding:12px;border-bottom:1px solid var(--border)}
.ex-picker-header input{flex:1;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text-bright);font-size:0.85rem;font-family:'Oswald',sans-serif}
.ex-picker-header input:focus{outline:none;border-color:var(--iron)}
.ex-picker-header button{background:none;border:none;color:var(--text-dim);font-size:1.3rem;cursor:pointer;padding:4px 8px}
.ex-picker-list{flex:1;overflow-y:auto;padding:8px 12px}
.ex-picker-group{font-size:0.65rem;color:var(--iron);text-transform:uppercase;letter-spacing:2px;padding:8px 0 4px;font-family:'Oswald',sans-serif;font-weight:700}
.ex-picker-item{padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:4px;cursor:pointer;transition:border-color 0.15s}
.ex-picker-item:active{border-color:var(--iron);background:rgba(128,144,168,0.08)}
.ex-picker-item .pi-name{font-size:0.85rem;color:var(--text-bright);font-weight:600}
.ex-picker-item .pi-detail{font-size:0.7rem;color:var(--text-dim);margin-top:2px}
.ex-picker-item .pi-recent{font-size:0.6rem;color:var(--gold);margin-top:2px}
.edit-ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}
.edit-ex-grid .edit-field-group{display:flex;flex-direction:column;gap:3px}
.edit-ex-grid .edit-field-group.full{grid-column:1/-1}
.edit-ex-grid label{font-size:0.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;font-family:'Oswald',sans-serif}
.edit-ex-grid input,.edit-ex-grid select{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text-bright);font-size:0.85rem;font-family:'Oswald',sans-serif;width:100%}
.edit-ex-grid input:focus,.edit-ex-grid select:focus{outline:none;border-color:var(--iron)}
.edit-save-btn{display:block;width:100%;background:var(--iron);color:#fff;border:none;border-radius:var(--radius-sm);padding:12px;font-size:0.95rem;font-weight:600;cursor:pointer;margin-top:12px}
.edit-reset-btn{display:block;width:100%;background:none;border:1px solid var(--border);color:var(--text-dim);border-radius:var(--radius-sm);padding:10px;font-size:0.85rem;cursor:pointer;margin-top:8px}
.edit-add-btn{display:block;width:100%;background:none;border:1px dashed var(--border);border-radius:var(--radius-sm);padding:8px;color:var(--text-dim);font-size:0.8rem;cursor:pointer;margin-top:6px}
.edit-add-btn:hover{border-color:var(--iron);color:var(--iron)}
.base-badge{display:inline-block;font-size:0.6rem;padding:2px 6px;border-radius:8px;background:rgba(74,170,106,0.1);color:var(--green);border:1px solid rgba(74,170,106,0.2);margin-left:6px}
.custom-badge{display:inline-block;font-size:0.6rem;padding:2px 6px;border-radius:8px;background:rgba(232,184,74,0.1);color:var(--gold);border:1px solid rgba(232,184,74,0.2);margin-left:6px}

/* SWAP MODAL */
.swap-item{padding:10px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.2s}
.swap-item:hover{background:var(--bg-card-hover)}
.swap-item .swap-name{font-size:0.85rem;color:var(--text-bright)}
.swap-item .swap-ath{font-size:0.75rem;color:var(--gold)}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--iron);color:#fff;padding:10px 24px;border-radius:var(--radius);font-size:0.85rem;font-weight:700;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px;box-shadow:0 4px 16px rgba(0,0,0,0.5)}
.toast.show{opacity:1}

/* PROGRAMS VIEW */
.prog-overview{background:rgba(14,16,20,0.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(128,144,168,0.12);border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.3);cursor:pointer;transition:border-color 0.2s}
.prog-overview:hover{border-color:var(--border-light)}
.prog-overview.current{border-color:var(--iron);box-shadow:0 0 12px rgba(128,144,168,0.15)}
.prog-overview .prog-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-overview .prog-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:900;color:var(--text-bright);text-transform:uppercase;letter-spacing:1px}
.prog-overview .prog-badge{font-size:0.6rem;padding:3px 8px;border-radius:10px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px}
.prog-overview .prog-badge.phase{background:rgba(128,144,168,0.15);color:var(--iron);border:1px solid rgba(128,144,168,0.25)}
.prog-overview .prog-badge.active-badge{background:rgba(106,136,112,0.2);color:var(--green);border:1px solid rgba(106,136,112,0.3)}
.prog-overview .prog-split{font-size:0.7rem;color:var(--text-dim);margin-bottom:10px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px}
.prog-overview .prog-days-list{display:flex;flex-direction:column;gap:4px}
.prog-overview .prog-day-row{display:flex;gap:8px;align-items:baseline;padding:3px 0}
.prog-overview .prog-day-letter{font-family:'Oswald',sans-serif;font-weight:700;font-size:0.8rem;color:var(--iron);min-width:20px}
.prog-overview .prog-day-label{font-size:0.78rem;color:var(--text);flex:1}
.prog-overview .prog-day-count{font-size:0.65rem;color:var(--text-dim);font-family:'Oswald',sans-serif}
.prog-overview .prog-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.prog-overview.expanded .prog-detail{display:block}
.prog-detail-day{margin-bottom:10px}
.prog-detail-header{font-family:'Oswald',sans-serif;font-weight:700;font-size:0.8rem;color:var(--iron);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid rgba(128,144,168,0.15)}
.prog-detail-ex{display:flex;gap:6px;align-items:baseline;padding:2px 0;font-size:0.75rem}
.prog-detail-num{color:var(--text-dim);min-width:18px;font-family:'Oswald',sans-serif}
.prog-detail-name{color:var(--text);flex:1}
.prog-detail-reps{color:var(--iron);font-family:'Oswald',sans-serif;font-weight:600;white-space:nowrap}
.prog-detail-tech{font-size:0.6rem;padding:1px 5px;border-radius:8px;background:rgba(160,148,106,0.15);color:var(--gold);border:1px solid rgba(160,148,106,0.25);font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.5px;vertical-align:middle}
.prog-detail-weights{font-size:0.7rem;color:var(--gold);opacity:0.7;padding:0 0 4px 28px;font-family:'Oswald',sans-serif}
.prog-week-bar{margin-top:8px;padding-top:8px;border-top:1px solid rgba(128,144,168,0.1)}
.prog-week-label{font-size:0.7rem;color:var(--text-dim);font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;display:flex;justify-content:space-between}
.prog-week-track{height:4px;background:rgba(128,144,168,0.1);border-radius:2px;overflow:hidden}
.prog-week-fill{height:100%;border-radius:2px;transition:width 0.3s}
.prog-week-fill.ok{background:var(--iron)}
.prog-week-fill.warn{background:var(--gold)}
.prog-week-fill.expired{background:var(--red)}
.workout-week-banner{background:rgba(128,144,168,0.08);border:1px solid rgba(128,144,168,0.15);border-radius:var(--radius);padding:8px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;font-family:'Oswald',sans-serif}

.workout-week-text{font-size:0.8rem;color:var(--text);text-transform:uppercase;letter-spacing:1px}

.workout-week-days{font-size:0.7rem;color:var(--text-dim)}
.workout-week-switch{font-size:0.65rem;color:var(--red-bright);text-transform:uppercase;letter-spacing:1px;font-weight:700;animation:pulse 2s infinite}

.add-pr-btn:hover{background:rgba(128,144,168,0.25)}

.ss-trend{display:inline-block;font-size:0.72rem;padding:2px 10px;border-radius:10px;font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:0.5px;margin-top:4px}
.ss-trend.up{background:rgba(74,170,106,0.15);color:var(--green);border:1px solid rgba(74,170,106,0.25)}
.ss-trend.down{background:rgba(212,90,90,0.15);color:var(--red);border:1px solid rgba(212,90,90,0.25)}
.ss-trend.flat{background:rgba(232,200,74,0.15);color:var(--yellow);border:1px solid rgba(232,200,74,0.25)}
.ss-chart{margin:10px 0 6px;position:relative}
.ss-chart canvas{width:100%;height:120px;touch-action:none}
.ss-tooltip{position:absolute;top:0;background:rgba(10,12,16,0.9);border:1px solid var(--gold);border-radius:var(--radius-sm);padding:4px 10px;pointer-events:none;white-space:nowrap;font-family:'Oswald',sans-serif;z-index:10;transform:translateX(-50%);opacity:0;transition:opacity 0.15s}
.ss-tooltip.show{opacity:1}
.ss-tooltip .ss-tt-score{font-size:0.95rem;font-weight:700;color:var(--gold-glow)}
.ss-tooltip .ss-tt-date{font-size:0.6rem;color:var(--text-dim);letter-spacing:1px}
.ss-breakdown{display:flex;flex-wrap:wrap;gap:4px 10px;justify-content:center;margin-top:8px;max-width:380px;margin-left:auto;margin-right:auto}
.ss-muscle{font-size:0.62rem;color:var(--green);font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.5px}

.ss-range-tabs{display:flex;gap:4px;justify-content:center;margin-top:8px}
.ss-range-tab{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px 10px;font-size:0.65rem;color:var(--text-dim);cursor:pointer;font-family:'Oswald',sans-serif}
.ss-range-tab.active{background:linear-gradient(135deg,var(--iron-deep),var(--iron));border-color:var(--iron);color:#fff}
.ss-plateau{margin-top:10px;padding:8px 12px;border-radius:var(--radius-sm);background:rgba(232,200,74,0.08);border:1px solid rgba(232,200,74,0.2);font-size:0.72rem;color:var(--yellow);line-height:1.5;text-align:left}

.ss-plateau .ss-plat-tip{color:var(--text);opacity:0.8;font-size:0.68rem}
.ss-plateau .ss-plat-dismiss{float:right;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:0.9rem;padding:0 2px;margin-top:-2px}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg-deep)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

<!-- HEADER -->
<header class="app-header">
  <h1><span>ZER</span>CHER</h1>

    <span class="sync-dot" id="syncDot" title="Sync status"></span>
    <button class="header-btn" onclick="openSettings()" title="Settings">&#9881;</button>
  </div>
</header>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- VIEW: WORKOUT -->
<div id="view-workout" class="view active">

  <div class="workout-timer" id="workoutTimer"></div>
  <div id="startOverlay"></div>
  <div id="workoutExercises"></div>
  <button class="finish-btn" id="finishBtn" style="display:none" onclick="finishWorkout()">Finish Workout</button>
</div>

<!-- VIEW: PROGRESS -->
<div id="view-progress" class="view">
  <div style="display:flex;gap:8px;margin-bottom:10px">
    <input type="text" class="search-bar" id="progressSearch" placeholder="Search exercises..." oninput="renderProgress()" style="margin-bottom:0;flex:1">
    <button class="add-pr-btn" onclick="openAddPR()">+ PR</button>
  </div>
  <div id="strengthScore"></div>
  <div id="progressCards"></div>
</div>

<!-- VIEW: LIBRARY -->
<div id="view-library" class="view">
  <div class="lib-mode-tabs">
    <button class="lib-mode-tab active" id="libTabExercises" onclick="setLibMode('exercises')">Exercises</button>
    <button class="lib-mode-tab" id="libTabFavs" onclick="setLibMode('favs')">Favorites</button>
    <button class="lib-mode-tab" id="libTabSubs" onclick="setLibMode('subs')">Substitutions</button>
  </div>
  <div id="libExercisesPanel">
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input class="search-bar" id="libSearch" placeholder="Search exercises..." oninput="renderLibrary()" style="margin-bottom:0;flex:1">
      <button class="add-pr-btn" onclick="openAddExercise()">+ Add</button>
    </div>
    <div class="muscle-tabs" id="libMuscleTabs"></div>
    <div id="libList"></div>
  </div>
  <div id="libSubsPanel" style="display:none">
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input class="search-bar" id="subSearch" placeholder="Search substitutions..." oninput="renderSubs()" style="margin-bottom:0;flex:1">
      <button class="add-pr-btn" onclick="openAddSub()">+ Add</button>
    </div>
    <div id="subsList"></div>
  </div>
</div>

<!-- REST TIMER -->
<div class="rest-timer" id="restTimer">
  <div class="rest-time" id="restTime">1:30</div>
  <div class="rest-btns">
    <button class="rest-btn" onclick="addRestTime(30)">+30s</button>
    <button class="rest-btn skip" onclick="skipRest()">Skip</button>
  </div>
</div>

<!-- MODAL (Editor / Swap) -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">

</div>

<!-- VIEW: PROGRAMS -->
<div id="view-programs" class="view">

</div>

function jsonpFetch(url,cb){
  const cbName='_zrCb_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
  const script=document.createElement('script');
  let done=false;
  window[cbName]=function(resp){done=true;delete window[cbName];script.remove();cb(null,resp)};
  script.src=url+(url.includes('?')?'&':'?')+'callback='+cbName;
  script.onerror=function(){if(!done){delete window[cbName];script.remove();cb('Failed')}};
  setTimeout(function(){if(!done){delete window[cbName];script.remove();cb('Timeout')}},15000);
  document.head.appendChild(script);
}

// JSONP chunked GET — works even with AdBlock Plus
var CHUNK_SIZE=3000;
function pushChunked(jsonStr,target,onDone){
  if(!jsonStr||jsonStr==='{}'){ if(onDone)onDone(); return; }
  var chunks=[];
  for(var i=0;i<jsonStr.length;i+=CHUNK_SIZE)chunks.push(jsonStr.substring(i,i+CHUNK_SIZE));
  var idx=0;
  function sendNext(){
    if(idx>=chunks.length){
      jsonpFetch(SYNC_ENDPOINT+'?action=zercher_save_done&target='+target+'&n='+chunks.length,function(err2){if(onDone)onDone(err2)});
      return;
    }
    var url=SYNC_ENDPOINT+'?action=zercher_save_chunk&i='+idx+'&cd='+encodeURIComponent(chunks[idx]);
    idx++;
    jsonpFetch(url,function(err){if(err){if(onDone)onDone(err);return;}sendNext()});
  }
  sendNext();
}

function syncConfigToCloud(){
  if(!syncReady)return;
  try{
    const syncPrograms={};
    for(const k in data.customPrograms){if(k!=='ABCD09'&&k!=='ABCD10')syncPrograms[k]=data.customPrograms[k];}
    const config={activeProgram:data.activeProgram,customPrograms:syncPrograms,customSubs:data.customSubs||[],customExercises:data.customExercises||[],settings:data.settings,prs:data.prs||{},deletedSubs:data.deletedSubs||[],programStartDates:data.programStartDates||{},programWeeks:data.programWeeks||{}};
    const jsonStr=JSON.stringify(config);
    const encoded=encodeURIComponent(jsonStr);
    // If small enough, single JSONP GET; otherwise chunked
    if(encoded.length<7000){
      jsonpFetch(SYNC_ENDPOINT+'?action=zercher_save_config&data='+encoded,function(){});
    }else{
      pushChunked(jsonStr,'config',function(){});
    }
  }catch(e){console.warn('Config sync failed',e)}
}

    if(encoded.length<7000)jsonpFetch(SYNC_ENDPOINT+'?action=zercher_log_workout&data='+encoded,function(){});
    else console.warn('Workout too large for GET:',encoded.length);
  }catch(e){console.warn('Workout sync failed',e)}
}
function syncRunToCloud(runEntry){
  if(!syncReady)return;
  try{
    const encoded=encodeURIComponent(JSON.stringify(runEntry));
    if(encoded.length<7000)jsonpFetch(SYNC_ENDPOINT+'?action=zercher_log_run&data='+encoded,function(){});
    else console.warn('Run log too large for GET:',encoded.length);
  }catch(e){console.warn('Run sync failed',e)}
}
function syncToCloud(){syncConfigToCloud();syncExtraToCloud()}
function fullSync(){
  toast('Syncing...');
  syncConfigToCloud();
  syncExtraToCloud();
  jsonpFetch(SYNC_ENDPOINT+'?action=zercher_load',function(err,resp){
    if(err||!resp){toast('Sync failed');return}
    const cloudIds=new Set((resp.logs||[]).map(l=>l.id));
    const unsynced=data.logs.filter(l=>!cloudIds.has(l.id));
    const cloudRunIds=new Set((resp.runLogs||[]).map(l=>l.id));
    const unsyncedRuns=(data.runLogs||[]).filter(l=>!cloudRunIds.has(l.id));
    const total=unsynced.length+unsyncedRuns.length;
    if(total===0){toast('All synced!');return}
    const allToSync=[...unsynced.map(l=>({type:'workout',data:l})),...unsyncedRuns.map(l=>({type:'run',data:l}))];
    let i=0;
    function sendNext(){
      if(i>=allToSync.length){toast('Synced '+total+' entries!');return}
      const item=allToSync[i];
      const encoded=encodeURIComponent(JSON.stringify(item.data));
      const action=item.type==='run'?'zercher_log_run':'zercher_log_workout';
      jsonpFetch(SYNC_ENDPOINT+'?action='+action+'&data='+encoded,function(){});
      i++;
      setTimeout(sendNext,600);
    }
    sendNext();
  });
}
function loadFromCloud(onComplete){
  jsonpFetch(SYNC_ENDPOINT+'?action=zercher_load',function(err,resp){
    if(err||!resp||resp.status!=='ok'){if(onComplete)onComplete();return}
    const cloudLogs=resp.logs||[];
    const cloudPrs=resp.prs||{};
    const config=resp.config||{};
    // Merge logs by ID
    const logMap={};
    data.logs.forEach(l=>{logMap[l.id]=l});
    cloudLogs.forEach(l=>{if(!logMap[l.id])logMap[l.id]=l});
    data.logs=Object.values(logMap).sort((a,b)=>a.date.localeCompare(b.date));
    // Merge PRs: take higher weight
    for(const eid in cloudPrs){
      if(!data.prs[eid])data.prs[eid]={};
      for(const reps in cloudPrs[eid]){
        const cloud=cloudPrs[eid][reps];
        const local=data.prs[eid][reps];
        if(!local||cloud.weight>local.weight)data.prs[eid][reps]=cloud;
      }
    }
    // Merge config — preserve ALL local custom programs
    const localCustom=JSON.parse(JSON.stringify(data.customPrograms||{}));
    // Don't overwrite local activeProgram from cloud — local switch always wins
    if(!data.activeProgram||!PROGRAMS[data.activeProgram]){
      if(config.activeProgram&&PROGRAMS[config.activeProgram])data.activeProgram=config.activeProgram;
      else data.activeProgram='ABCD09';
    }
    if(config.customPrograms){
      for(const k in config.customPrograms){
        if(!PROGRAMS[k])continue;
        if(!localCustom[k]){data.customPrograms[k]=config.customPrograms[k];continue;}
        const cloudDays=config.customPrograms[k].days||{};
        if(!data.customPrograms[k])data.customPrograms[k]={days:{}};
        if(!data.customPrograms[k].days)data.customPrograms[k].days={};
        for(const d in cloudDays){
          const localDay=data.customPrograms[k].days[d];
          const cloudDay=cloudDays[d];
          if(!localDay){data.customPrograms[k].days[d]=cloudDay;}
          else{
            const localEx=(localDay.ex||[]).length;
            const cloudEx=(cloudDay.ex||[]).length;
            if(cloudEx>localEx)data.customPrograms[k].days[d]=cloudDay;
          }
        }
      }
    }
    for(const k in localCustom){if(PROGRAMS[k]&&!data.customPrograms[k])data.customPrograms[k]=localCustom[k]}
    if(config.customSubs){
      if(!data.customSubs)data.customSubs=[];
      const localNames=new Set(data.customSubs.map(s=>s.name));
      config.customSubs.forEach(s=>{if(!localNames.has(s.name))data.customSubs.push(s)});
    }
    if(config.deletedSubs){
      if(!data.deletedSubs)data.deletedSubs=[];
      config.deletedSubs.forEach(d=>{if(!data.deletedSubs.includes(d))data.deletedSubs.push(d)});
    }
    if(config.customExercises)data.customExercises=config.customExercises;
    if(config.settings)data.settings=config.settings;
    if(config.programStartDates){
      if(!data.programStartDates)data.programStartDates={};
      for(const k in config.programStartDates){if(!data.programStartDates[k])data.programStartDates[k]=config.programStartDates[k]}
    }
    if(config.programWeeks){
      if(!data.programWeeks)data.programWeeks={};
      for(const k in config.programWeeks){data.programWeeks[k]=config.programWeeks[k]}
    }
    if(config.prs){
      for(const eid in config.prs){
        if(!data.prs[eid])data.prs[eid]={};
        for(const reps in config.prs[eid]){
          const cloud=config.prs[eid][reps];
          const local=data.prs[eid][reps];
          if(!local||cloud.weight>local.weight)data.prs[eid][reps]=cloud;
        }
      }
    }
    // Merge run logs by ID — skip ghost runs
    const cloudRunLogs=(resp.runLogs||[]).filter(l=>l.actualMin>0);
    if(cloudRunLogs.length>0&&!window._runFixJustRan){
      if(!data.runLogs)data.runLogs=[];
      const runMap={};
      data.runLogs.forEach(l=>{runMap[l.id]=l});
      cloudRunLogs.forEach(l=>{if(!runMap[l.id])runMap[l.id]=l});
      data.runLogs=Object.values(runMap).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    }
    // Dedup run logs after cloud merge
    if(data.runLogs&&data.runLogs.length>0){
      data.runLogs=data.runLogs.filter(l=>l.actualMin>0);
      data.runLogs.forEach(l=>{l.week=l.date?weekStart(l.date):weekStart()});
      const sn=new Set();const sn2=new Set();const dd=[];
      data.runLogs.forEach(l=>{
        if(l.isExtra){dd.push(l);return}
        const k=l.runIndex+'|'+l.week+'|'+l.block;
        const k2=l.date+'|'+(l.actualMin||0)+'|'+(l.actualKm||0);
        if(!sn.has(k)&&!sn2.has(k2)){sn.add(k);sn2.add(k2);dd.push(l)}
      });
      if(dd.length!==data.runLogs.length){data.runLogs=dd;}
    }
    // Merge extra (holds, notes, starts)
    const extra=resp.extra||{};
    try{
      if(extra.holds){const h=getHolds();for(const k in extra.holds){if(!h[k])h[k]=extra.holds[k];}saveHolds(h);}
      if(extra.notes){const n=getExNotes();for(const k in extra.notes){if(!n[k])n[k]=extra.notes[k];}saveExNotes(n);}
      if(extra.starts){const s=getStartWeights();for(const k in extra.starts){if(!s[k])s[k]=extra.starts[k];}saveStartWeights(s);}
      if(extra.favs){extra.favs.forEach(f=>favExercises.add(f));localStorage.setItem('fav_exercises',JSON.stringify([...favExercises]));}
      if(extra.platePref){const p=getPlatePref();for(const k in extra.platePref){if(!p[k])p[k]=extra.platePref[k];}savePlatePref(p);}
      if(extra.noPlate){const np=getNoPlate();for(const k in extra.noPlate){if(np[k]===undefined)np[k]=extra.noPlate[k];}saveNoPlate(np);}
      if(extra.singleEnd){const se=getSingleEnd();for(const k in extra.singleEnd){if(!se[k])se[k]=extra.singleEnd[k];}saveSingleEnd(se);}
      if(extra.absReps){const ar=getAbsLastReps();for(const k in extra.absReps){if(!ar[k])ar[k]=extra.absReps[k];}saveAbsLastReps(ar);}
    }catch(e){console.warn('Extra merge error',e)}
    // Restore any new custom subs into SUBS_DATA
    (data.customSubs||[]).forEach(s=>{
      let group=SUBS_DATA.find(g=>g.muscle.toLowerCase()===s.muscle.toLowerCase());
      if(!group){group={muscle:s.muscle,subs:[]};SUBS_DATA.push(group);}
      let subcat=group.subs.find(c=>c.cat.toLowerCase()===s.cat.toLowerCase());
      if(!subcat){subcat={cat:s.cat,ex:[]};group.subs.push(subcat);}
      if(!subcat.ex.includes(s.name))subcat.ex.push(s.name);
    });
    try{saveData()}catch(e){console.warn('Save error after sync',e)}
    syncConfigToCloud();
    try{if(currentView==='workout')renderWorkout();if(currentView==='subs')renderSubs();}catch(e){console.warn('Render error after sync',e)}
    if(onComplete)onComplete();
  });
}

const ALL_PLATES=[45,35,25,10,5,2.5];
const NO_PLATE_KEYWORDS=/halter|dumbbell|halteres|polia|cable|cabo|pulley|maquina|machine|cadeira|mesa flexora|voador|flexao|apoio|prancha|plank|paralela|abdominal|elevacao|crucifixo|concentrado|coice|kickback|kettlebell|elastico|band|bodyweight|dragon|crunch|canivete|remador|carrinho/i;

function calcPlates(totalWeight,usePlates,singleEnd){
  const plates=usePlates||ALL_PLATES;
  let perSide=singleEnd?Math.round(totalWeight*10)/10:Math.round((totalWeight/2)*10)/10;
  if(perSide<=0)return{perSide:0,breakdown:[],remainder:0,singleEnd:!!singleEnd};
  let rem=perSide;
  const breakdown=[];
  for(const p of plates){
    const count=Math.floor(rem/p);
    if(count>0){breakdown.push({plate:p,count});rem-=count*p;}
  }
  return{perSide,breakdown,remainder:Math.round(rem*10)/10,singleEnd:!!singleEnd};
}

function plateVisual(breakdown){
  const colors={45:'p45',35:'p35',25:'p25',10:'p10',5:'p5',2.5:'p2'};
  let html='<div class="plate-visual"><div class="plate-bar-vis"></div>';
  breakdown.forEach(b=>{
    for(let i=0;i<b.count;i++){
      html+=`<div class="plate-disc ${colors[b.plate]||'p10'}">${b.plate}</div>`;
    }
  });
  html+='</div>';
  return html;
}

function showPlatePopup(exName,weightVal,e){

  let pop=document.getElementById('platePopup');

function renderPlatePopup(exName,weight){
  let pop=document.getElementById('platePopup');
  if(pop)pop.remove();
  const enabled=getExPlates(exName);
  const single=isSingleEnd(exName);
  const result=calcPlates(weight,enabled,single);
  pop=document.createElement('div');
  pop.id='platePopup';pop.className='plate-popup';

  let breakdownStr=result.breakdown.map(b=>b.count>1?b.count+'×'+b.plate:b.plate).join(' + ');
  if(result.remainder>0)breakdownStr+=(breakdownStr?' + ':'')+result.remainder+'?';
  if(!breakdownStr)breakdownStr='No plates needed';

  const esc=exName.replace(/'/g,"\\'");
  const loadWeight=single?weight:Math.round((weight/2)*10)/10;
  const sideLabel=single?'One end':'Each side';
  pop.innerHTML=`<button class="plate-popup-close" onclick="document.getElementById('platePopup').remove()">&times;</button>
    <div class="plate-popup-title">Plates: ${exName}</div>
    <div class="plate-bar-row"><span>Use:</span>${ALL_PLATES.map(p=>{const imp=p>loadWeight;const cls=imp?' impossible':enabled.includes(p)?' active':'';return`<button class="plate-bar-btn${cls}"${imp?'':` onclick="togglePlateSize('${esc}',${p},${weight})"`}>${p}</button>`;}).join('')}</div>
    <div class="plate-bar-row"><button class="plate-bar-btn${single?' active':''}" onclick="toggleSingleEnd('${esc}');renderPlatePopup('${esc}',${weight})">Single end (T-bar)</button></div>
    <div class="plate-breakdown">
      <div class="plate-per-side">${sideLabel}: ${breakdownStr}</div>
      <div class="plate-detail">${result.perSide} lbs ${single?'total on bar':'per side'}</div>
      ${result.breakdown.length>0?plateVisual(result.breakdown):''}
    </div>
    <button class="plate-bar-btn" style="margin-top:8px;width:100%" onclick="toggleNoPlate('${esc}');document.getElementById('platePopup').remove()">Hide plates for this exercise</button>`;


  document.body.appendChild(pop);
  setTimeout(()=>{document.addEventListener('click',function closePop(ev){
    if(document.getElementById('platePopup')&&!document.getElementById('platePopup').contains(ev.target)){
      document.getElementById('platePopup')?.remove();document.removeEventListener('click',closePop);
    }
  })},100);
}

function togglePlateSize(exName,size,weight){
  let enabled=getExPlates(exName);
  if(enabled.includes(size)){
    enabled=enabled.filter(p=>p!==size);
    if(enabled.length===0)enabled=[size]; // keep at least one
  } else {
    enabled.push(size);
    enabled.sort((a,b)=>b-a);
  }
  setExPlates(exName,enabled);
  renderPlatePopup(exName,weight);
}

function getProgramWeekInfo(pid){
  const totalWeeks=getProgWeeks(pid);if(!totalWeeks)return null;
  const startStr=(data.programStartDates||{})[pid];if(!startStr)return null;
  const start=new Date(startStr+'T00:00:00');const now=new Date();
  const diffMs=now-start;const diffDays=Math.floor(diffMs/86400000);
  const currentWeek=Math.floor(diffDays/7)+1;
  const daysLeft=totalWeeks*7-diffDays;
  return{currentWeek:Math.min(currentWeek,totalWeeks+1),totalWeeks,expired:currentWeek>totalWeeks,daysLeft:Math.max(0,daysLeft),startDate:startStr};
}
function parseRepToken(tok){
  // "8-12" → 12, "10" → 10, "30-40s" → 40
  const rm=tok.match(/(\d+)-(\d+)/);
  if(rm)return+rm[2];
  const nm=tok.match(/(\d+)/);
  return nm?+nm[1]:10;
}
function parseSets(str){
  // Parse setsReps string into array of {reps, type}
  // For ranges like 8-12, always use HIGH end as the target
  if(!str)return[{reps:10,type:'working'},{reps:10,type:'working'},{reps:10,type:'working'},{reps:10,type:'working'}];
  const s=str.toLowerCase();
  // Strip suffixes: "bi-set", "rest-pause", etc
  const clean=s.replace(/\s*(bi-set|rest-pause|tri-set|superset|sequences?)\s*/gi,'').trim();
  // Handle warmup+working: "2x10wu+4x8-12" or "2x10wu+12-15/10-12/8-10/5-8"
  const wuMatch=clean.match(/(\d+)x(\d+)\s*wu\s*\+\s*(.*)/i);
  if(wuMatch){
    const sets=[];
    for(let i=0;i<+wuMatch[1];i++)sets.push({reps:+wuMatch[2],type:'warmup'});
    let workPart=wuMatch[3];
    // Check for drop set suffix: "+1xDrop", "+Drop"
    let dropCount=0;
    const dropSuffix=workPart.match(/\+(\d*)x?drop$/i);
    if(dropSuffix){dropCount=+(dropSuffix[1]||1);workPart=workPart.replace(/\+\d*x?drop$/i,'');}
    // Working part could be "4x8-12" or "12-15/10-12/8-10"
    const wxm=workPart.match(/^(\d+)x(.+)/);
    if(wxm){for(let i=0;i<+wxm[1];i++)sets.push({reps:parseRepToken(wxm[2]),type:'working'})}
    else{workPart.split('/').forEach(tok=>sets.push({reps:parseRepToken(tok),type:'working'}))}
    for(let i=0;i<dropCount;i++)sets.push({reps:'',type:'drop'});
    return sets;
  }
  // Handle pyramid with ranges: "12-15/10-12/8-10" or "20-30/15-20/10-15/5-10"
  if(clean.includes('/')){
    // Check if it has NxM segments like "1x12/2x10"
    const hasNx=clean.match(/\d+x\d+/);
    if(hasNx){
      const sets=[];
      clean.split('/').forEach(seg=>{
        const nxm=seg.match(/(\d+)x(.+)/);
        if(nxm){for(let i=0;i<+nxm[1];i++)sets.push({reps:parseRepToken(nxm[2]),type:'working'})}
        else sets.push({reps:parseRepToken(seg),type:'working'});
      });
      return sets;
    }
    return clean.split('/').map(tok=>({reps:parseRepToken(tok),type:'working'}));
  }
  // Handle "NxR-R+drop" like "2x8-12+1xDrop" or "3x10-12+1xDrop"
  const dropMatch=clean.match(/(\d+)x([\d-]+)\+(\d*)x?drop/i);
  if(dropMatch){
    const sets=[];
    for(let i=0;i<+dropMatch[1];i++)sets.push({reps:parseRepToken(dropMatch[2]),type:'working'});
    const dc=+(dropMatch[3]||1);
    for(let i=0;i<dc;i++)sets.push({reps:'',type:'drop'});
    return sets;
  }
  // Handle "NxR" or "NxR-R" (simple sets)
  const simpleMatch=clean.match(/^(\d+)x(.+)/);
  if(simpleMatch){const sets=[];for(let i=0;i<+simpleMatch[1];i++)sets.push({reps:parseRepToken(simpleMatch[2]),type:'working'});return sets}
  // Default 4 sets
  return[{reps:10,type:'working'},{reps:10,type:'working'},{reps:10,type:'working'},{reps:10,type:'working'}];
}

function loadData(){
  try{data=JSON.parse(localStorage.getItem(STORAGE_KEY));if(!data)throw 0}
  catch(e){data={activeProgram:'ABCD09',customPrograms:{},logs:[],prs:{},settings:{weightUnit:'lbs',language:'pt'},runLogs:[],programStartDates:{}}}
  // Restore custom subs into SUBS_DATA
  (data.customSubs||[]).forEach(s=>{
    let group=SUBS_DATA.find(g=>g.muscle.toLowerCase()===s.muscle.toLowerCase());
    if(!group){group={muscle:s.muscle,subs:[]};SUBS_DATA.push(group);}
    let subcat=group.subs.find(c=>c.cat.toLowerCase()===s.cat.toLowerCase());
    if(!subcat){subcat={cat:s.cat,ex:[]};group.subs.push(subcat);}
    if(!subcat.ex.includes(s.name))subcat.ex.push(s.name);
  });
}

  if(data.runLogs.length>0){

      const key2=l.date+'|'+(l.actualMin||0)+'|'+(l.actualKm||0);
      if(!seen.has(key)&&!seen2.has(key2)){seen.add(key);seen2.add(key2);deduped.push(l)}
    });

  // Exercise name migration (v97): standardize old variants to canonical names
  const NAME_MAP={

    'Abdominal Infra no Solo':'Abdomen Infra no Solo',
    'Abdominal Infra no Banco':'Abdomen Infra no Banco',
    'Elevação Lateral':'Elevação Lateral com Halteres',
    'Tríceps Testa com Halteres':'Tríceps Testa Halteres',
    'Afundo com Halteres':'Passada com Halteres'
  };
  if(!data._nameMigV97){
    // Rename in logs
    (data.logs||[]).forEach(log=>{
      (log.exercises||[]).forEach(ex=>{if(NAME_MAP[ex.name])ex.name=NAME_MAP[ex.name]});
    });
    // Rename in customPrograms
    for(const pid in data.customPrograms||{}){
      const cp=data.customPrograms[pid];
      for(const dk in cp.days||{}){
        (cp.days[dk].ex||[]).forEach(e=>{if(NAME_MAP[e[0]])e[0]=NAME_MAP[e[0]]});
      }
    }
    // Rename in PRs
    for(const oldName in NAME_MAP){
      const oldId=exId(oldName),newId=exId(NAME_MAP[oldName]);
      if(data.prs&&data.prs[oldId]&&!data.prs[newId]){data.prs[newId]=data.prs[oldId];delete data.prs[oldId]}
    }
    // Rename in holds, notes, start weights
    [['zercher_holds',getHolds,saveHolds],['zercher_notes',getExNotes,saveExNotes],['zercher_starts',getStartWeights,saveStartWeights],['zercher_platepref',getPlatePref,savePlatePref]].forEach(([key,getter,setter])=>{
      const obj=getter();let changed=false;
      for(const oldName in NAME_MAP){if(obj[oldName]){obj[NAME_MAP[oldName]]=obj[oldName];delete obj[oldName];changed=true}}

  if(!data._nameMigV121){

  if(!localStorage.getItem('zr_migrate_v156')){

      if(cp&&cp.days){delete cp.days.ABS;delete cp.days.RUN;if(Object.keys(cp.days).length===0)delete data.customPrograms[pid];}
    }
    localStorage.setItem('zr_migrate_v156','1');
  }
  saveData();
}

// ── PROGRAM HELPERS ──
function getProgram(id){
  const p=PROGRAMS[id];if(!p)return null;
  // Merge custom overrides if any
  const custom=data.customPrograms[id];
  let merged;
  if(!custom){merged=JSON.parse(JSON.stringify(p))}
  else{merged=JSON.parse(JSON.stringify(p));for(const dk in custom.days||{}){if(custom.days[dk]&&custom.days[dk].ex&&merged.days[dk])merged.days[dk].ex=custom.days[dk].ex;}}
  // Replace old per-program ABS with single ABS day using selected routine
  delete merged.days.ABS;
  const absR=ABS_ROUTINES['ABS'+currentAbsRoutine]||ABS_ROUTINES.ABS1;
  merged.days.ABS={label:absR.label,labelEn:'Abs '+currentAbsRoutine,ex:absR.ex};
  // Append RUN day (persists across all programs)
  merged.days.RUN={label:'Corrida',labelEn:'Running',ex:[],isRun:true};
  return merged;
}
function getProgramDays(id){const p=getProgram(id);return p?Object.keys(p.days).filter(k=>k!=='ABS'&&k!=='RUN'&&k!=='_'):[]}
function getAllExerciseNames(){
  const names=new Set();
  for(const pid in PROGRAMS){
    for(const dk in PROGRAMS[pid].days){
      PROGRAMS[pid].days[dk].ex.forEach(e=>names.add(e[0]));
    }
  }
  // Also include abs routine exercises
  for(const ak in ABS_ROUTINES){ABS_ROUTINES[ak].ex.forEach(e=>names.add(e[0]))}
  // Include substitution exercises (excluding deleted)
  const delSubs=new Set(data.deletedSubs||[]);
  SUBS_DATA.forEach(g=>g.subs.forEach(c=>c.ex.forEach(n=>{if(!delSubs.has(n))names.add(n)})));
  // Include custom program exercises
  for(const pid in data.customPrograms){
    const cp=data.customPrograms[pid];
    for(const dk in cp.days||{}){if(cp.days[dk]&&cp.days[dk].ex)cp.days[dk].ex.forEach(e=>names.add(e[0]));}
  }
  // Include exercises from ATH data
  Object.keys(ATH_DATA).forEach(n=>names.add(n));
  // Include exercises from workout logs
  (data.logs||[]).forEach(log=>(log.exercises||[]).forEach(ex=>names.add(ex.name)));
  return[...names].sort();
}
function getExerciseMuscle(name){
  for(const pid in PROGRAMS){
    for(const dk in PROGRAMS[pid].days){
      const ex=PROGRAMS[pid].days[dk].ex.find(e=>e[0]===name);
      if(ex)return ex[2];
    }
  }
  for(const ak in ABS_ROUTINES){const ex=ABS_ROUTINES[ak].ex.find(e=>e[0]===name);if(ex)return ex[2]}
  for(const g of SUBS_DATA){for(const c of g.subs){if(c.ex.includes(name))return g.muscle.toLowerCase()}}
  // Also check custom programs
  for(const pid in data.customPrograms||{}){
    const cp=data.customPrograms[pid];
    for(const dk in cp.days||{}){
      const ex=(cp.days[dk].ex||[]).find(e=>e[0]===name);
      if(ex)return ex[2];
    }
  }
  // Infer from exercise name keywords (specific patterns first)
  const n=name.toLowerCase();
  if(n.includes('calf')||n.includes('calves'))return'calves';
  if(n.includes('shoulder')||n.includes('ombro')||n.includes('delt')||n.includes('lateral raise')||n.includes('upright row')||n.includes('rotacao'))return'shoulders';
  if(n.includes('bicep')||n.includes('curl')||n.includes('rosca')||n.includes('scott'))return'biceps';
  if(n.includes('tricep')||n.includes('jm press')||n.includes('pushdown')||n.includes('frances')||n.includes('pulley barra'))return'triceps';
  if(n.includes('chest')||n.includes('bench')||n.includes('supino')||n.includes('fly')||n.includes('pec')||n.includes('dumbell fly'))return'chest';
  if(n.includes('row')||n.includes('pulldown')||n.includes('lat ')||n.includes('pull-in')||n.includes('pullover')||n.includes('tbar')||n.includes('t-bar')||n.includes('reeves'))return'back';
  if(n.includes('squat')||n.includes('quad')||n.includes('leg press')||n.includes('lunge')||n.includes('leg ext'))return'quads';
  if(n.includes('hamstring')||n.includes('leg curl')||n.includes('rdl')||n.includes('stiff'))return'hamstrings';
  if(n.includes('glute')||n.includes('hip thrust'))return'glutes';
  if(n.includes('ab ')||n.includes('abs')||n.includes('crunch')||n.includes('plank')||n.includes('abdominal')||n.includes('sit-up'))return'abs';
  if(n.includes('forearm')||n.includes('wrist')||n.includes('grip'))return'forearms';
  if(n.includes('shrug')||n.includes('trap'))return'traps';
  return'other';
}
function getExerciseEnglish(name){
  for(const pid in PROGRAMS){
    for(const dk in PROGRAMS[pid].days){
      const ex=PROGRAMS[pid].days[dk].ex.find(e=>e[0]===name);
      if(ex)return ex[1];
    }
  }
  for(const ak in ABS_ROUTINES){const ex=ABS_ROUTINES[ak].ex.find(e=>e[0]===name);if(ex)return ex[1]}
  return name;
}
function getExerciseEquip(name){
  for(const g of SUBS_DATA){for(const c of g.subs){if(c.ex.includes(name))return c.cat}}
  const n=name.toLowerCase();
  if(n.includes('cable')||n.includes('pulldown')||n.includes('facepull'))return'Cable';
  if(n.includes('dumbbell')||n.includes('db '))return'Dumbbell';
  if(n.includes('barbell')||n.includes('ez bar'))return'Barbell / EZ Bar';
