<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0c10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Zercher">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Zercher</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg-deep:#0a0c10;--bg-card:#141820;--bg-card-hover:#1c2028;--bg-input:#0e1018;
--border:#2a3040;--border-light:#384058;
--text:#9aa0b0;--text-dim:#585e70;--text-bright:#c8ccd8;
--iron:#8090a8;--iron-glow:#98a8c0;--iron-deep:#607088;
--green:#6a8870;--green-bright:#7a9880;
--red:#905050;--red-bright:#a86060;
--gold:#a0946a;--gold-glow:#b8a878;
--yellow:#a0946a;
--radius:6px;--radius-sm:4px;
}
html{height:100%}
body{min-height:100%;color:var(--text);font-family:'Oswald',-apple-system,BlinkMacSystemFont,sans-serif;font-size:15px;-webkit-tap-highlight-color:transparent;overflow-x:hidden;padding-bottom:70px;
background:#000 url('bg-sandow.jpg') no-repeat center top fixed;background-size:cover}

/* HEADER */
.app-header{position:sticky;top:0;z-index:100;background:rgba(10,12,16,0.7);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(128,144,168,0.15)}
.app-header h1{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;color:var(--text-bright);letter-spacing:3px;text-transform:uppercase;text-shadow:0 1px 2px rgba(0,0,0,0.5)}
.app-header h1 span{color:var(--iron);text-shadow:0 0 8px rgba(128,144,168,0.3)}
.header-actions{display:flex;gap:10px;align-items:center}
.header-btn{background:none;border:none;color:var(--text-dim);font-size:1.2rem;cursor:pointer;padding:6px}
.header-btn:hover{color:var(--text-bright)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block}
.sync-dot.offline{background:var(--red)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,12,16,0.7);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:1px solid rgba(128,144,168,0.15);display:flex;justify-content:space-around;padding:6px 0 env(safe-area-inset-bottom,8px)}
.nav-btn{background:none;border:none;color:var(--text-dim);font-size:0.65rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;transition:color 0.2s;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px}
.nav-btn .nav-icon{font-size:1.3rem}
.nav-btn.active{color:var(--iron)}
.nav-btn.active .nav-icon{filter:drop-shadow(0 0 6px rgba(128,144,168,0.4))}

/* VIEWS */
.view{display:none;padding:12px 16px;max-width:600px;margin:0 auto}
.view.active{display:block}

/* CARDS */
.card{background:rgba(14,16,20,0.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(128,144,168,0.12);border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.card:hover{border-color:var(--border-light)}
.card-title{font-size:0.95rem;font-weight:600;color:var(--text-bright);margin-bottom:6px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.5px}
.card-sub{font-size:0.75rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px;font-family:'Oswald',sans-serif}

/* DAY TABS */
.day-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto}
.day-tab{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 18px;font-size:0.85rem;font-weight:700;color:var(--text-dim);cursor:pointer;white-space:nowrap;transition:all 0.2s;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px}
.day-tab.active{background:linear-gradient(135deg,var(--iron-deep),var(--iron));border-color:var(--iron);color:#fff;box-shadow:0 0 10px rgba(128,144,168,0.2)}

/* EXERCISE CARD (WORKOUT) */
.ex-card{background:rgba(14,16,20,0.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(128,144,168,0.12);border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.ex-card.all-done{border-color:rgba(74,170,106,0.3);max-height:48px;overflow:hidden;opacity:0.5;cursor:pointer;transition:max-height 0.3s,opacity 0.3s;padding:10px 14px}
.ex-card.all-done .ex-done-label{display:inline}
.ex-card.all-done.expanded{max-height:800px;opacity:1;padding:14px}
.ex-done-label{display:none;color:var(--green);font-size:0.75rem;margin-left:8px}
.ex-suggest{font-size:0.82rem;padding:8px 12px;margin-top:6px;border-radius:var(--radius-sm);background:rgba(255,255,255,0.05);line-height:1.5}
.ex-suggest.up{color:var(--green);border-left:3px solid var(--green)}
.ex-suggest.stay{color:var(--yellow);border-left:3px solid var(--yellow)}
.ex-suggest.down{color:var(--red);border-left:3px solid var(--red)}
.sug-main{font-weight:600}
.sug-trend{font-size:0.72rem;opacity:0.7;margin-top:3px}
.sug-trend-up{color:var(--green)}
.sug-trend-down{color:var(--red)}
.ex-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.ex-name{font-size:0.9rem;font-weight:700;color:var(--text-bright);font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.5px}
.ex-name-en{font-size:0.7rem;color:var(--text-dim)}
.ex-meta{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.ex-tag{font-size:0.65rem;padding:2px 8px;border-radius:10px;background:rgba(74,144,217,0.1);color:var(--iron);border:1px solid rgba(74,144,217,0.2)}
.ex-tag.tech{background:rgba(232,184,74,0.1);color:var(--gold);border-color:rgba(232,184,74,0.2);cursor:pointer}
.ex-tag.pattern{background:rgba(74,170,106,0.1);color:var(--green);border-color:rgba(74,170,106,0.2)}
.tech-popup{position:fixed;bottom:70px;left:16px;right:16px;max-width:568px;margin:0 auto;background:rgba(14,16,20,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(160,148,106,0.3);border-radius:var(--radius);padding:16px;z-index:200;box-shadow:0 -4px 24px rgba(0,0,0,0.6);animation:slideUp 0.2s ease}
.tech-popup-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.tech-popup-desc{font-size:0.85rem;color:var(--text);line-height:1.5}
.tech-popup-close{position:absolute;top:10px;right:14px;background:none;border:none;color:var(--text-dim);font-size:1.2rem;cursor:pointer}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* SET ROWS */
.set-row{display:grid;grid-template-columns:auto 1fr 1fr auto auto;gap:8px;align-items:center;margin-bottom:6px;padding:4px 0}
.set-label{font-size:0.75rem;color:var(--iron);min-width:36px}
.set-label.warmup{color:var(--yellow)}
.set-input{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text-bright);font-size:0.9rem;width:100%;text-align:center}
.set-input:focus{outline:none;border-color:var(--iron)}
.set-input::placeholder{color:var(--text-dim)}
.set-done-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:none;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.9rem;transition:all 0.2s}
.set-done-btn.done{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 0 6px rgba(106,136,112,0.3)}
.set-input-group{position:relative}
.set-unit{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:0.65rem;color:var(--text-dim)}

/* PR FLASH */
.pr-flash{display:none;background:linear-gradient(135deg,rgba(232,184,74,0.15),rgba(232,184,74,0.05));border:1px solid rgba(232,184,74,0.4);border-radius:var(--radius-sm);padding:6px 10px;margin-top:6px;font-size:0.75rem;color:var(--gold);font-weight:600;animation:prPulse 0.6s ease}
.pr-flash.show{display:block}
@keyframes prPulse{0%{transform:scale(0.95);opacity:0}50%{transform:scale(1.02)}100%{transform:scale(1);opacity:1}}

/* LAST TIME ROW */
.ex-last{font-size:0.7rem;color:var(--iron);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.ex-last .pr-badge{color:var(--gold);font-weight:600}

/* EX ACTIONS */
.ex-actions{display:flex;gap:8px;margin-top:8px}
.ex-action-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 10px;font-size:0.7rem;color:var(--text-dim);cursor:pointer}
.ex-action-btn:hover{border-color:var(--iron);color:var(--iron)}

/* ADD SET */
.add-set-btn{background:none;border:1px dashed var(--border);border-radius:var(--radius-sm);padding:6px;width:100%;color:var(--text-dim);font-size:0.75rem;cursor:pointer;margin-top:4px}
.add-set-btn:hover{border-color:var(--iron);color:var(--iron)}
.rm-set-btn{background:none;border:none;color:var(--text-dim);font-size:0.85rem;cursor:pointer;padding:4px;opacity:0.5;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.rm-set-btn:hover{color:var(--red);opacity:1}

/* REST TIMER */
.rest-timer{position:fixed;bottom:70px;left:0;right:0;background:var(--bg-deep);border-top:2px solid var(--border);padding:12px 16px;display:none;z-index:90;text-align:center}
.rest-timer.active{display:block}
.rest-time{font-size:2.2rem;font-weight:700;color:var(--text-bright);font-variant-numeric:tabular-nums;font-family:'Oswald',sans-serif;letter-spacing:2px}
.rest-time.warning{color:var(--gold)}
.rest-time.done{color:var(--green)}
.rest-btns{display:flex;gap:8px;justify-content:center;margin-top:8px}
.rest-btn{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 16px;color:var(--text);font-size:0.8rem;cursor:pointer}
.rest-btn.skip{background:var(--iron);border-color:var(--iron);color:#fff}

/* FINISH BTN */
.finish-btn{display:block;width:100%;background:linear-gradient(135deg,#5a8040,var(--green));color:#fff;border:none;border-radius:var(--radius-sm);padding:14px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:16px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:2px}
.finish-btn:hover{background:var(--green-bright)}
.start-overlay{text-align:center;padding:50px 20px}
.start-overlay .day-label{font-size:1.6rem;font-weight:900;color:var(--text-bright);margin-bottom:8px;font-family:'Playfair Display',serif;text-transform:uppercase;letter-spacing:3px}
.start-overlay .ex-count{font-size:0.9rem;color:var(--text-dim);margin-bottom:28px;font-family:'Oswald',sans-serif}
.start-workout-btn{background:linear-gradient(135deg,var(--iron-deep),var(--iron));color:#fff;border:none;border-radius:var(--radius-sm);padding:16px 44px;font-size:1.1rem;font-weight:700;cursor:pointer;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:3px;box-shadow:0 4px 16px rgba(128,144,168,0.2)}
.workout-timer{text-align:center;color:var(--green-bright);font-size:0.85rem;padding:6px 0;margin-bottom:4px;font-family:'Oswald',sans-serif;letter-spacing:1px}

/* PROGRESS VIEW */
.chart-container{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin:12px 0}
.chart-container canvas{width:100%;height:200px}
.range-tabs{display:flex;gap:4px;margin:8px 0}
.range-tab{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 12px;font-size:0.75rem;color:var(--text-dim);cursor:pointer}
.range-tab.active{background:linear-gradient(135deg,var(--iron-deep),var(--iron));border-color:var(--iron);color:#fff}
select.view-select{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;color:var(--text-bright);font-size:0.9rem;margin-bottom:8px;-webkit-appearance:none}

/* SESSION HISTORY */
.session-item{padding:10px;border-bottom:1px solid var(--border);font-size:0.8rem}
.session-date{color:var(--iron);font-weight:600}
.session-weights{color:var(--text-bright);margin-top:2px}
.session-trend{display:inline-block;padding:1px 6px;border-radius:8px;font-size:0.65rem;font-weight:600}
.session-trend.up{background:rgba(74,170,106,0.15);color:var(--green)}
.session-trend.down{background:rgba(212,90,90,0.15);color:var(--red)}
.session-trend.flat{background:rgba(232,200,74,0.15);color:var(--yellow)}

/* PR BOARD */
.pr-card{background:rgba(14,16,20,0.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(128,144,168,0.12);border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.pr-card .pr-exercise{font-size:0.95rem;font-weight:700;color:var(--text-bright);font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.5px}
.pr-card .pr-1rm{font-size:0.75rem;color:var(--gold);float:right}
.pr-table{width:100%;margin-top:8px;font-size:0.8rem}
.pr-table td{padding:4px 8px}
.pr-table .rep-col{color:var(--text-dim);width:60px}
.pr-table .weight-col{color:var(--text-bright);font-weight:600}
.pr-table .date-col{color:var(--text-dim);font-size:0.7rem;text-align:right}
.pr-table .crown{color:var(--gold)}
.pr-table .recent{color:var(--green)}

/* MUSCLE TABS */
.muscle-tabs{display:flex;gap:4px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.muscle-tab{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 14px;font-size:0.75rem;color:var(--text-dim);cursor:pointer;white-space:nowrap;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.5px}
.muscle-tab.active{background:linear-gradient(135deg,var(--iron-deep),var(--iron));border-color:var(--iron);color:#fff}

/* SEARCH */
.search-bar{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text-bright);font-size:0.9rem;margin-bottom:12px}
.search-bar:focus{outline:none;border-color:var(--iron)}

/* LIB CARD */
.lib-card{background:rgba(14,16,20,0.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(128,144,168,0.12);border-radius:var(--radius);padding:12px;margin-bottom:8px;box-shadow:0 2px 6px rgba(0,0,0,0.3)}
.lib-card .lib-name{font-size:0.9rem;font-weight:700;color:var(--text-bright);font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.5px}
.lib-card .lib-name-en{font-size:0.75rem;color:var(--iron)}
.lib-card .lib-equip{font-size:0.65rem;color:var(--iron);margin-top:2px}
.lib-card .lib-ath{font-size:0.8rem;color:var(--gold);font-weight:600;float:right}
.lib-subs{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.lib-subs-title{font-size:0.7rem;color:var(--iron);margin-bottom:4px}
.lib-sub-item{font-size:0.75rem;color:var(--text);padding:3px 0;display:flex;justify-content:space-between;align-items:center}
.lib-sub-item a{color:var(--iron);text-decoration:none;font-size:0.7rem}
.lib-programs{font-size:0.65rem;color:var(--green);margin-top:6px}
.lib-mode-tabs{display:flex;gap:6px;margin-bottom:12px}
.lib-mode-tab{flex:1;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px;font-size:0.8rem;color:var(--text-dim);cursor:pointer;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px;text-align:center}
.lib-mode-tab.active{background:linear-gradient(135deg,var(--iron-deep),var(--iron));border-color:var(--iron);color:#fff}
.sub-group{background:rgba(14,16,20,0.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(128,144,168,0.12);border-radius:var(--radius);margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,0.3);overflow:hidden}
.sub-group-head{padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.sub-group-head .sub-muscle{font-size:0.95rem;font-weight:700;color:var(--text-bright);font-family:'Playfair Display',serif;text-transform:uppercase;letter-spacing:1px}
.sub-group-head .sub-count{font-size:0.7rem;color:var(--text-dim)}
.sub-group-head .sub-arrow{color:var(--text-dim);transition:transform 0.2s}
.sub-group.expanded .sub-arrow{transform:rotate(90deg)}
.sub-group-body{display:none;padding:0 14px 12px}
.sub-group.expanded .sub-group-body{display:block}
.sub-subcat{font-size:0.7rem;font-weight:700;color:var(--iron);text-transform:uppercase;letter-spacing:1px;margin:10px 0 6px;padding-top:8px;border-top:1px solid var(--border)}
.sub-subcat:first-child{border-top:none;margin-top:4px}
.sub-item{font-size:0.8rem;color:var(--text);padding:4px 0;display:flex;justify-content:space-between;align-items:center;gap:6px}
.sub-item .sub-link-btn{font-size:0.65rem;color:var(--green);text-decoration:none;border:1px solid rgba(106,136,112,0.3);border-radius:var(--radius-sm);padding:2px 8px}
.sub-item .sub-del{font-size:0.65rem;color:var(--red);cursor:pointer;border:1px solid rgba(144,80,80,0.3);border-radius:var(--radius-sm);padding:2px 6px;white-space:nowrap;opacity:0.7}
.sub-item .sub-del:hover{opacity:1}
.sub-restore-btn{font-size:0.7rem;color:var(--gold);cursor:pointer;text-align:center;padding:8px;opacity:0.7}
.sub-restore-btn:hover{opacity:1}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;display:none;justify-content:center;align-items:flex-end}
.modal-overlay.show{display:flex}
.modal{background:var(--bg-deep);border-top:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;padding:16px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.modal-title{font-size:1.1rem;font-weight:700;color:var(--text-bright);font-family:'Playfair Display',serif;text-transform:uppercase;letter-spacing:1px}
.modal-close{background:none;border:none;color:var(--text-dim);font-size:1.5rem;cursor:pointer}

/* EDITOR */
.edit-ex-item{display:flex;align-items:center;gap:6px;padding:10px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;flex-wrap:wrap}
.edit-ex-item .edit-num{color:var(--text-dim);font-size:0.8rem;min-width:20px}
.edit-ex-item .edit-name-input{flex:1;min-width:120px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 8px;color:var(--text-bright);font-size:0.8rem}
.edit-ex-item .edit-name-input:focus{outline:none;border-color:var(--iron)}
.edit-ex-item .edit-field{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 8px;color:var(--text);font-size:0.75rem;width:80px}
.edit-ex-item .edit-field:focus{outline:none;border-color:var(--iron)}
.edit-ex-item .edit-field.narrow{width:50px}
.edit-ex-item .edit-del{background:none;border:none;color:var(--red);font-size:1.1rem;cursor:pointer;padding:4px 6px}
.edit-ex-item .edit-move{background:none;border:none;color:var(--text-dim);font-size:0.9rem;cursor:pointer;padding:2px 4px}
.edit-ex-item .edit-move:hover{color:var(--iron)}
.edit-row2{display:flex;gap:6px;width:100%;padding-left:26px;margin-top:4px;align-items:center}
.edit-row2 label{font-size:0.65rem;color:var(--text-dim)}
.edit-save-btn{display:block;width:100%;background:var(--iron);color:#fff;border:none;border-radius:var(--radius-sm);padding:12px;font-size:0.95rem;font-weight:600;cursor:pointer;margin-top:12px}
.edit-reset-btn{display:block;width:100%;background:none;border:1px solid var(--border);color:var(--text-dim);border-radius:var(--radius-sm);padding:10px;font-size:0.85rem;cursor:pointer;margin-top:8px}
.edit-add-btn{display:block;width:100%;background:none;border:1px dashed var(--border);border-radius:var(--radius-sm);padding:8px;color:var(--text-dim);font-size:0.8rem;cursor:pointer;margin-top:6px}
.edit-add-btn:hover{border-color:var(--iron);color:var(--iron)}
.base-badge{display:inline-block;font-size:0.6rem;padding:2px 6px;border-radius:8px;background:rgba(74,170,106,0.1);color:var(--green);border:1px solid rgba(74,170,106,0.2);margin-left:6px}
.custom-badge{display:inline-block;font-size:0.6rem;padding:2px 6px;border-radius:8px;background:rgba(232,184,74,0.1);color:var(--gold);border:1px solid rgba(232,184,74,0.2);margin-left:6px}

/* SWAP MODAL */
.swap-item{padding:10px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.2s}
.swap-item:hover{background:var(--bg-card-hover)}
.swap-item .swap-name{font-size:0.85rem;color:var(--text-bright)}
.swap-item .swap-ath{font-size:0.75rem;color:var(--gold)}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--iron);color:#fff;padding:10px 24px;border-radius:var(--radius);font-size:0.85rem;font-weight:700;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px;box-shadow:0 4px 16px rgba(0,0,0,0.5)}
.toast.show{opacity:1}

/* PROGRAMS VIEW */
.prog-overview{background:rgba(14,16,20,0.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(128,144,168,0.12);border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.3);cursor:pointer;transition:border-color 0.2s}
.prog-overview:hover{border-color:var(--border-light)}
.prog-overview.current{border-color:var(--iron);box-shadow:0 0 12px rgba(128,144,168,0.15)}
.prog-overview .prog-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-overview .prog-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:900;color:var(--text-bright);text-transform:uppercase;letter-spacing:1px}
.prog-overview .prog-badge{font-size:0.6rem;padding:3px 8px;border-radius:10px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px}
.prog-overview .prog-badge.phase{background:rgba(128,144,168,0.15);color:var(--iron);border:1px solid rgba(128,144,168,0.25)}
.prog-overview .prog-badge.active-badge{background:rgba(106,136,112,0.2);color:var(--green);border:1px solid rgba(106,136,112,0.3)}
.prog-overview .prog-split{font-size:0.7rem;color:var(--text-dim);margin-bottom:10px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px}
.prog-overview .prog-days-list{display:flex;flex-direction:column;gap:4px}
.prog-overview .prog-day-row{display:flex;gap:8px;align-items:baseline;padding:3px 0}
.prog-overview .prog-day-letter{font-family:'Oswald',sans-serif;font-weight:700;font-size:0.8rem;color:var(--iron);min-width:20px}
.prog-overview .prog-day-label{font-size:0.78rem;color:var(--text);flex:1}
.prog-overview .prog-day-count{font-size:0.65rem;color:var(--text-dim);font-family:'Oswald',sans-serif}
.prog-overview .prog-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.prog-overview.expanded .prog-detail{display:block}
.prog-detail-day{margin-bottom:10px}
.prog-detail-header{font-family:'Oswald',sans-serif;font-weight:700;font-size:0.8rem;color:var(--iron);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid rgba(128,144,168,0.15)}
.prog-detail-ex{display:flex;gap:6px;align-items:baseline;padding:2px 0;font-size:0.75rem}
.prog-detail-num{color:var(--text-dim);min-width:18px;font-family:'Oswald',sans-serif}
.prog-detail-name{color:var(--text);flex:1}
.prog-detail-reps{color:var(--iron);font-family:'Oswald',sans-serif;font-weight:600;white-space:nowrap}
.prog-detail-tech{font-size:0.6rem;padding:1px 5px;border-radius:8px;background:rgba(160,148,106,0.15);color:var(--gold);border:1px solid rgba(160,148,106,0.25);font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.5px;vertical-align:middle}
.prog-detail-weights{font-size:0.7rem;color:var(--gold);opacity:0.7;padding:0 0 4px 28px;font-family:'Oswald',sans-serif}

/* ADD PR / ADD EXERCISE BUTTON */
.add-pr-btn{background:rgba(128,144,168,0.15);border:1px solid rgba(128,144,168,0.25);border-radius:var(--radius-sm);padding:6px 14px;color:var(--iron);font-size:0.75rem;font-weight:700;cursor:pointer;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
.add-pr-btn:hover{background:rgba(128,144,168,0.25)}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg-deep)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

<body>

<!-- HEADER -->
<header class="app-header">
  <h1><span>ZER</span>CHER</h1>
  <div class="header-actions">
    <button class="add-pr-btn" id="headerAddPR" style="display:none" onclick="openAddPR()">+ PR</button>
    <span class="sync-dot" id="syncDot" title="Sync status"></span>
    <button class="header-btn" onclick="openSettings()" title="Settings">&#9881;</button>
  </div>
</header>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- VIEW: WORKOUT -->
<div id="view-workout" class="view active">
  <div class="day-tabs" id="dayTabs"></div>
  <div id="absRoutinePicker" style="display:none"></div>
  <div class="workout-timer" id="workoutTimer"></div>
  <div id="startOverlay"></div>
  <div id="workoutExercises"></div>
  <button class="finish-btn" id="finishBtn" style="display:none" onclick="finishWorkout()">Finish Workout</button>
</div>

<!-- VIEW: PROGRESS -->
<div id="view-progress" class="view">
  <input type="text" class="view-select" id="progressSearch" placeholder="Search exercises..." oninput="filterProgressExercises()" style="margin-bottom:6px">
  <select class="view-select" id="progressExSelect" onchange="renderProgressChart()"></select>
  <div class="range-tabs" id="rangeTabs">
    <button class="range-tab active" onclick="setRange(4,this)">4W</button>
    <button class="range-tab" onclick="setRange(8,this)">8W</button>
    <button class="range-tab" onclick="setRange(12,this)">12W</button>
    <button class="range-tab" onclick="setRange(0,this)">All</button>
  </div>
  <div class="chart-container"><canvas id="progressChart" width="600" height="200"></canvas></div>
  <div class="card-sub" style="margin:12px 0 8px">Session History</div>
  <div id="sessionHistory"></div>
</div>

<!-- VIEW: PRS -->
<div id="view-prs" class="view">
  <div class="muscle-tabs" id="prMuscleTabs"></div>
  <div id="prBoard"></div>
</div>

<!-- VIEW: LIBRARY -->
<div id="view-library" class="view">
  <div class="lib-mode-tabs">
    <button class="lib-mode-tab active" id="libTabExercises" onclick="setLibMode('exercises')">Exercises</button>
    <button class="lib-mode-tab" id="libTabFavs" onclick="setLibMode('favs')">Favorites</button>
    <button class="lib-mode-tab" id="libTabSubs" onclick="setLibMode('subs')">Substitutions</button>
  </div>
  <div id="libExercisesPanel">
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input class="search-bar" id="libSearch" placeholder="Search exercises..." oninput="renderLibrary()" style="margin-bottom:0;flex:1">
      <button class="add-pr-btn" onclick="openAddExercise()">+ Add</button>
    </div>
    <div class="muscle-tabs" id="libMuscleTabs"></div>
    <div id="libList"></div>
  </div>
  <div id="libSubsPanel" style="display:none">
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input class="search-bar" id="subSearch" placeholder="Search substitutions..." oninput="renderSubs()" style="margin-bottom:0;flex:1">
      <button class="add-pr-btn" onclick="openAddSub()">+ Add</button>
    </div>
    <div id="subsList"></div>
  </div>
</div>

<!-- REST TIMER -->
<div class="rest-timer" id="restTimer">
  <div class="rest-time" id="restTime">1:30</div>
  <div class="rest-btns">
    <button class="rest-btn" onclick="addRestTime(30)">+30s</button>
    <button class="rest-btn skip" onclick="skipRest()">Skip</button>
  </div>
</div>

<!-- MODAL (Editor / Swap) -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<!-- VIEW: PROGRAMS -->
<div id="view-programs" class="view">
  <div id="programsList"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="showView('workout',this)"><span class="nav-icon">&#128170;</span><span>Workout</span></button>
  <button class="nav-btn" onclick="showView('progress',this)"><span class="nav-icon">&#128200;</span><span>Progress</span></button>
  <button class="nav-btn" onclick="showView('prs',this)"><span class="nav-icon">&#127942;</span><span>PRs</span></button>
  <button class="nav-btn" onclick="showView('library',this)"><span class="nav-icon">&#128214;</span><span>Library</span></button>
  <button class="nav-btn" onclick="showView('programs',this)"><span class="nav-icon">&#128203;</span><span>Programs</span></button>
</nav>

const SYNC_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwt438APIycBc534W6T66O3IgtxLUU9cczw-PZAN6Mc9p2xfU2ySsND_wEMJDHUvrXyUg/exec';
function fireGet(url){const img=new Image();img.src=url}
function syncConfigToCloud(){
  if(!SYNC_ENDPOINT)return;
  try{
    const config={activeProgram:data.activeProgram,customPrograms:data.customPrograms,customSubs:data.customSubs||[],customExercises:data.customExercises||[],settings:data.settings};
    const encoded=encodeURIComponent(JSON.stringify(config));
    if(encoded.length<7000)fireGet(SYNC_ENDPOINT+'?action=zercher_save_config&data='+encoded);
  }catch(e){console.warn('Config sync failed',e)}
}
function syncWorkoutToCloud(logEntry){
  if(!SYNC_ENDPOINT)return;
  try{
    const encoded=encodeURIComponent(JSON.stringify(logEntry));
    if(encoded.length<7000)fireGet(SYNC_ENDPOINT+'?action=zercher_log_workout&data='+encoded);
    else console.warn('Workout too large for GET:',encoded.length);
  }catch(e){console.warn('Workout sync failed',e)}
}
function syncToCloud(){syncConfigToCloud()}
function fullSync(){
  if(!SYNC_ENDPOINT){toast('No sync endpoint');return}
  toast('Syncing...');
  syncConfigToCloud();
  fetch(SYNC_ENDPOINT+'?action=zercher_load').then(r=>r.json()).then(resp=>{
    const cloudIds=new Set((resp.logs||[]).map(l=>l.id));
    const unsynced=data.logs.filter(l=>!cloudIds.has(l.id));
    if(unsynced.length===0){toast('Already synced!');return}
    let i=0;
    function sendNext(){
      if(i>=unsynced.length){toast('Synced '+unsynced.length+' workouts!');return}
      const encoded=encodeURIComponent(JSON.stringify(unsynced[i]));
      fireGet(SYNC_ENDPOINT+'?action=zercher_log_workout&data='+encoded);
      i++;
      setTimeout(sendNext,600);
    }
    sendNext();
  }).catch(()=>toast('Sync failed'));
}
function loadFromCloud(){
  if(!SYNC_ENDPOINT)return;
  fetch(SYNC_ENDPOINT+'?action=zercher_load').then(r=>r.json()).then(resp=>{
    if(resp.status!=='ok')return;
    const cloudLogs=resp.logs||[];
    const cloudPrs=resp.prs||{};
    const config=resp.config||{};
    // Merge logs by ID
    const logMap={};
    data.logs.forEach(l=>{logMap[l.id]=l});
    cloudLogs.forEach(l=>{if(!logMap[l.id])logMap[l.id]=l});
    data.logs=Object.values(logMap).sort((a,b)=>a.date.localeCompare(b.date));
    // Merge PRs: take higher weight
    for(const eid in cloudPrs){
      if(!data.prs[eid])data.prs[eid]={};
      for(const reps in cloudPrs[eid]){
        const cloud=cloudPrs[eid][reps];
        const local=data.prs[eid][reps];
        if(!local||cloud.weight>local.weight)data.prs[eid][reps]=cloud;
      }
    }
    // Merge config
    if(config.activeProgram)data.activeProgram=config.activeProgram;
    if(config.customPrograms)data.customPrograms=config.customPrograms;
    if(config.customSubs)data.customSubs=config.customSubs;
    if(config.customExercises)data.customExercises=config.customExercises;
    if(config.settings)data.settings=config.settings;
    saveData();
    if(currentView==='workout')renderWorkout();
    toast('Synced from cloud');
  }).catch(()=>{});
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function fmt(n){return typeof n==='number'?n%1===0?n.toString():n.toFixed(1):n||''}
function dateStr(d){return(d||new Date()).toISOString().split('T')[0]}
function weekStart(d){const dt=new Date(d||Date.now());dt.setDate(dt.getDate()-dt.getDay()+1);return dateStr(dt)}
function exId(name){return name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')}
function parseSets(str){
  // Parse setsReps string into array of {reps, type}
  if(!str)return[{reps:10,type:'working'},{reps:10,type:'working'},{reps:10,type:'working'},{reps:10,type:'working'}];
  const s=str.toLowerCase();
  // Handle "2x10wu+4x8" or similar warmup+working (MUST check before simple NxM)
  const m2=s.match(/(\d+)x(\d+)\s*wu\s*\+\s*(\d+)x(\d+)/i);
  if(m2){const sets=[];for(let i=0;i<+m2[1];i++)sets.push({reps:+m2[2],type:'warmup'});for(let i=0;i<+m2[3];i++)sets.push({reps:+m2[4],type:'working'});return sets}
  // Handle pyramid "12/10/8/6"
  const m3=s.match(/^[\d\/]+$/);
  if(m3){return s.split('/').map(r=>({reps:+r,type:'working'}))}
  // Handle "4x8-12" style
  const m1=s.match(/^(\d+)x(\d+)/);
  if(m1){const sets=[];for(let i=0;i<+m1[1];i++)sets.push({reps:+m1[2],type:'working'});return sets}
  // Handle "1x12/2x10/2x8" style
  const m4=s.match(/(\d+)x(\d+)/g);
  if(m4){const sets=[];m4.forEach(p=>{const[n,r]=p.split('x');for(let i=0;i<+n;i++)sets.push({reps:+r,type:'working'})});return sets}
  // Default 4 sets
  return[{reps:10,type:'working'},{reps:10,type:'working'},{reps:10,type:'working'},{reps:10,type:'working'}];
}

// ── PROGRAM HELPERS ──
function getProgram(id){
  const p=PROGRAMS[id];if(!p)return null;
  // Merge custom overrides if any
  const custom=data.customPrograms[id];
  let merged;
  if(!custom){merged=JSON.parse(JSON.stringify(p))}
  else{merged=JSON.parse(JSON.stringify(p));for(const dk in custom.days||{}){if(custom.days[dk]&&custom.days[dk].ex)merged.days[dk].ex=custom.days[dk].ex;}}
  // Replace old per-program ABS with single ABS day using selected routine
  delete merged.days.ABS;
  const absR=ABS_ROUTINES['ABS'+currentAbsRoutine]||ABS_ROUTINES.ABS1;
  merged.days.ABS={label:absR.label,labelEn:'Abs '+currentAbsRoutine,ex:absR.ex};
  return merged;
}
function getProgramDays(id){const p=getProgram(id);return p?Object.keys(p.days).filter(k=>k!=='ABS'&&k!=='_'):[]}
function getAllExerciseNames(){
  const names=new Set();
  for(const pid in PROGRAMS){
    for(const dk in PROGRAMS[pid].days){
      PROGRAMS[pid].days[dk].ex.forEach(e=>names.add(e[0]));
    }
  }
  // Also include abs routine exercises
  for(const ak in ABS_ROUTINES){ABS_ROUTINES[ak].ex.forEach(e=>names.add(e[0]))}
  // Include substitution exercises (excluding deleted)
  const delSubs=new Set(data.deletedSubs||[]);
  SUBS_DATA.forEach(g=>g.subs.forEach(c=>c.ex.forEach(n=>{if(!delSubs.has(n))names.add(n)})));
  // Include custom program exercises
  for(const pid in data.customPrograms){
    const cp=data.customPrograms[pid];
    for(const dk in cp.days||{}){if(cp.days[dk]&&cp.days[dk].ex)cp.days[dk].ex.forEach(e=>names.add(e[0]));}
  }
  // Include exercises from ATH data
  Object.keys(ATH_DATA).forEach(n=>names.add(n));
  // Include exercises from workout logs
  (data.logs||[]).forEach(log=>(log.exercises||[]).forEach(ex=>names.add(ex.name)));
  return[...names].sort();
}
function getExerciseMuscle(name){
  for(const pid in PROGRAMS){
    for(const dk in PROGRAMS[pid].days){
      const ex=PROGRAMS[pid].days[dk].ex.find(e=>e[0]===name);
      if(ex)return ex[2];
    }
  }
  for(const ak in ABS_ROUTINES){const ex=ABS_ROUTINES[ak].ex.find(e=>e[0]===name);if(ex)return ex[2]}
  for(const g of SUBS_DATA){for(const c of g.subs){if(c.ex.includes(name))return g.muscle.toLowerCase()}}
  return'other';
}
function getExerciseEnglish(name){
  for(const pid in PROGRAMS){
    for(const dk in PROGRAMS[pid].days){
      const ex=PROGRAMS[pid].days[dk].ex.find(e=>e[0]===name);
      if(ex)return ex[1];
    }
  }
  for(const ak in ABS_ROUTINES){const ex=ABS_ROUTINES[ak].ex.find(e=>e[0]===name);if(ex)return ex[1]}
  return name;
}
function getUsedInPrograms(exName){
  const progs=[];
  for(const pid in PROGRAMS){
    for(const dk in PROGRAMS[pid].days){
      if(PROGRAMS[pid].days[dk].ex.some(e=>e[0]===exName)){progs.push(pid+'-'+dk)}
    }
  }
  return progs;
}

// ── VIEW SWITCHING ──
function showView(name,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  currentView=name;
  document.getElementById('headerAddPR').style.display=name==='prs'?'inline-block':'none';
  if(name==='workout')renderWorkout();
  if(name==='progress')renderProgress();
  if(name==='prs')renderPRBoard();
  if(name==='library')renderLibrary();
  if(name==='programs')renderPrograms();
}

function getNextDay(){
  const prog=getProgram(data.activeProgram)||getProgram('ABC01');
  const days=Object.keys(prog.days).filter(d=>d!=='ABS'&&d!=='_');
  // Find most recent log for the active program
  for(let i=data.logs.length-1;i>=0;i--){
    const log=data.logs[i];
    if(log.program===data.activeProgram&&!log.id?.startsWith('seed_')){
      const idx=days.indexOf(log.day);
      if(idx>=0)return days[(idx+1)%days.length];
    }
  }
  return days[0]||'A';
}

function selectProgram(pid){
  data.activeProgram=pid;saveData();
  currentDay=getNextDay();
  showView('workout',document.querySelectorAll('.nav-btn')[0]);
  toast('Switched to '+pid);
}

// ── PROGRAMS VIEW ──
function toggleProgram(el){el.classList.toggle('expanded')}
function renderPrograms(){
  let html='';
  for(const pid in PROGRAMS){
    const p=PROGRAMS[pid];
    const isActive=pid===data.activeProgram;
    const phase=PHASES[p.phase]||p.phase;
    const days=Object.keys(p.days).filter(d=>d!=='_'&&d!=='ABS');
    html+=`<div class="prog-overview${isActive?' current':''}" onclick="toggleProgram(this)">
      <div class="prog-head">
        <span class="prog-title">${pid}</span>
        <span>${isActive?'<span class="prog-badge active-badge">Active</span> ':''}
        <span class="prog-badge phase">${phase}</span></span>
      </div>
      <div class="prog-split">${p.type==='ABC'?'3-Day PPL':'4-Day Split'}${p.dates?' &middot; '+p.dates:''} &middot; tap to expand</div>
      <div class="prog-days-list">
        ${days.map(d=>{
          const day=p.days[d];
          return `<div class="prog-day-row">
            <span class="prog-day-letter">${d}</span>
            <span class="prog-day-label">${day.labelEn||day.label}</span>
            <span class="prog-day-count">${day.ex.length} ex</span>
          </div>`;
        }).join('')}
      </div>
      <div class="prog-detail">
        ${days.map(d=>{
          const day=p.days[d];
          return `<div class="prog-detail-day">
            <div class="prog-detail-header">${d} — ${day.labelEn||day.label}</div>
            ${day.ex.map((e,i)=>{
              const tech=e[3]&&e[3]!=='S'?TECH_LABELS[e[3]]||e[3]:'';
              let reps=e[4]||'4x10';
              // Strip warmup sets (e.g. "2x8wu+3x10" → "3x10")
              const wuMatch=reps.match(/\d+x\d+\s*wu\s*\+\s*(.*)/i);
              if(wuMatch)reps=wuMatch[1];
              return `<div class="prog-detail-ex">
              <span class="prog-detail-num">${i+1}.</span>
              <span class="prog-detail-name">${e[1]||e[0]}${tech?` <span class="prog-detail-tech" onclick="showTechPopup('${e[3]}',event)">${tech}</span>`:''}</span>
              <span class="prog-detail-reps">${reps}</span>
            </div>${e[6]?`<div class="prog-detail-weights">${e[6]}</div>`:''}`;}).join('')}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }
  document.getElementById('programsList').innerHTML=html;
}

// ── WORKOUT VIEW ──
function renderWorkout(){
  const prog=getProgram(data.activeProgram);if(!prog)return;
  const days=Object.keys(prog.days);
  if(!days.includes(currentDay))currentDay=days[0];

  // Day tabs
  let tabsHtml='';
  days.forEach(d=>{
    const dayData=prog.days[d];
    const tabLabel=d==='ABS'?'ABS':`${d} - ${dayData.labelEn||dayData.label}`;
    tabsHtml+=`<button class="day-tab${d===currentDay?' active':''}" onclick="switchDay('${d}')">${tabLabel}</button>`;
  });
  document.getElementById('dayTabs').innerHTML=tabsHtml;

  // Initialize workout if not started
  if(!currentWorkout||currentWorkout.program!==data.activeProgram||currentWorkout.day!==currentDay){
    initWorkout();
  }

  // Show start overlay or exercises
  const overlay=document.getElementById('startOverlay');
  const exContainer=document.getElementById('workoutExercises');
  const finBtn=document.getElementById('finishBtn');
  const timerEl=document.getElementById('workoutTimer');
  // Abs routine dropdown
  const absPickerEl=document.getElementById('absRoutinePicker');
  if(currentDay==='ABS'){
    let apHtml='<select class="view-select" onchange="switchAbsRoutine(Number(this.value))" style="margin-bottom:8px">';
    for(let i=1;i<=7;i++){
      const r=ABS_ROUTINES['ABS'+i];
      apHtml+=`<option value="${i}"${currentAbsRoutine===i?' selected':''}>Abs ${i}</option>`;
    }
    apHtml+='</select>';
    absPickerEl.innerHTML=apHtml;
    absPickerEl.style.display='block';
  } else {
    absPickerEl.innerHTML='';
    absPickerEl.style.display='none';
  }

  if(!workoutStartTime){
    const dayData=prog.days[currentDay];
    const exCount=currentWorkout?currentWorkout.exercises.length:0;
    overlay.innerHTML=`<div class="start-overlay">
      <div class="day-label">${currentDay==='ABS'?'Abs '+currentAbsRoutine:'Day '+currentDay} — ${dayData.labelEn||dayData.label}</div>
      <div class="ex-count">${exCount} exercises</div>
      <button class="start-workout-btn" onclick="beginWorkout()">Start Workout</button>
    </div>`;
    overlay.style.display='block';
    exContainer.innerHTML='';
    finBtn.style.display='none';
    timerEl.textContent='';
  } else {
    overlay.style.display='none';
    finBtn.style.display='block';
    renderExerciseCards();
    updateWorkoutTimer();
  }
}

function beginWorkout(){
  workoutStartTime=Date.now();
  renderWorkout();
  // Update timer every second
  if(window._workoutTimerInt)clearInterval(window._workoutTimerInt);
  window._workoutTimerInt=setInterval(updateWorkoutTimer,1000);
}

function updateWorkoutTimer(){
  if(!workoutStartTime)return;
  const elapsed=Math.floor((Date.now()-workoutStartTime)/1000);
  const m=Math.floor(elapsed/60);const s=elapsed%60;
  document.getElementById('workoutTimer').textContent=m+':'+(s<10?'0':'')+s+' elapsed';
}

function showTechPopup(code,e){
  if(e)e.stopPropagation();
  let pop=document.getElementById('techPopup');
  if(pop){pop.remove();}
  const label=TECH_LABELS[code]||code;
  const desc=TECH_DESC[code]||'No description available.';
  pop=document.createElement('div');
  pop.id='techPopup';pop.className='tech-popup';
  pop.innerHTML=`<button class="tech-popup-close" onclick="document.getElementById('techPopup').remove()">&times;</button><div class="tech-popup-title">${label}</div><div class="tech-popup-desc">${desc}</div>`;
  document.body.appendChild(pop);
  setTimeout(()=>{document.addEventListener('click',function closePop(){document.getElementById('techPopup')?.remove();document.removeEventListener('click',closePop)},{once:true})},100);
}

function switchDay(d){currentDay=d;currentWorkout=null;workoutStartTime=null;if(window._workoutTimerInt)clearInterval(window._workoutTimerInt);renderWorkout()}
function switchAbsRoutine(n){currentAbsRoutine=n;localStorage.setItem('abs_routine',n);currentWorkout=null;workoutStartTime=null;if(window._workoutTimerInt)clearInterval(window._workoutTimerInt);renderWorkout()}

function initWorkout(){
  // Try to recover in-progress workout
  try{
    const saved=JSON.parse(localStorage.getItem('workout_in_progress'));
    if(saved&&saved.program===data.activeProgram&&saved.day===currentDay){
      currentWorkout=saved.workout;workoutStartTime=saved.startTime;
      if(window._workoutTimerInt)clearInterval(window._workoutTimerInt);
      window._workoutTimerInt=setInterval(updateWorkoutTimer,1000);
      return;
    }
  }catch(e){}

  const prog=getProgram(data.activeProgram);if(!prog)return;
  const dayData=prog.days[currentDay];if(!dayData)return;

  currentWorkout={
    program:data.activeProgram,
    day:currentDay,
    date:dateStr(),
    exercises:dayData.ex.map(e=>{
      const sets=parseSets(e[4]);
      const lastLog=getLastLog(e[0]);
      return{
        name:e[0],nameEn:e[1],muscle:e[2],technique:e[3],
        targetSets:e[4],restSec:e[5],
        sets:sets.map((s,i)=>({
          weight:lastLog&&lastLog.sets[i]?lastLog.sets[i].weight:'',
          reps:s.reps,
          type:s.type,
          done:false
        }))
      };
    })
  };
  workoutStartTime=Date.now();
}

function getLastLog(exName){
  for(let i=data.logs.length-1;i>=0;i--){
    const log=data.logs[i];
    const ex=log.exercises.find(e=>e.name===exName);
    if(ex)return ex;
  }
  return null;
}

function getLastNLogs(exName,n){
  const results=[];
  for(let i=data.logs.length-1;i>=0&&results.length<n;i--){
    const ex=data.logs[i].exercises.find(e=>e.name===exName);
    if(ex)results.push(ex);
  }
  return results;
}

function getSuggestion(lastLog, targetReps, exName){
  if(!lastLog)return null;
  const working=lastLog.sets.filter(s=>s.type!=='warmup');
  if(working.length===0)return null;
  const target=targetReps||10;
  const maxWeight=Math.max(...working.map(s=>s.weight));
  const allHitTarget=working.every(s=>s.reps>=target);
  const someHitTarget=working.some(s=>s.reps>=target);
  const avgReps=working.reduce((a,s)=>a+s.reps,0)/working.length;
  const step=maxWeight>=100?5:maxWeight>=50?2.5:1;
  const repsStr=working.map(s=>s.reps).join('/');

  const history=exName?getLastNLogs(exName,8):[];

  // Count consecutive sessions hitting all target reps
  let streak=0;
  for(const h of history){
    const w=h.sets.filter(s=>s.type!=='warmup');
    if(w.every(s=>s.reps>=target))streak++;else break;
  }
  // Count consecutive sessions struggling (<70% avg reps)
  let failStreak=0;
  for(const h of history){
    const w=h.sets.filter(s=>s.type!=='warmup');
    const avg=w.reduce((a,s)=>a+s.reps,0)/w.length;
    if(avg<target*0.7)failStreak++;else break;
  }

  // Weight advice
  let weightTip='',type='stay';
  if(streak>=4&&allHitTarget){
    weightTip='Increase to '+fmt(maxWeight+step)+' lbs — hit target '+streak+'x in a row';
    type='up';
  } else if(allHitTarget){
    weightTip='Hit all '+target+' reps — keep building ('+streak+'/4 sessions)';
    type='up';
  } else if(avgReps>=target*0.7&&someHitTarget){
    weightTip='Stay at '+fmt(maxWeight)+' lbs — got '+repsStr+' (target: '+target+')';
    type='stay';
  } else if(failStreak>=4){
    weightTip='Pull back to '+fmt(maxWeight-step)+' lbs — struggling '+failStreak+' sessions';
    type='down';
  } else if(avgReps<target*0.7){
    weightTip='Tough session — got '+repsStr+' ('+failStreak+'/4 before pullback)';
    type='down';
  } else {
    weightTip='Stay at '+fmt(maxWeight)+' lbs — got '+repsStr;
    type='stay';
  }

  // Trend (3+ sessions)
  let trendHtml='';
  if(history.length>=3){
    const weights=history.map(h=>{
      const w=h.sets.filter(s=>s.type!=='warmup'&&s.weight>0);
      return w.length?Math.max(...w.map(s=>s.weight)):0;
    }).reverse();
    const first=weights[0],last=weights[weights.length-1];
    const pct=first>0?((last-first)/first*100):0;
    const allFlat=weights.every(w=>first>0&&Math.abs(w-first)/first<0.05);
    if(allFlat){
      trendHtml='<div class="sug-trend">&#8212; Plateau '+history.length+' sessions — try varying rep range or technique</div>';
    } else if(pct>5){
      trendHtml='<div class="sug-trend sug-trend-up">&#9650; Up '+pct.toFixed(0)+'% over '+history.length+' sessions</div>';
    } else if(pct<-5){
      trendHtml='<div class="sug-trend sug-trend-down">&#9660; Down '+Math.abs(pct).toFixed(0)+'% — consider a deload week</div>';
    }
  }

  const icon=type==='up'?'&#9650;':type==='down'?'&#9660;':'&#9654;';
  return{type,text:'<div class="sug-main">'+icon+' '+weightTip+'</div>'+trendHtml};
}

function renderExerciseCards(){
  if(!currentWorkout)return;
  const container=document.getElementById('workoutExercises');
  let html='';
  currentWorkout.exercises.forEach((ex,ei)=>{
    const allDone=ex.sets.every(s=>s.done);
    const lastLog=getLastLog(ex.name);
    const techLabel=TECH_LABELS[ex.technique]||ex.technique;

    html+=`<div class="ex-card${allDone?' all-done':''}" id="ex-${ei}" ${allDone?'onclick="this.classList.toggle(\'expanded\')"':''}>
      <div class="ex-header">
        <div>
          <div class="ex-name">${ex.name}<span class="ex-done-label">&#10003; DONE</span></div>
          <div class="ex-name-en">${ex.nameEn}</div>
        </div>
      </div>
      <div class="ex-meta">
        ${getPattern(ex.name)?`<span class="ex-tag pattern">${getPattern(ex.name)}</span>`:''}
        <span class="ex-tag">${ex.targetSets.replace(/\+/g,' + ')}</span>
        <span class="ex-tag tech" onclick="showTechPopup('${ex.technique}',event)">${techLabel}</span>
        <span class="ex-tag">${ex.restSec}s rest</span>
      </div>`;

    // Set rows
    const isAbs=ex.muscle==='abs';
    let wNum=0;
    ex.sets.forEach((set,si)=>{
      if(set.type!=='warmup')wNum++;
      const label=set.type==='warmup'?'WU':'S'+wNum;
      const canRemove=ex.sets.filter(s=>s.type===set.type).length>1;
      html+=`<div class="set-row" style="${isAbs?'grid-template-columns:auto 1fr auto auto':'grid-template-columns:auto 1fr 1fr auto auto'}">
        <span class="set-label${set.type==='warmup'?' warmup':''}">${label}</span>
        ${isAbs?'':`<div class="set-input-group">
          <input class="set-input" type="number" inputmode="decimal" placeholder="lbs" value="${set.weight}" onchange="updateSet(${ei},${si},'weight',this.value)">
          <span class="set-unit">lbs</span>
        </div>`}
        <div class="set-input-group">
          <input class="set-input" type="number" inputmode="numeric" placeholder="reps" value="${set.reps}" onchange="updateSet(${ei},${si},'reps',this.value)">
          <span class="set-unit">reps</span>
        </div>
        <button class="set-done-btn${set.done?' done':''}" onclick="toggleSet(${ei},${si})">&#10003;</button>
        ${canRemove?`<button class="rm-set-btn" onclick="removeSet(${ei},${si})" title="Remove set">&#10005;</button>`:`<span style="width:24px"></span>`}
      </div>`;
    });

    html+=`<button class="add-set-btn" onclick="addSet(${ei})">+ Add Set</button>`;

    // PR flash
    html+=`<div class="pr-flash" id="pr-flash-${ei}">NEW PR!</div>`;

    // Last time + suggestion
    if(lastLog){
      const workingSets=lastLog.sets.filter(s=>s.type!=='warmup');
      const weights=workingSets.map(s=>s.weight).join('/');
      const reps=workingSets.map(s=>s.reps).join('/');
      if(isAbs){
        html+=`<div class="ex-last">Last: ${reps} reps</div>`;
      } else {
        html+=`<div class="ex-last">Last: ${weights} lbs (${reps} reps) &middot; <span class="pr-badge">PR: ${getBestWeight(ex.name)} lbs</span></div>`;
      }
      const targetReps=ex.sets.find(s=>s.type==='working')?ex.sets.find(s=>s.type==='working').reps:10;
      const sug=getSuggestion(lastLog,targetReps,ex.name);
      if(sug){
        html+=`<div class="ex-suggest ${sug.type}">${sug.text}</div>`;
      }
    }

    html+=`<div class="ex-actions">
      <button class="ex-action-btn" onclick="openSwapModal(${ei})">Swap</button>
      <button class="ex-action-btn" onclick="removeExercise(${ei})">Remove</button>
    </div>`;

    html+=`</div>`;
  });
  container.innerHTML=html;
}

function updateSet(ei,si,field,val){
  if(!currentWorkout)return;
  const v=field==='weight'?parseFloat(val.replace(/,/g,''))||'':parseInt(val)||0;
  currentWorkout.exercises[ei].sets[si][field]=v;
}

function toggleSet(ei,si){
  if(!currentWorkout)return;
  const set=currentWorkout.exercises[ei].sets[si];
  set.done=!set.done;

  // Read current input values
  const card=document.getElementById('ex-'+ei);
  const inputs=card.querySelectorAll('.set-row')[si].querySelectorAll('.set-input');
  const isAbsEx=currentWorkout.exercises[ei].muscle==='abs';
  if(isAbsEx){
    set.weight=0;
    set.reps=parseInt(inputs[0].value)||0;
  } else {
    set.weight=parseFloat(inputs[0].value.replace(/,/g,''))||0;
    set.reps=parseInt(inputs[1].value)||0;
  }

  // Check for PR
  if(set.done&&set.type==='working'&&set.weight>0){
    checkPR(ei,currentWorkout.exercises[ei].name,set.weight,set.reps);
  }

  // Start rest timer
  if(set.done){
    startRest(currentWorkout.exercises[ei].restSec||90);
  }

  // Auto-save progress on every set toggle
  const ex=currentWorkout.exercises[ei];
  const rows=card.querySelectorAll('.set-row');
  ex.sets.forEach((s,i)=>{
    if(rows[i]){
      const inp=rows[i].querySelectorAll('.set-input');
      if(ex.muscle==='abs'){
        s.weight=0;
        s.reps=parseInt(inp[0].value)||0;
      } else {
        s.weight=parseFloat(inp[0].value.replace(/,/g,''))||0;
        s.reps=parseInt(inp[1].value)||0;
      }
    }
  });
  localStorage.setItem('workout_in_progress',JSON.stringify({workout:currentWorkout,startTime:workoutStartTime,program:data.activeProgram,day:currentDay}));

  renderExerciseCards();
}

function addSet(ei){
  if(!currentWorkout)return;
  const ex=currentWorkout.exercises[ei];
  const lastSet=ex.sets[ex.sets.length-1];
  ex.sets.push({weight:lastSet?lastSet.weight:'',reps:lastSet?lastSet.reps:10,type:'working',done:false});
  renderExerciseCards();
}

function removeSet(ei,si){
  if(!currentWorkout)return;
  const ex=currentWorkout.exercises[ei];
  const setType=ex.sets[si].type;
  if(ex.sets.filter(s=>s.type===setType).length<=1){toast('Need at least 1 set');return;}
  ex.sets.splice(si,1);
  renderExerciseCards();
}

function removeExercise(ei){
  if(!currentWorkout)return;
  if(confirm('Remove '+currentWorkout.exercises[ei].name+'?')){
    currentWorkout.exercises.splice(ei,1);
    renderExerciseCards();
  }
}

function getBestWeight(exName){
  const id=exId(exName);
  const pr=data.prs[id];
  if(!pr)return findATH(exName);
  let best=0;
  for(const r in pr){if(pr[r].weight>best)best=pr[r].weight}
  return best||findATH(exName);
}

function findATH(name){
  // Try exact match first
  if(ATH_DATA[name])return ATH_DATA[name];
  // Try partial match
  const key=Object.keys(ATH_DATA).find(k=>name.includes(k)||k.includes(name));
  return key?ATH_DATA[key]:0;
}

// ── PR DETECTION ──
function checkPR(ei,exName,weight,reps){
  const id=exId(exName);
  if(!data.prs[id])data.prs[id]={};
  const current=data.prs[id][reps];
  if(!current||weight>current.weight){
    data.prs[id][reps]={weight,date:dateStr(),program:data.activeProgram};
    saveData();
    // Show PR flash
    const flash=document.getElementById('pr-flash-'+ei);
    if(flash){flash.classList.add('show');setTimeout(()=>flash.classList.remove('show'),3000)}
    toast('NEW PR! '+exName+': '+weight+'lbs x '+reps);
  }
}

function calcE1RM(weight,reps){
  if(reps<=0||reps>30)return 0;
  if(reps===1)return weight;
  return Math.round(weight*36/(37-reps)*10)/10;
}

// ── REST TIMER ──
function startRest(seconds){
  restTimeLeft=seconds;
  clearInterval(restTimerInterval);
  const el=document.getElementById('restTimer');
  el.classList.add('active');
  updateRestDisplay();
  restTimerInterval=setInterval(()=>{
    restTimeLeft--;
    if(restTimeLeft<=0){
      clearInterval(restTimerInterval);
      restTimeLeft=0;
      document.getElementById('restTime').textContent='GO!';
      document.getElementById('restTime').className='rest-time done';
      try{navigator.vibrate&&navigator.vibrate([200,100,200])}catch(e){}
      setTimeout(()=>skipRest(),2000);
    }else{
      updateRestDisplay();
    }
  },1000);
}

function updateRestDisplay(){
  const m=Math.floor(restTimeLeft/60);
  const s=restTimeLeft%60;
  const el=document.getElementById('restTime');
  el.textContent=m+':'+(s<10?'0':'')+s;
  el.className='rest-time'+(restTimeLeft<=10?' warning':'');
}

function addRestTime(sec){restTimeLeft+=sec;updateRestDisplay()}
function skipRest(){
  clearInterval(restTimerInterval);
  document.getElementById('restTimer').classList.remove('active');
}

// ── FINISH WORKOUT ──
function finishWorkout(){
  if(!currentWorkout)return;
  if(!currentWorkout.exercises.some(ex=>ex.sets.some(s=>s.done))){
    toast('No sets completed yet!');return;
  }
  // Save all input values
  currentWorkout.exercises.forEach((ex,ei)=>{
    const card=document.getElementById('ex-'+ei);
    if(!card)return;
    const rows=card.querySelectorAll('.set-row');
    const isAbsEx=ex.muscle==='abs';
    ex.sets.forEach((set,si)=>{
      if(rows[si]){
        const inputs=rows[si].querySelectorAll('.set-input');
        if(isAbsEx){
          set.weight=0;
          set.reps=parseInt(inputs[0].value)||0;
        } else {
          set.weight=parseFloat(inputs[0].value.replace(/,/g,''))||0;
          set.reps=parseInt(inputs[1].value)||0;
        }
      }
    });
  });

  const logEntry={
    id:'log_'+Date.now(),
    date:currentWorkout.date,
    program:currentWorkout.program,
    day:currentWorkout.day,
    exercises:currentWorkout.exercises.map(ex=>({
      name:ex.name,
      sets:ex.sets.filter(s=>s.done).map(s=>({weight:s.weight,reps:s.reps,type:s.type}))
    })).filter(ex=>ex.sets.length>0),
    duration:workoutStartTime?Math.round((Date.now()-workoutStartTime)/60000):0
  };

  data.logs.push(logEntry);

  // Auto-detect PRs for all completed sets
  logEntry.exercises.forEach(ex=>{
    ex.sets.filter(s=>s.type==='working'&&s.weight>0).forEach(s=>{
      const id=exId(ex.name);
      if(!data.prs[id])data.prs[id]={};
      const current=data.prs[id][s.reps];
      if(!current||s.weight>current.weight){
        data.prs[id][s.reps]={weight:s.weight,date:logEntry.date,program:logEntry.program};
      }
    });
  });

  saveData();
  syncWorkoutToCloud(logEntry);
  syncConfigToCloud();
  localStorage.removeItem('workout_in_progress');
  currentWorkout=null;
  workoutStartTime=null;
  skipRest();
  toast('Workout saved! '+logEntry.exercises.length+' exercises logged');
  currentDay=getNextDay();
  showView('workout',document.querySelectorAll('.nav-btn')[0]);
}

function renderProgressChart(){
  const exName=document.getElementById('progressExSelect').value;
  const canvas=document.getElementById('progressChart');
  const ctx=canvas.getContext('2d');
  const W=canvas.width=canvas.parentElement.offsetWidth-24;
  const H=canvas.height=200;
  ctx.clearRect(0,0,W,H);

  if(!exName){
    ctx.fillStyle='#6b7280';ctx.font='14px sans-serif';ctx.textAlign='center';
    ctx.fillText('Select an exercise to see progress',W/2,H/2);
    document.getElementById('sessionHistory').innerHTML='';
    return;
  }

  // Get all logs for this exercise
  let entries=[];
  data.logs.forEach(log=>{
    const ex=log.exercises.find(e=>e.name===exName);
    if(ex){
      const workingSets=ex.sets.filter(s=>s.type==='working'&&s.weight>0);
      if(workingSets.length>0){
        const maxW=Math.max(...workingSets.map(s=>s.weight));
        entries.push({date:log.date,maxWeight:maxW,sets:workingSets,program:log.program});
      }
    }
  });

  // Filter by range
  if(chartRange>0){
    const cutoff=new Date(Date.now()-chartRange*7*86400000);
    entries=entries.filter(e=>new Date(e.date)>=cutoff);
  }

  if(entries.length<2){
    ctx.fillStyle='#6b7280';ctx.font='14px sans-serif';ctx.textAlign='center';
    ctx.fillText(entries.length===0?'No data yet':'Need 2+ sessions for chart',W/2,H/2);
    renderSessionHistory(exName);
    return;
  }

  // Draw chart
  const pad={t:20,r:10,b:30,l:50};
  const cW=W-pad.l-pad.r;
  const cH=H-pad.t-pad.b;
  const minW=Math.min(...entries.map(e=>e.maxWeight))*0.9;
  const maxW=Math.max(...entries.map(e=>e.maxWeight))*1.05;
  const range=maxW-minW||1;

  // Grid
  ctx.strokeStyle='#2d3238';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=pad.t+cH*(i/4);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.fillStyle='#6b7280';ctx.font='10px sans-serif';ctx.textAlign='right';
    ctx.fillText(fmt(maxW-range*(i/4)),pad.l-5,y+3);
  }

  // Line
  ctx.strokeStyle='#4a90d9';ctx.lineWidth=2;ctx.beginPath();
  entries.forEach((e,i)=>{
    const x=pad.l+cW*(i/(entries.length-1));
    const y=pad.t+cH*(1-(e.maxWeight-minW)/range);
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Points
  entries.forEach((e,i)=>{
    const x=pad.l+cW*(i/(entries.length-1));
    const y=pad.t+cH*(1-(e.maxWeight-minW)/range);
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle=i>0&&e.maxWeight>entries[i-1].maxWeight?'#4aaa6a':i>0&&e.maxWeight<entries[i-1].maxWeight?'#d45a5a':'#4a90d9';
    ctx.fill();
  });

  // Date labels
  ctx.fillStyle='#6b7280';ctx.font='9px sans-serif';ctx.textAlign='center';
  const step=Math.max(1,Math.floor(entries.length/5));
  entries.forEach((e,i)=>{
    if(i%step===0||i===entries.length-1){
      const x=pad.l+cW*(i/(entries.length-1));
      ctx.fillText(e.date.slice(5),x,H-5);
    }
  });

  // Trend
  const first=entries[0].maxWeight;
  const last=entries[entries.length-1].maxWeight;
  const trend=last>first?'up':last<first?'down':'flat';
  ctx.fillStyle=trend==='up'?'#4aaa6a':trend==='down'?'#d45a5a':'#e8c84a';
  ctx.font='bold 11px sans-serif';ctx.textAlign='right';
  const pct=((last-first)/first*100).toFixed(1);
  ctx.fillText((trend==='up'?'+':'')+pct+'%',W-pad.r,pad.t-5);

  renderSessionHistory(exName);
}

function renderSessionHistory(exName){
  let entries=[];
  data.logs.forEach(log=>{
    const ex=log.exercises.find(e=>e.name===exName);
    if(ex)entries.push({date:log.date,sets:ex.sets,program:log.program});
  });
  entries.reverse();

  const html=entries.slice(0,20).map((e,i)=>{
    const ws=e.sets.filter(s=>s.type==='working');
    const weights=ws.map(s=>s.weight).join('/');
    const reps=ws.map(s=>s.reps).join('/');
    let trend='';
    if(i<entries.length-1){
      const prevMax=Math.max(...entries[i+1].sets.filter(s=>s.type==='working').map(s=>s.weight));
      const curMax=Math.max(...ws.map(s=>s.weight));
      trend=curMax>prevMax?'<span class="session-trend up">UP</span>':curMax<prevMax?'<span class="session-trend down">DOWN</span>':'<span class="session-trend flat">FLAT</span>';
    }
    return`<div class="session-item"><span class="session-date">${e.date}</span> ${trend}<div class="session-weights">${weights} lbs &middot; ${reps} reps &middot; ${e.program}</div></div>`;
  }).join('');
  document.getElementById('sessionHistory').innerHTML=html||'<div style="color:var(--text-dim);text-align:center;padding:20px">No sessions logged yet</div>';
}

// ── PR BOARD ──
function renderPRBoard(){
  // Muscle tabs
  const tabs=document.getElementById('prMuscleTabs');
  tabs.innerHTML='<button class="muscle-tab'+(currentPrMuscle==='all'?' active':'')+'" onclick="setPrMuscle(\'all\')">All</button>'+
    MUSCLE_GROUPS.map(m=>`<button class="muscle-tab${currentPrMuscle===m?' active':''}" onclick="setPrMuscle('${m}')">${MUSCLE_LABELS[m]}</button>`).join('');

  // Build PR cards
  const allNames=getAllExerciseNames();
  let html='';
  allNames.forEach(name=>{
    const muscle=getExerciseMuscle(name);
    if(currentPrMuscle!=='all'&&muscle!==currentPrMuscle)return;

    const id=exId(name);
    const prs=data.prs[id]||{};
    const athVal=findATH(name);
    const repCounts=Object.keys(prs).map(Number).sort((a,b)=>a-b);
    if(repCounts.length===0&&!athVal)return;

    // Calc e1RM
    let best1rm=0;
    repCounts.forEach(r=>{const e=calcE1RM(prs[r].weight,r);if(e>best1rm)best1rm=e});

    html+=`<div class="pr-card">
      <div class="pr-exercise">${name} <span style="font-size:0.7rem;color:var(--text-dim)">${getExerciseEnglish(name)}</span></div>
      ${best1rm?`<div class="pr-1rm">est. 1RM: ${fmt(best1rm)} lbs</div>`:''}
      ${athVal?`<div style="font-size:0.75rem;color:var(--gold);margin-top:4px">ATH: ${athVal} lbs</div>`:''}
      <table class="pr-table">`;

    repCounts.forEach(r=>{
      const pr=prs[r];
      const isRecent=pr.date&&new Date(pr.date)>new Date(Date.now()-14*86400000);
      const isBest=repCounts.length>1&&calcE1RM(pr.weight,r)===best1rm;
      const rowE1rm=r>1?calcE1RM(pr.weight,r):0;
      html+=`<tr>
        <td class="rep-col">${r} reps</td>
        <td class="weight-col${isBest?' crown':''}">${isBest?'&#x1f451; ':''}${fmt(pr.weight)} lbs</td>
        <td style="font-size:0.7rem;color:var(--text-dim);text-align:center;min-width:60px">${rowE1rm?'~'+fmt(rowE1rm):''}</td>
        <td class="date-col${isRecent?' recent':''}">${pr.date||''}</td>
      </tr>`;
    });

    html+=`</table></div>`;
  });

  document.getElementById('prBoard').innerHTML=html||'<div style="color:var(--text-dim);text-align:center;padding:40px">No PRs recorded yet. Start logging workouts!</div>';
}

function saveNewExercise(){
  const name=document.getElementById('newExName').value.trim();
  const muscle=document.getElementById('newExMuscle').value;
  const ath=parseFloat(document.getElementById('newExATH').value)||0;
  if(!name){toast('Enter exercise name');return}
  // Add to a hidden "_custom" program so it shows in getAllExerciseNames
  if(!PROGRAMS._custom)PROGRAMS._custom={name:'_custom',phase:'acc',type:'ABC',days:{A:{label:'Custom',labelEn:'Custom Exercises',ex:[]}}};
  const exists=PROGRAMS._custom.days.A.ex.find(e=>e[0]===name);
  if(!exists)PROGRAMS._custom.days.A.ex.push([name,name,muscle,'S','4x10',60]);
  // Save ATH as PR if provided
  if(ath>0){
    const id=exId(name);
    if(!data.prs[id])data.prs[id]={};
    data.prs[id]['ath']={weight:ath,date:'',program:'ATH'};
  }
  // Persist custom exercises
  if(!data.customExercises)data.customExercises=[];
  if(!data.customExercises.find(e=>e[0]===name))data.customExercises.push([name,name,muscle,'S','4x10',60]);
  saveData();
  closeModal();
  toast('Added: '+name);
  renderLibrary();
}

function renderLibrary(){
  const tabs=document.getElementById('libMuscleTabs');
  tabs.innerHTML='<button class="muscle-tab'+(currentLibMuscle==='all'?' active':'')+'" onclick="setLibMuscle(\'all\')">All</button>'+
    MUSCLE_GROUPS.map(m=>`<button class="muscle-tab${currentLibMuscle===m?' active':''}" onclick="setLibMuscle('${m}')">${MUSCLE_LABELS[m]}</button>`).join('');

  const search=(document.getElementById('libSearch').value||'').toLowerCase();
  const allNames=getAllExerciseNames();
  const hidden=new Set(data.hiddenExercises||[]);

  let html='';
  allNames.forEach(name=>{
    if(hidden.has(name))return;
    const muscle=getExerciseMuscle(name);
    if(currentLibMuscle!=='all'&&muscle!==currentLibMuscle)return;
    if(currentLibMode==='favs'&&!favExercises.has(name))return;
    if(search&&!name.toLowerCase().includes(search)&&!getExerciseEnglish(name).toLowerCase().includes(search))return;

    const athVal=findATH(name);
    const isFav=favExercises.has(name);

    html+=`<div class="lib-card" ontouchstart="libLongStart('${name.replace(/'/g,"\\'")}',event)" ontouchend="libLongEnd()" ontouchcancel="libLongEnd()" oncontextmenu="event.preventDefault();libDelete('${name.replace(/'/g,"\\'")}')">
      <div class="lib-name" style="display:flex;align-items:center;gap:6px"><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis">${name}</span>${athVal?`<span class="lib-ath" style="flex-shrink:0">${athVal} lbs ATH</span>`:''}<span style="flex-shrink:0;cursor:pointer;font-size:1.1rem;color:${isFav?'var(--gold)':'var(--text-dim)'}" onclick="toggleFav('${name.replace(/'/g,"\\'")}')">${isFav?'&#9733;':'&#9734;'}</span></div>
      <div class="lib-name-en">${getExerciseEnglish(name)}</div>
      <div class="lib-equip">${MUSCLE_LABELS[muscle]||muscle}</div>
    </div>`;
  });

  if(hidden.size)html+=`<div class="sub-restore-btn" onclick="restoreLibrary()">${hidden.size} hidden — tap to restore all</div>`;
  document.getElementById('libList').innerHTML=html||`<div style="color:var(--text-dim);text-align:center;padding:40px">${currentLibMode==='favs'?'No favorites yet — tap ☆ on any exercise to add it':'No exercises found'}</div>`;
}

function setLibMuscle(m){currentLibMuscle=m;renderLibrary()}
var _libLongTimer=null;
function libLongStart(name,e){_libLongTimer=setTimeout(()=>{_libLongTimer=null;libDelete(name)},600)}
function libLongEnd(){if(_libLongTimer){clearTimeout(_libLongTimer);_libLongTimer=null}}
function libDelete(name){
  if(!confirm('Hide "'+name+'" from Library?'))return;
  if(!data.hiddenExercises)data.hiddenExercises=[];
  if(!data.hiddenExercises.includes(name))data.hiddenExercises.push(name);
  saveData();renderLibrary();
  toast('Hidden: '+name);
}
function restoreLibrary(){
  if(!confirm('Restore all hidden exercises?'))return;
  data.hiddenExercises=[];
  saveData();renderLibrary();
  toast('All exercises restored');
}

let currentLibMode='exercises';
function setLibMode(mode){
  currentLibMode=mode;
  document.getElementById('libTabExercises').classList.toggle('active',mode==='exercises');
  document.getElementById('libTabFavs').classList.toggle('active',mode==='favs');
  document.getElementById('libTabSubs').classList.toggle('active',mode==='subs');
  document.getElementById('libExercisesPanel').style.display=mode==='exercises'||mode==='favs'?'block':'none';
  document.getElementById('libSubsPanel').style.display=mode==='subs'?'block':'none';
  if(mode==='subs')renderSubs();
  if(mode==='favs'||mode==='exercises')renderLibrary();
}
function toggleFav(name){
  if(favExercises.has(name))favExercises.delete(name);
  else favExercises.add(name);
  localStorage.setItem('fav_exercises',JSON.stringify([...favExercises]));
  renderLibrary();
}

function renderSubs(){
  const search=(document.getElementById('subSearch').value||'').toLowerCase();
  const userLinks=data.subLinks||{};
  const deleted=new Set(data.deletedSubs||[]);
  let html='';
  SUBS_DATA.forEach((group,gi)=>{
    let groupExes=[];
    group.subs.forEach(sub=>{
      const filtered=sub.ex.filter(e=>!deleted.has(e)&&(!search||e.toLowerCase().includes(search)));
      if(filtered.length)groupExes.push({cat:sub.cat,ex:filtered});
    });
    if(!groupExes.length)return;
    const count=groupExes.reduce((s,c)=>s+c.ex.length,0);
    html+=`<div class="sub-group" onclick="this.classList.toggle('expanded')">
      <div class="sub-group-head">
        <span class="sub-muscle">${group.muscle}</span>
        <span><span class="sub-count">${count}</span> <span class="sub-arrow">&#9654;</span></span>
      </div>
      <div class="sub-group-body" onclick="event.stopPropagation()">
        ${groupExes.map(sub=>`
          ${sub.cat!=='All'?`<div class="sub-subcat">${sub.cat}</div>`:''}
          ${sub.ex.map(e=>{
            const key=e.replace(/[^a-zA-Z0-9]/g,'_').toLowerCase();
            const link=SUB_LINKS[e]||userLinks[key]||'';
            return `<div class="sub-item">
              <span>${e}</span>
              <span style="display:flex;gap:4px;align-items:center">
                ${link?`<a class="sub-link-btn" href="${link}" target="_blank" rel="noopener">Video</a>`:``}
                <span class="sub-del" onclick="deleteSub('${e.replace(/'/g,"\\'")}')">X</span>
              </span>
            </div>`;
          }).join('')}
        `).join('')}
      </div>
    </div>`;
  });
  if(deleted.size){
    html+=`<div class="sub-restore-btn" onclick="restoreAllSubs()">${deleted.size} hidden — tap to restore all</div>`;
  }
  document.getElementById('subsList').innerHTML=html||'<div style="color:var(--text-dim);text-align:center;padding:40px">No matches</div>';
}
function deleteSub(name){
  if(!data.deletedSubs)data.deletedSubs=[];
  if(!data.deletedSubs.includes(name))data.deletedSubs.push(name);
  saveData();renderSubs();
  toast('Removed: '+name);
}
function restoreAllSubs(){
  if(!confirm('Restore all hidden substitutions?'))return;
  data.deletedSubs=[];
  saveData();renderSubs();
  toast('All substitutions restored');
}

function addSubLink(key,name){
  const url=prompt('Paste link for '+name+':');

  if(!data.subLinks)data.subLinks={};
  data.subLinks[key]=url.trim();
  saveData();
  renderSubs();
  toast('Link saved');
}

function saveSub(){
  const name=document.getElementById('subNameInput').value.trim();
  if(!name){toast('Enter a name');return;}
  const muscle=document.getElementById('subMuscleInput').value.trim()||'Other';
  const cat=document.getElementById('subCatInput').value.trim()||'All';
  const link=document.getElementById('subLinkInput').value.trim();
  // Add to custom subs in data
  if(!data.customSubs)data.customSubs=[];
  data.customSubs.push({muscle,cat,name});
  // Merge into SUBS_DATA
  let group=SUBS_DATA.find(g=>g.muscle.toLowerCase()===muscle.toLowerCase());
  if(!group){group={muscle,subs:[]};SUBS_DATA.push(group);}
  let subcat=group.subs.find(s=>s.cat.toLowerCase()===cat.toLowerCase());
  if(!subcat){subcat={cat,ex:[]};group.subs.push(subcat);}
  if(!subcat.ex.includes(name))subcat.ex.push(name);
  if(link){
    if(!data.subLinks)data.subLinks={};
    data.subLinks[name.replace(/[^a-zA-Z0-9]/g,'_').toLowerCase()]=link;
  }
  saveData();
  closeModal();
  renderSubs();
  toast('Added to '+muscle+' > '+cat);
}

// ── SWAP MODAL ──
function openSwapModal(ei){
  if(!currentWorkout)return;
  const ex=currentWorkout.exercises[ei];
  const muscle=ex.muscle;

  // Get all exercises for same muscle from all programs + abs routines
  const options=new Set();
  for(const pid in PROGRAMS){
    for(const dk in PROGRAMS[pid].days){
      PROGRAMS[pid].days[dk].ex.forEach(e=>{
        if(e[2]===muscle&&e[0]!==ex.name)options.add(e[0]+'|'+e[1]);
      });
    }
  }
  for(const ak in ABS_ROUTINES){
    ABS_ROUTINES[ak].ex.forEach(e=>{
      if(e[2]===muscle&&e[0]!==ex.name)options.add(e[0]+'|'+e[1]);
    });
  }
  // Also include substitution exercises from Library (excluding deleted)
  const deleted=new Set(data.deletedSubs||[]);
  const muscleMap={chest:'Chest',back:'Back',shoulders:'Shoulders',biceps:'Biceps',triceps:'Triceps',forearms:'Forearms',quads:'Quads',hamstrings:'Hamstrings',glutes:'Glutes',calves:'Calves',abs:'Abs'};
  const subsMuscleName=muscleMap[muscle]||muscle;
  SUBS_DATA.forEach(g=>{
    if(g.muscle===subsMuscleName||g.muscle==='Legs (Full)'&&(muscle==='quads'||muscle==='hamstrings'||muscle==='glutes')){
      g.subs.forEach(s=>s.ex.forEach(name=>{
        if(name!==ex.name&&name!==ex.nameEn&&!deleted.has(name))options.add(name+'|'+name);
      }));
    }
  });

  let html=`<div class="modal-header">
    <div class="modal-title">Swap: ${ex.name}</div>
    <button class="modal-close" onclick="closeModal()">&times;</button>
  </div>
  <div style="margin-bottom:8px;font-size:0.75rem;color:var(--text-dim)">Showing ${muscle} exercises</div>`;

  [...options].sort().forEach(opt=>{
    const[name,nameEn]=opt.split('|');
    const ath=findATH(name);
    html+=`<div class="swap-item" onclick="doSwap(${ei},'${name.replace(/'/g,"\\'")}','${nameEn.replace(/'/g,"\\'")}','${muscle}')">
      <div class="swap-name">${name} <span style="color:var(--text-dim);font-size:0.75rem">${nameEn}</span></div>
      ${ath?`<div class="swap-ath">ATH: ${ath} lbs</div>`:''}
    </div>`;
  });

  openModal(html);
}

function doSwap(ei,name,nameEn,muscle){
  if(!currentWorkout)return;
  const ex=currentWorkout.exercises[ei];
  ex.name=name;ex.nameEn=nameEn;ex.muscle=muscle;
  // Try to pre-populate from last log
  const lastLog=getLastLog(name);
  if(lastLog){
    ex.sets.forEach((s,i)=>{
      if(lastLog.sets[i])s.weight=lastLog.sets[i].weight;
    });
  }
  closeModal();
  renderExerciseCards();
  toast('Swapped to '+name);
}
